# Pod test: image ĐÃ KÝ -> kỳ vọng ĐƯỢC NHẬN (cả Audit lẫn Enforce).
# Dùng chứng minh Enforce không chặn oan image hợp lệ (test B2).
apiVersion: v1
kind: Pod
metadata:
  name: kyverno-test-signed
  namespace: techx-tf1
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    seccompProfile: { type: RuntimeDefault }
  containers:
    - name: test
      # Cập nhật tag này thành image mới nhất đang chạy trên prod trước khi test:
      #   kubectl get deploy -n techx-tf1 frontend \
      #     -o jsonpath='{.spec.template.spec.containers[0].image}'
      image: 804372444787.dkr.ecr.us-east-1.amazonaws.com/ecommerce-dev-techx-corp:1.0-frontend-24b2d8c
      command: ["sleep", "300"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities: { drop: ["ALL"] }
      # Đủ 4 field req/limit x cpu/mem — VAP require-resources deny nếu thiếu.
      resources:
        requests: { cpu: "10m", memory: "32Mi" }
        limits:   { cpu: "100m", memory: "64Mi" }

# Sinh 22/07/2026 ~09:00 UTC từ artifact/doc/git có sẵn — KHÔNG chạy test mới.
# Run EC2 (phase65-ec2-nlb) LOẠI khỏi kiểm kê theo quyết định user 22/07: artifact mất theo EC2, không truy vết thời gian được.
#
# Quy ước:
# - observed  = đọc trực tiếp từ artifact (log/CSV/README bảng số/git/kubectl).
# - inferred  = suy từ ngữ cảnh (ghi rõ nguồn suy luận).
# - null      = không xác định được, liệt kê trong missing_fields.
# - Local timezone = Asia/Ho_Chi_Minh (UTC+7).
#
# Hạ tầng DÙNG CHUNG cả cửa sổ 19–22/07 (observed 22/07, kubectl + git):
# - cluster: ecommerce-develop-dev-eks (account 458), namespace: techx-develop
# - prometheus: image quay.io/prometheus/prometheus:v3.11.3, Deployment revision=1
#   (KHÔNG đổi từ khi dựng ~19/07 03:30Z), replicas=1, requests 250m/768Mi,
#   limits 1cpu/1536Mi, retention 7d, PVC 20Gi gp3-observability,
#   scrape_interval global 1m (một job 5m), node ops (taint dedicated=observability)
# - node: 4× t3.large (3 app + 1 ops), allocatable 1930m CPU / ~7080Mi RAM mỗi node
# - vì prometheus revision=1 suốt cửa sổ: MỌI run dưới đây đều so sánh được với nhau
#   về phía Prometheus; khác biệt giữa run nằm ở app config (ghi per-run).


# Mandate-19 PHASE 3 — per-pod capacity. frontend ghim min=max=1 (service đo),
# product-catalog + frontend-proxy nới min=max=4 (không để HPA chạy giữa chừng).
# Đẩy step load CAO hơn Phase 2 (tới 120u) để 1 pod frontend gãy SLO p95<200ms.
# Mỗi bậc 300s (>=5 phút guideline plan Bước 4). CSV to emptyDir, pod sleeps after.
apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-phase3
  namespace: techx-develop
data:
  locustfile.py: |
    #!/usr/bin/python
    # Phase 3 per-pod: CATALOG flow, 1 pod frontend. Đẩy cao để tìm điểm bão hòa.
    import random
    from locust import HttpUser, task, between, LoadTestShape

    PRODUCTS = ["0PUK6V6EV0","1YMWWN1N4O","2ZYFJ3GM2N","66VCHSJNUP","6E92ZMYYFZ",
                "9SIQT8TOJO","L9ECAV7KIM","LS4PSXUNUM","OLJCESPC7Z","HQTGWGPNH4"]

    class CatalogFlowUser(HttpUser):
        wait_time = between(1, 3)
        @task(3)
        def view_product(self):
            self.client.get(f"/api/products/{random.choice(PRODUCTS)}", name="/api/products/:id")
        @task(1)
        def list_products(self):
            self.client.get("/api/products", name="/api/products")

    class StepShape(LoadTestShape):
        # bậc cao hơn Phase 2: 20/40/80/120u, mỗi bậc 300s (>=5min steady)
        stages = [
            (300,  20, 4),
            (600,  40, 4),
            (900,  80, 8),
            (1200, 120, 8),
        ]
        def tick(self):
            t = self.get_run_time()
            for end, users, rate in self.stages:
                if t < end:
                    return (users, rate)
            return None
---
apiVersion: batch/v1
kind: Job
metadata:
  name: locust-phase3
  namespace: techx-develop
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels: { app: locust-phase3 }
    spec:
      restartPolicy: Never
      nodeSelector: { workload-tier: observability }
      tolerations:
        - { key: dedicated, operator: Equal, value: observability, effect: NoSchedule }
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: locust
          image: 804372444787.dkr.ecr.us-east-1.amazonaws.com/ecommerce-dev-techx-corp:1.0-load-generator-5369fc8
          command: ["sh","-c"]
          args:
            - >
              locust -f /mnt/locust/locustfile.py --host http://frontend-proxy:80
              --headless --csv /data/phase3 --csv-full-history --run-time 1240s;
              echo "LOCUST_DONE exit=$?";
              sleep 3600
          env:
            - { name: OTEL_COLLECTOR_NAME, value: otel-collector }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://otel-collector:4317" }
            - { name: LOCUST_BROWSER_TRAFFIC_ENABLED, value: "false" }
            - { name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION, value: python }
          securityContext: { allowPrivilegeEscalation: false, runAsNonRoot: true, capabilities: { drop: ["ALL"] } }
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          volumeMounts:
            - { name: lf, mountPath: /mnt/locust }
            - { name: data, mountPath: /data }
      volumes:
        - name: lf
          configMap: { name: locust-phase3 }
        - name: data
          emptyDir: {}

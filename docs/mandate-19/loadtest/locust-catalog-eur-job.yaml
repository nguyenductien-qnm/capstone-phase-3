# Mandate-19 N+1 currency baseline — catalog list flow with currencyCode=EUR.
# Kích hoạt đường N+1 gRPC: /api/products?currencyCode=EUR → frontend convert giá
# 10 sản phẩm bằng 10 gRPC call tới currency (code CŨ, chưa cache). Đo BEFORE-cache.
# CSV to emptyDir, pod sleeps after shape ends (v1 lost /tmp on exit).
apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-catalog-eur
  namespace: techx-develop
data:
  locustfile.py: |
    #!/usr/bin/python
    # Mandate-19 CATALOG-EUR flow — kích hoạt N+1 currency convert. Headless step-load.
    # list_products (weight cao) là endpoint gọi 10 convert/req -> đo N+1. view_product
    # (getProduct) chỉ 1 convert/req, giữ để so.
    import random
    from locust import HttpUser, task, between, LoadTestShape

    PRODUCTS = ["0PUK6V6EV0","1YMWWN1N4O","2ZYFJ3GM2N","66VCHSJNUP","6E92ZMYYFZ",
                "9SIQT8TOJO","L9ECAV7KIM","LS4PSXUNUM","OLJCESPC7Z","HQTGWGPNH4"]

    class CatalogEurUser(HttpUser):
        wait_time = between(1, 3)
        @task(3)
        def list_products(self):
            # 10 products * convert EUR = 10 gRPC currency (N+1 path)
            self.client.get("/api/products?currencyCode=EUR", name="/api/products?EUR")
        @task(1)
        def view_product(self):
            self.client.get(f"/api/products/{random.choice(PRODUCTS)}?currencyCode=EUR",
                            name="/api/products/:id?EUR")

    class StepShape(LoadTestShape):
        stages = [
            (240,  5, 2),
            (480, 10, 2),
            (720, 20, 3),
            (960, 40, 4),
        ]
        def tick(self):
            t = self.get_run_time()
            for end, users, rate in self.stages:
                if t < end:
                    return (users, rate)
            return None
---
apiVersion: batch/v1
kind: Job
metadata:
  name: locust-catalog-eur
  namespace: techx-develop
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels: { app: locust-catalog-eur }
    spec:
      restartPolicy: Never
      nodeSelector: { workload-tier: observability }
      tolerations:
        - { key: dedicated, operator: Equal, value: observability, effect: NoSchedule }
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: locust
          image: 804372444787.dkr.ecr.us-east-1.amazonaws.com/ecommerce-dev-techx-corp:1.0-load-generator-5369fc8
          command: ["sh","-c"]
          args:
            - >
              locust -f /mnt/locust/locustfile.py --host http://frontend-proxy:80
              --headless --csv /data/eur --csv-full-history --run-time 1000s;
              echo "LOCUST_DONE exit=$?";
              sleep 3600
          env:
            - { name: OTEL_COLLECTOR_NAME, value: otel-collector }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://otel-collector:4317" }
            - { name: LOCUST_BROWSER_TRAFFIC_ENABLED, value: "false" }
            - { name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION, value: python }
          securityContext: { allowPrivilegeEscalation: false, runAsNonRoot: true, capabilities: { drop: ["ALL"] } }
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          volumeMounts:
            - { name: lf, mountPath: /mnt/locust }
            - { name: data, mountPath: /data }
      volumes:
        - name: lf
          configMap: { name: locust-catalog-eur }
        - name: data
          emptyDir: {}

# NEGATIVE TEST — vi phạm luật #4: deny-floating-image-tag (K8sDisallowedTags)
# Kỳ vọng: BỊ TỪ CHỐI khi apply vào techx-tf1.
# Chỉ vi phạm ĐÚNG 1 luật (tag :latest); mọi field khác hợp lệ.
apiVersion: v1
kind: Pod
metadata:
  name: neg-02-image-latest
  namespace: techx-tf1
  labels:
    app.kubernetes.io/part-of: gatekeeper-negative-test
spec:
  restartPolicy: Never
  containers:
    - name: neg-latest
      image: nginx:latest     # <-- VI PHẠM: tag di động
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi

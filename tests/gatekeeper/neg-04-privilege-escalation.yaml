# NEGATIVE TEST — vi phạm luật #2: deny-privilege-escalation (K8sPSPAllowPrivilegeEscalationContainer)
# Kỳ vọng: BỊ TỪ CHỐI khi apply vào techx-tf1.
# Chỉ vi phạm ĐÚNG 1 luật (allowPrivilegeEscalation: true); mọi field khác hợp lệ.
apiVersion: v1
kind: Pod
metadata:
  name: neg-04-privilege-escalation
  namespace: techx-tf1
  labels:
    app.kubernetes.io/part-of: gatekeeper-negative-test
spec:
  restartPolicy: Never
  containers:
    - name: neg-privesc
      image: busybox:1.38.0
      command: ["sleep", "300"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: true   # <-- VI PHẠM: cho phép leo thang đặc quyền
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi

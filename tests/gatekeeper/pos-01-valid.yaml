# POSITIVE TEST — hợp lệ với CẢ 5 luật Gatekeeper. Kỳ vọng: PASS (được admission chấp nhận).
# Chạy bằng --dry-run=server để KHÔNG tạo pod thật trong namespace prod:
#   kubectl apply --dry-run=server -f pos-01-valid.yaml
# Pass vì: (1) runAsNonRoot+runAsUser 1000, (2) allowPrivilegeEscalation false,
# (3) drop ALL không add gì, (4) image tag pin, (5) đủ 4 field requests/limits.
apiVersion: v1
kind: Pod
metadata:
  name: pos-01-valid
  namespace: techx-tf1
  labels:
    app.kubernetes.io/part-of: gatekeeper-negative-test
spec:
  restartPolicy: Never
  containers:
    - name: pos-valid
      image: busybox:1.38.0
      command: ["sleep", "300"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi

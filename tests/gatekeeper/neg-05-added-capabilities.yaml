# NEGATIVE TEST — vi phạm luật #3: deny-dangerous-capabilities (K8sDisallowCapabilities)
# Kỳ vọng: BỊ TỪ CHỐI khi apply vào techx-tf1.
# Chỉ vi phạm ĐÚNG 1 luật (add SYS_ADMIN — không nằm trong allowedCapabilities [NET_BIND_SERVICE]);
# vẫn drop ALL để không dính thêm rule "phải drop ALL", giữ deny message sạch 1 dòng.
apiVersion: v1
kind: Pod
metadata:
  name: neg-05-added-capabilities
  namespace: techx-tf1
  labels:
    app.kubernetes.io/part-of: gatekeeper-negative-test
spec:
  restartPolicy: Never
  containers:
    - name: neg-caps
      image: busybox:1.38.0
      command: ["sleep", "300"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
          add: ["SYS_ADMIN"]   # <-- VI PHẠM: capability nguy hiểm, không được phép
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi

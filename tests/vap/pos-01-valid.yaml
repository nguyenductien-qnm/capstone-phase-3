apiVersion: v1
kind: Pod
metadata:
  name: vaptest-pos-01-valid
  labels: { vaptest: "true" }
spec:
  containers:
  - name: app
    image: ecommerce-dev-techx-corp:1.0-cart-aadff38   # tag cố định
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      capabilities: { drop: ["ALL"] }
    resources:
      requests: { cpu: "10m", memory: "16Mi" }
      limits: { cpu: "50m", memory: "32Mi" }

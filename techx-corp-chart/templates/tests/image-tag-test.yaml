apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-image-tag-check"
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: check
      image: busybox:1.38.0
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "=== Image Tag Validation ==="
          # Primary guard: template-level validation in _helpers.tpl (validateNoLatest)
          # fails helm template on :latest or missing tags.
          # This pod serves as a post-deploy runtime check.
          echo "PASS: Template-level validation already enforced."
          echo "If you see this, helm template succeeded without :latest images."

apiVersion: v1
kind: Pod
metadata:
  name: neg-missing-limits-only
  namespace: techx-tf1
spec:
  containers:
    - name: neg-missing-limits-only
      image: public.ecr.aws/docker/library/nginx:1.27
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        # Vi phạm: có requests nhưng THIẾU limits (cpu + memory)
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
# Policy kỳ vọng: require-cpu-memory-limits-requests -> VI PHẠM (thiếu limits)
# Các policy khác: PASS

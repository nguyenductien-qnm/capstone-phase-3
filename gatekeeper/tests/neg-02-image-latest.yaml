apiVersion: v1
kind: Pod
metadata:
  name: neg-image-latest
  namespace: techx-tf1
spec:
  containers:
    - name: neg-image-latest
      image: nginx:latest   # Vi phạm: dùng tag latest trôi nổi
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL

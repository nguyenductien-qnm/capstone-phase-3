apiVersion: v1
kind: Pod
metadata:
  name: neg-run-as-root-uid0
  namespace: techx-tf1
spec:
  containers:
    - name: neg-run-as-root-uid0
      image: public.ecr.aws/docker/library/nginx:1.27
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsUser: 0   # Vi phạm: chạy tường minh với root (uid 0), rule MustRunAsNonRoot
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
# Policy kỳ vọng: run-as-non-root -> VI PHẠM (nhánh runAsUser == 0)
# Các policy khác: PASS

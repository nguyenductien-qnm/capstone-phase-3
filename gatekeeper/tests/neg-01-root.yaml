apiVersion: v1
kind: Pod
metadata:
  name: neg-root
  namespace: techx-tf1
spec:
  containers:
    - name: neg-root
      image: public.ecr.aws/docker/library/nginx:1.27
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        # Vi phạm: Thiếu runAsNonRoot: true và không có runAsUser > 0

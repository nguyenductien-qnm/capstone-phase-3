apiVersion: v1
kind: Pod
metadata:
  name: neg-no-image-tag
  namespace: techx-tf1
spec:
  containers:
    - name: neg-no-image-tag
      image: public.ecr.aws/docker/library/nginx   # Vi phạm: không chỉ định tag
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
# Policy kỳ vọng: deny-floating-image-tag -> VI PHẠM (nhánh "didn't specify an image tag")
# Các policy khác: PASS

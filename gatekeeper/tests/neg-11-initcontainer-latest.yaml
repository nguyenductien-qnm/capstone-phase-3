apiVersion: v1
kind: Pod
metadata:
  name: neg-initcontainer-latest
  namespace: techx-tf1
spec:
  initContainers:
    - name: init-bad
      image: busybox:latest   # Vi phạm: initContainer dùng tag trôi nổi latest
      command: ["sh", "-c", "echo init"]
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
  containers:
    - name: main-ok
      image: public.ecr.aws/docker/library/nginx:1.27
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
# Policy kỳ vọng: deny-floating-image-tag -> VI PHẠM (áp dụng cả cho initContainers)
# Mục đích: xác nhận policy quét luôn initContainers, không chỉ containers.
# Các policy khác: PASS

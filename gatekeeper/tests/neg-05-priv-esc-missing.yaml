apiVersion: v1
kind: Pod
metadata:
  name: neg-priv-esc-missing
  namespace: techx-tf1
spec:
  containers:
    - name: neg-priv-esc-missing
      image: public.ecr.aws/docker/library/nginx:1.27
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        # Vi phạm: có securityContext nhưng KHÔNG khai báo allowPrivilegeEscalation
        capabilities:
          drop:
            - ALL
# Policy kỳ vọng: deny-privilege-escalation  -> VI PHẠM (nhánh thiếu field allowPrivilegeEscalation)
# Các policy khác: PASS

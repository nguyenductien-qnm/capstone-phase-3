apiVersion: v1
kind: Pod
metadata:
  name: neg-add-dangerous-cap
  namespace: techx-tf1
spec:
  containers:
    - name: neg-add-dangerous-cap
      image: public.ecr.aws/docker/library/nginx:1.27
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
          add:
            - SYS_ADMIN   # Vi phạm: add capability ngoài whitelist (chỉ NET_BIND_SERVICE được phép)
# Policy kỳ vọng: deny-dangerous-capabilities -> VI PHẠM (nhánh has_disallowed_add)
# Các policy khác: PASS

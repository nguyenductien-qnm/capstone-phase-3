apiVersion: v1
kind: Pod
metadata:
  name: pos-allowed-cap
  namespace: techx-tf1
spec:
  containers:
    - name: pos-allowed-cap
      image: public.ecr.aws/docker/library/nginx:1.27
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
          add:
            - NET_BIND_SERVICE   # Hợp lệ: capability nằm trong whitelist allowedCapabilities
# Kỳ vọng: TẤT CẢ policy PASS (không vi phạm).
# Mục đích: xác nhận deny-dangerous-capabilities cho phép add đúng whitelist.

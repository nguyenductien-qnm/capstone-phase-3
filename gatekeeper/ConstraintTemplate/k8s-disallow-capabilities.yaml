apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdisallowcapabilities
  annotations:
    metadata.gatekeeper.sh/title: "Disallow Capabilities"
    metadata.gatekeeper.sh/version: 1.0.0
    description: >-
      Bắt buộc containers phải drop tất cả Linux capabilities (drop: ALL)
      và chỉ được phép add lại các capabilities nằm trong danh sách trắng
      (allowedCapabilities). Giảm thiểu bề mặt tấn công khi container bị xâm nhập.
spec:
  crd:
    spec:
      names:
        kind: K8sDisallowCapabilities
      validation:
        openAPIV3Schema:
          type: object
          properties:
            exemptImages:
              description: >-
                Containers dùng image khớp với danh sách này sẽ được bỏ qua.
                Hỗ trợ prefix wildcard `*`. Ví dụ: `my-image-*`.
              type: array
              items:
                type: string
            allowedCapabilities:
              description: >-
                Danh sách capabilities được phép add lại sau khi đã drop ALL.
                Để trống nếu muốn cấm tuyệt đối mọi capability.
              type: array
              items:
                type: string
            requiredDropCapabilities:
              description: >-
                Danh sách capabilities bắt buộc phải drop. Thường là ["ALL"].
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdisallowcapabilities

        import data.lib.exempt_container.is_exempt

        violation[{"msg": msg}] {
          container := input_containers[_]
          not is_exempt(container)
          not dropped_all(container)
          msg := sprintf(
            "Container <%v> phải drop tất cả capabilities (drop: ALL). Hiện tại không có securityContext.capabilities.drop hoặc thiếu ALL.",
            [container.name]
          )
        }

        violation[{"msg": msg}] {
          container := input_containers[_]
          not is_exempt(container)
          has_disallowed_add(container)
          added := {cap | cap := container.securityContext.capabilities.add[_]}
          allowed := {cap | cap := input.parameters.allowedCapabilities[_]}
          disallowed := added - allowed
          msg := sprintf(
            "Container <%v> đang add capabilities không được phép: %v. Chỉ được phép: %v",
            [container.name, disallowed, input.parameters.allowedCapabilities]
          )
        }

        dropped_all(container) {
          drops := {cap | cap := container.securityContext.capabilities.drop[_]}
          "ALL" in drops
        }

        has_disallowed_add(container) {
          added := {cap | cap := container.securityContext.capabilities.add[_]}
          allowed := {cap | cap := input.parameters.allowedCapabilities[_]}
          disallowed := added - allowed
          count(disallowed) > 0
        }

        input_containers[c] {
          c := input.review.object.spec.containers[_]
        }
        input_containers[c] {
          c := input.review.object.spec.initContainers[_]
        }
        input_containers[c] {
          c := input.review.object.spec.ephemeralContainers[_]
        }
      libs:
        - |
          package lib.exempt_container

          is_exempt(container) {
              exempt_images := object.get(object.get(input, "parameters", {}), "exemptImages", [])
              img := container.image
              exemption := exempt_images[_]
              _matches_exemption(img, exemption)
          }

          _matches_exemption(img, exemption) {
              not endswith(exemption, "*")
              exemption == img
          }

          _matches_exemption(img, exemption) {
              endswith(exemption, "*")
              prefix := trim_suffix(exemption, "*")
              startswith(img, prefix)
          }

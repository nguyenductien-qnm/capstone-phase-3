apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPCapabilities
metadata:
  name: psp-capabilities
  annotations:
    description: >-
      Capabilities control (Directive #1, upstream K8sPSPCapabilities). Bắt buộc drop ALL,
      chỉ cho phép add lại NET_BIND_SERVICE. Case-insensitive theo chuẩn K8s.
      Áp dụng namespace techx-tf1. Loại trừ namespace hệ thống.
spec:
  enforcementAction: dryrun
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces:
      - techx-tf1
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
  parameters:
    allowedCapabilities:
      - NET_BIND_SERVICE
    requiredDropCapabilities:
      - ALL
    exemptImages:
      # Observability stack — ngoại lệ có kiểm soát (ADR-003 §4, hết hạn 2026-12-31).
      - "quay.io/prometheus/prometheus*"
      - "otel/opentelemetry-collector-contrib*"
      - "jaegertracing/jaeger*"

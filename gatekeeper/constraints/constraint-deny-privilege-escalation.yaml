apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPAllowPrivilegeEscalationContainer
metadata:
  name: deny-privilege-escalation
  annotations:
    description: >-
      Cấm tất cả containers thiết lập allowPrivilegeEscalation: true.
      Bắt buộc containers phải khai báo securityContext.allowPrivilegeEscalation: false.
      Áp dụng cho namespace techx-tf1.
spec:
  enforcementAction: dryrun
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces:
      - techx-tf1
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
  parameters:
    exemptImages:
      - "gcr.io/google_containers/pause*"
      # Observability stack — ngoại lệ có kiểm soát (ADR-003 §4, hết hạn 2026-12-31).
      # Các tool này cần host access / không set allowPrivilegeEscalation:false ở chart.
      - "quay.io/prometheus/prometheus*"
      - "otel/opentelemetry-collector-contrib*"
      - "jaegertracing/jaeger*"
      - "opensearchproject/opensearch*"

# TF1-62 [AIOps-W2] - deploy detector chay lien tuc tren EKS (namespace techx-tf1).
#
# Truoc khi apply (1 lan duy nhat):
#   kubectl -n techx-tf1 create secret generic aiops-alert \
#     --from-literal=webhook=<slack-or-discord-webhook-url>
#
#   kubectl -n techx-tf1 apply -f deployment.yaml
#
# Build + push image (tu repo root, chay tren may co quyen ECR):
#   aws ecr get-login-password --region us-east-1 | docker login --username AWS \
#     --password-stdin 804372444787.dkr.ecr.us-east-1.amazonaws.com
#   docker buildx build --platform linux/amd64 \
#     -t 804372444787.dkr.ecr.us-east-1.amazonaws.com/ecommerce-dev-techx-corp:1.0-aiops-detector \
#     --push aiops/detector
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-detector
  namespace: techx-tf1
  labels:
    app: aiops-detector
    team: aio03
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-detector
  template:
    metadata:
      labels:
        app: aiops-detector
    spec:
      # MANDATE-05: non-root, khong leo thang dac quyen, drop het capability.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aiops-detector
          # MANDATE-05: pin tag co dinh, khong dung tag troi (:latest).
          image: 804372444787.dkr.ecr.us-east-1.amazonaws.com/ecommerce-dev-techx-corp:1.0-aiops-detector
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            # Ten service theo fullnameOverride trong platform/charts/application/values.yaml
            # (prometheus:1587, opensearch:1674) - detector chay cung namespace techx-tf1.
            - name: PROM_URL
              value: "http://prometheus:9090"
            - name: OPENSEARCH_URL
              value: "http://opensearch:9200"
            - name: ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-alert
                  key: webhook
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "128Mi" }

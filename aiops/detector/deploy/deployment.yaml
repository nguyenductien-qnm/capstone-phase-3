# TF1-62 [AIOps-W2] - deploy detector chay lien tuc tren EKS (namespace techx-tf1).
#
# MANDATE-10 P2: file nay GIO DO ARGOCD QUAN (app `aiops`, xem
# platform/gitops/applications/aiops.yaml) - selfHeal bat, nen KHONG kubectl apply
# hay kubectl set image bang tay nua: sua tay se bi revert o chu ky sync ke tiep.
# Doi gi thi sua file nay roi merge vao develop.
#
# Image cung KHONG con build tay: job `build-aiops` trong .github/workflows/app-build.yaml
# build -> Trivy gate -> push by-digest -> Cosign ky digest -> SBOM attest, roi job `bump`
# ghi tag moi (1.3-aiops-detector-<sha>) thang vao dong `image:` ben duoi. Dat trong
# app-build.yaml de 2 image aiops mang cung subject identity Cosign nhu service chart -
# do la dieu kien de ClusterPolicy Kyverno verify-image-signature chap nhan chung.
#
# Con lai lam TAY dung 1 lan (khong nam trong Git): secret webhook alert.
#   kubectl -n techx-tf1 create secret generic aiops-alert \
#     --from-literal=webhook=<slack-or-discord-webhook-url>
#
# LUU Y tag: PHAI co suffix -<git-sha> (khop convention app-build). Tag tran
# kieu "1.2-aiops-detector" tung bi ECR lifecycle policy xoa -> ImagePullBackOff
# (incident 2026-07-16).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-detector
  namespace: techx-tf1
  labels:
    app: aiops-detector
    team: aio03
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-detector
  template:
    metadata:
      labels:
        app: aiops-detector
    spec:
      serviceAccountName: aiops-detector
      # MANDATE-05: non-root, khong leo thang dac quyen, drop het capability.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aiops-detector
          # MANDATE-05: pin tag co dinh, khong dung tag troi (:latest).
          image: 804372444787.dkr.ecr.us-east-1.amazonaws.com/ecommerce-dev-techx-corp:1.3-aiops-detector-4252fed
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            # Ten service theo fullnameOverride trong platform/charts/application/values.yaml
            # (prometheus:1587, opensearch:1674) - detector chay cung namespace techx-tf1.
            - name: PROM_URL
              value: "http://prometheus:9090"
            - name: OPENSEARCH_URL
              value: "http://opensearch:9200"
            # Alerter moi (PR #61) doc AIOPS_SLACK_WEBHOOK_CRITICAL/INFO (2 kenh theo
            # 03_specs/aiops_notification_integration.md). Ten bien co chu SLACK nhung
            # nhan ca Discord webhook URL - provider tu detect tu URL (kenh team = Discord).
            # INFO khong set -> moi severity don ve kenh critical.
            # optional: thieu secret thi pod van chay, alerter fallback provider=stdout
            # (alert van thay duoc qua kubectl logs). Tao secret + rollout restart de bat webhook.
            - name: AIOPS_SLACK_WEBHOOK_CRITICAL
              valueFrom:
                secretKeyRef:
                  name: aiops-alert
                  key: webhook
                  optional: true
          # Block style (khong phai flow `{ }`): job bump cua app-build ghi tag bang yq,
          # ma yq viet lai flow-map thanh `{cpu: ...}` -> moi lan bump lai kem 2 dong
          # diff rac. Block style la fixed point cua yq nen diff chi con dung dong image.
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

# TF1-53 [AIOps-W1-T5] - Cau hinh phat hien loi & canh bao van hanh
# ----------------------------------------------------------------------------
# Rule config-driven: KHONG hardcode nguong trong code. Them/sua tin hieu tai day.
# 3 loai rule:
#   - type: metric     -> query Prometheus (PromQL tra ve vector, so sanh op/threshold trong code)
#   - type: log        -> dem so log khop match_phrase tren OpenSearch trong cua so window_minutes
#   - type: k8s_status -> doc thang trang thai pod tu K8s API (vd OOMKilled) - dung cho
#                          su co ma app KHONG kip ghi log truoc khi bi kill (xem oom-detected)
#
# Nguong bam SLO trong onboarding/SLO.md:
#   - storefront p95 < 1s ; non-5xx >= 99.5% (err < 0.5%) ; checkout >= 99% (err < 1%)

poll_interval_seconds: 30

sources:
  # URL doc tu bien moi truong (xem .env.example). KHONG commit URL that.
  prometheus_url_env: PROM_URL
  opensearch_url_env: OPENSEARCH_URL
  opensearch_index: "otel-logs-*"
  # Ten field trong index otel-logs-* (lay tu grafana/provisioning/datasources/opensearch.yaml)
  opensearch_message_field: "body"
  opensearch_time_field: "observedTimestamp"
  http_timeout_seconds: 5

alert:
  # provider: slack | discord | stdout | auto (tu doan tu URL webhook)
  provider: auto
  webhook_env: ALERT_WEBHOOK_URL
  # Cung 1 rule + cung 1 service chi ban toi da 1 lan / cooldown_seconds (chong spam on-call)
  cooldown_seconds: 600

rules:
  # ---- GOLDEN SIGNALS (metric) ----
  - id: latency-p95-high
    type: metric
    severity: warning
    summary: "p95 latency > 1s — VI PHẠM SLO storefront (< 1s)"
    summary_dynamic: "p95 latency TĂNG BẤT THƯỜNG so với 15 phút gần đây (chưa vượt SLO 1s — cảnh báo sớm)"
    # Review FP-run 12/07: flagd (4.87s, khong thuoc SLO nao) tung trigger rule nay.
    # Loai service ha tang/noi bo khoi pham vi SLO storefront (exclusion an toan hon allowlist
    # - khong vo tinh bo sot service storefront moi).
    query: >-
      histogram_quantile(0.95,
        sum by (service_name, le) (
          rate(http_server_request_duration_seconds_bucket{service_namespace="techx-corp", service_name!~"flagd|flagd-ui|otel-collector|grafana|jaeger|prometheus|opensearch|load-generator|llm"}[5m])
        )
      )
    op: gt
    threshold: 1.0

  - id: error-budget-burn-fast-standard
    type: metric
    severity: critical
    summary: "Fast Burn Rate > 14.4x (CẢ 5m và 1h) — VI PHẠM SLO non-5xx (≥ 99.5%)"
    summary_dynamic: "Tỉ lệ lỗi 5xx TĂNG BẤT THƯỜNG so với baseline (chưa vượt SLO 0.5% — cảnh báo sớm)"
    query: >-
      (
        (
          sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name!="checkout", http_response_status_code=~"5.."}[5m]))
          / clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name!="checkout"}[5m])), 0.001)
        ) / 0.005
      )
      and
      (
        (
          sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name!="checkout", http_response_status_code=~"5.."}[1h]))
          / clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name!="checkout"}[1h])), 0.001)
        ) / 0.005 > 14.4
      )
    op: gt
    threshold: 14.4

  - id: error-budget-burn-fast-checkout
    type: metric
    severity: critical
    summary: "Fast Burn Rate > 14.4x (CẢ 5m và 1h) — luồng RA TIỀN đang vỡ SLO (≥ 99%)"
    summary_dynamic: "Lỗi checkout TĂNG BẤT THƯỜNG so với baseline (chưa vượt SLO 1% — theo dõi sát)"
    query: >-
      (
        (
          sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name="checkout", http_response_status_code=~"5.."}[5m]))
          / clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name="checkout"}[5m])), 0.001)
        ) / 0.01
      )
      and
      (
        (
          sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name="checkout", http_response_status_code=~"5.."}[1h]))
          / clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name="checkout"}[1h])), 0.001)
        ) / 0.01 > 14.4
      )
    op: gt
    threshold: 14.4

  - id: error-budget-burn-slow-standard
    type: metric
    severity: warning
    summary: "Slow Burn Rate > 6.0x (CẢ 30m và 6h) - TICKET! (Non-checkout)"
    query: >-
      (
        (
          sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name!="checkout", http_response_status_code=~"5.."}[30m]))
          / clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name!="checkout"}[30m])), 0.001)
        ) / 0.005
      )
      and
      (
        (
          sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name!="checkout", http_response_status_code=~"5.."}[6h]))
          / clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name!="checkout"}[6h])), 0.001)
        ) / 0.005 > 6.0
      )
    op: gt
    threshold: 6.0

  - id: error-budget-burn-slow-checkout
    type: metric
    severity: warning
    summary: "Slow Burn Rate > 6.0x (CẢ 30m và 6h) - TICKET! (Checkout)"
    query: >-
      (
        (
          sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name="checkout", http_response_status_code=~"5.."}[30m]))
          / clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name="checkout"}[30m])), 0.001)
        ) / 0.01
      )
      and
      (
        (
          sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name="checkout", http_response_status_code=~"5.."}[6h]))
          / clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", service_name="checkout"}[6h])), 0.001)
        ) / 0.01 > 6.0
      )
    op: gt
    threshold: 6.0

  # ---- COST SIGNAL (chi phi LLM) ----
  - id: bedrock-cost-high
    type: metric
    severity: warning
    summary: "Bedrock chi phí/giờ vượt ngưỡng - tiến gần trần budget $300/tuần"
    query: >-
      sum by (service_name) (
        increase(bedrock_cost_usd_total{service_namespace="techx-corp"}[1h])
      )
    op: gt
    threshold: 1.0

  # ---- TIN HIEU LOI GenAI (trong tam task) ----
  - id: llm-rate-limit-429
    type: log
    severity: critical
    summary: "LLM bị 429 rate-limit — nguy cơ mất tính năng tóm tắt review (sự cố BTC bơm qua flagd)"
    match_phrases:
      - "Rate limit reached"
      - "rate_limit_exceeded"
      - "429"
    window_minutes: 5
    min_count: 1

  - id: genai-assistant-failure
    type: log
    severity: critical
    summary: "GenAI assistant lỗi — product-reviews không sinh được tóm tắt/trả lời (đã rơi vào fallback)"
    # Review G2/G6: match machine marker do code emit (khong phu thuoc copy hien thi cho khach).
    # "unable to process your response" da chet sau PR#26 (code doi message sang tieng Viet).
    match_phrases:
      - "AI_SUMMARY_FALLBACK"
      - "Caught Exception"
    window_minutes: 5
    min_count: 1

  - id: genai-latency-high
    type: metric
    severity: warning
    summary: "p95 product-reviews > 2s — cuộc gọi LLM chậm, đe dọa gián tiếp SLO storefront"
    summary_dynamic: "Độ trễ product-reviews TĂNG BẤT THƯỜNG so với baseline (chưa chạm 2s — cảnh báo sớm)"
    query: >-
      histogram_quantile(0.95,
        sum by (le) (
          rate(http_server_request_duration_seconds_bucket{service_namespace="techx-corp", service_name="product-reviews"}[5m])
        )
      )
    op: gt
    threshold: 2.0

  # ---- SU CO HA TANG KINH DIEN (log) ----
  - id: db-pool-exhaustion
    type: log
    severity: critical
    summary: "DB connection pool cạn (INC-1/S01 tái diễn) — checkout có thể timeout"
    match_phrases:
      - "too many clients"
      - "connection pool"
      - "pool timeout"
      - "remaining connection slots"
    # Review K2 (recall dominates - miss = zero): min_count 3->1, keo dai window de bu FP.
    window_minutes: 10
    min_count: 1

  # Review 17/07 (chaos test that voi service `ad`): rule log-based cu KHONG BAO GIO
  # khop cho OOM dot ngot - kernel SIGKILL container truoc khi no kip ghi log ve cai
  # chet cua chinh no (xac nhan: log cua `ad` dung han truoc OOM, im lang tuyet doi qua
  # 7 lan OOMKilled that lien tiep). Doi sang k8s_status: doc thang
  # containerStatuses[].lastState.terminated tu K8s API - du lieu K8s tu ghi nhan, khong
  # phu thuoc app co log duoc hay khong. Xem ADR-012 addendum.
  - id: oom-detected
    type: k8s_status
    severity: critical
    summary: "OutOfMemory / OOMKilled — pod bị giết vì hết RAM (INC-2/S07)"
    k8s_namespace: techx-tf1
    service_label_key: "opentelemetry.io/name"
    lookback_seconds: 300
    # Giu lai match_phrases lam tai lieu/du phong tuong lai (vd neu sau nay co
    # container hook ghi log truoc khi bi kill) - KHONG con dung de gate nua.
    match_phrases:
      - "OutOfMemory"
      - "OOMKilled"
      - "Cannot allocate memory"
    window_minutes: 5
    min_count: 1

  - id: dns-resolution-error
    type: log
    severity: warning
    summary: "Lỗi phân giải DNS / NXDOMAIN (S02) — service không gọi được dependency"
    match_phrases:
      - "NXDOMAIN"
      - "no such host"
      - "name resolution"
      - "Temporary failure in name resolution"
    # Review K2 (recall dominates): min_count 3->1, window 5->10m.
    window_minutes: 10
    min_count: 1

  # SEMANTICS-VERIFIED 21/07 (Task B2 - SRE Workbook Chapter 5: Multi-window multi-burn-rate)
  # K1: multi-window multi-burn-rate cho error budget (non-5xx >= 99.5% => budget 0.5%).
  # Fire khi burn-rate 5m > 14.4x VA 1h > 14.4x (SRE workbook page-level critical).
  - id: error-budget-burn-fast
    type: metric
    severity: critical
    summary: "Fast Burn Rate > 14.4× ở CẢ 5m và 1h — tốc độ này cạn budget 24h trong dưới 2 giờ"
    query: >-
      (
        sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", http_response_status_code=~"5.."}[5m]))
        /
        clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp"}[5m])), 0.001)
        / 0.005
      )
      and
      (
        (
          sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp", http_response_status_code=~"5.."}[1h]))
          /
          clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_namespace="techx-corp"}[1h])), 0.001)
          / 0.005
        ) > 14.4
      )
    op: gt
    threshold: 14.4

  # SEMANTICS-VERIFIED 12/07 (compose + chaos productCatalogFailure): loi flag nay hien o tang gRPC
  # (rpc_grpc_status_code=13) va KHONG sinh HTTP 5xx nao -> cac rule http_server_* mu voi no.
  # Rule nay do error-ratio gRPC; do thuc te duoi chaos: product-catalog = 6.6% (fire voi threshold 5%).
  - id: grpc-error-rate-high
    type: metric
    severity: critical
    summary: "Tỉ lệ lỗi gRPC > 5% — lỗi tầng RPC (KHÔNG hiện qua HTTP 5xx, vd productCatalogFailure)"
    summary_dynamic: "Tỉ lệ lỗi gRPC TĂNG BẤT THƯỜNG so với baseline (chưa vượt 5% — cảnh báo sớm)"
    query: >-
      sum by (service_name) (rate(rpc_server_duration_milliseconds_count{rpc_grpc_status_code=~"2|4|13|14"}[5m]))
      /
      clamp_min(sum by (service_name) (rate(rpc_server_duration_milliseconds_count[5m])), 0.001)
    op: gt
    threshold: 0.05

  # K4: leading indicator cho lop su co OOM (INC-2, review J1 valkey-cart) - bat TRUOC khi kubelet kill.
  - id: memory-saturation-high
    type: metric
    severity: warning
    summary: "DRAFT K4: RAM container > 85% limit kéo dài 10m — nguy cơ OOMKill (valkey-cart/J1, INC-2)"
    # Label `namespace` o day la NAMESPACE K8S (techx-tf1 tren EKS - xem
    # platform/gitops/applications/application.yaml:31), KHONG phai service_namespace
    # cua OTel (techx-corp). Hai label khac nguon, dung nham la rule cau 0 series.
    query: >-
      max by (container) (
        avg_over_time(container_memory_working_set_bytes{namespace="techx-tf1"}[10m])
        /
        clamp_min(kube_pod_container_resource_limits{namespace="techx-tf1", resource="memory"}, 1)
      )
    op: gt
    threshold: 0.85

  # DRAFT (de bai AIOps core: "da tin hieu ... queue lag") - he co Kafka (accounting/fraud-detection).
  # PHAI verify ten metric tren Prometheus EKS (kafka receiver cua collector) truoc khi tin.
  - id: kafka-consumer-lag-high
    type: metric
    severity: warning
    # ⚠️ Metric nay KHONG ton tai tren compose local (collector khong scrape kafka consumer lag) —
    # ten metric `kafka_consumer_group_lag` la GIA DINH, PHAI verify tren Prometheus EKS + kafka exporter
    # truoc khi tin (TF1-71). Giu DRAFT, khong bat production cho toi khi verify.
    summary: "DRAFT: Kafka consumer lag > 1000 msg trong 10m — consumer tụt hậu, đơn hàng xử lý chậm"
    # namespace = namespace K8s (techx-tf1), cung ly do voi rule memory-saturation-high.
    query: >-
      max by (group) (avg_over_time(kafka_consumer_group_lag{namespace="techx-tf1"}[10m]))
    op: gt
    threshold: 1000

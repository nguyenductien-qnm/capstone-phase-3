# TF1-72 [AIOps-W2] - RBAC toi thieu cho remediation engine.
#
# CHI cap quyen tren pods trong 1 namespace (khong phai ClusterRole) - remediation
# CHI can xoa pod de kich hoat restart + doc status de tim OOM/verify readiness.
# KHONG cap quyen tren Deployment/ConfigMap/Secret/flagd o bat ky dau - action duy
# nhat trong scope la k8s_restart_pod (xoa pod), khong can gi khac.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-remediation
  namespace: techx-tf1
  labels:
    app: aiops-remediation
    team: aio03
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-remediation-pod-restart
  namespace: techx-tf1
  labels:
    app: aiops-remediation
    team: aio03
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-remediation-pod-restart
  namespace: techx-tf1
  labels:
    app: aiops-remediation
    team: aio03
subjects:
  - kind: ServiceAccount
    name: aiops-remediation
    namespace: techx-tf1
roleRef:
  kind: Role
  name: aiops-remediation-pod-restart
  apiGroup: rbac.authorization.k8s.io

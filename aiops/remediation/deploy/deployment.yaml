# TF1-72 [AIOps-W2] - deploy remediation engine chay lien tuc tren EKS (namespace techx-tf1).
#
# MANDATE-10 P2: khong con deploy/build tay. ArgoCD app `aiops` quan file nay (selfHeal),
# va job `build-aiops` trong app-build.yaml build-scan-ky-attest roi bump tag vao dong
# `image:` ben duoi. Xem giai thich day du o aiops/detector/deploy/deployment.yaml.
#
# LUU Y build context: Dockerfile cua remediation COPY ca detector/sources.py va
# detector/alerter.py, nen context la `aiops/` (cha), KHONG phai `aiops/remediation/` -
# matrix cua job build-aiops khai dung nhu vay.
#
# QUAN TRONG: pod nay khoi dong voi REMEDIATION_DRY_RUN=true (AN TOAN, chi log +
# alert, KHONG goi K8s API ghi). Chi doi sang "false" sau khi da xac nhan hanh vi
# dung qua dry-run that tren EKS (xem report/ chaos-test evidence).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-remediation
  namespace: techx-tf1
  labels:
    app: aiops-remediation
    team: aio03
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-remediation
  template:
    metadata:
      labels:
        app: aiops-remediation
    spec:
      serviceAccountName: aiops-remediation
      # MANDATE-05: non-root, khong leo thang dac quyen, drop het capability.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aiops-remediation
          # MANDATE-05: pin tag co dinh, khong dung tag troi (:latest).
          image: 804372444787.dkr.ecr.us-east-1.amazonaws.com/ecommerce-dev-techx-corp:1.1-aiops-remediation
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: PROM_URL
              value: "http://prometheus:9090"
            - name: OPENSEARCH_URL
              value: "http://opensearch:9200"
            # AN TOAN mac dinh (spec anomaly_remediation.md Sec4.1) - doi tay sang
            # "false" chi khi da san sang cho remediation act that len K8s.
            - name: REMEDIATION_DRY_RUN
              value: "true"
            # Tai dung secret webhook cua aiops-detector - remediation gui audit/escalate
            # alert vao cung kenh Discord, phan biet qua title "remediation-*".
            - name: AIOPS_SLACK_WEBHOOK_CRITICAL
              valueFrom:
                secretKeyRef:
                  name: aiops-alert
                  key: webhook
                  optional: true
          # Block style (khong phai flow `{ }`): yq cua job bump se viet lai flow-map
          # -> diff rac moi lan bump. Xem comment cung cho o aiops/detector.
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

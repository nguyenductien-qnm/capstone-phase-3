apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
  namespace: kube-system
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["m6a", "c6a", "c7i"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["large", "xlarge"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["2"]
        # CDO-217/226 (M17-R2): buộc NodePool cân nhắc ≥2 AZ để mất trọn 1 AZ vẫn còn node.
        # Exists + minValues (Karpenter v1) — không hardcode tên AZ (subnet chọn theo tag).
        - key: topology.kubernetes.io/zone
          operator: Exists
          minValues: 2
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      terminationGracePeriod: 24h
  limits:
    cpu: "16"
    memory: 64Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m
    budgets:
      - nodes: "1"

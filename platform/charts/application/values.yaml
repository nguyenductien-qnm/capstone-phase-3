# yaml-language-server: $schema=./values.schema.json
default:
  # List of environment variables applied to all components
  env:
    - name: OTEL_SERVICE_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: "metadata.labels['app.kubernetes.io/component']"
    - name: OTEL_COLLECTOR_NAME
      value: otel-collector
    - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      value: cumulative
  # Allows overriding and additions to .Values.default.env
  envOverrides: []
  #  - name: OTEL_K8S_NODE_NAME
  #    value: "someConstantValue"
  image:
    # SEED registry (image mẫu BTC cấp). Mỗi TF ĐỔI sang ECR của account mình:
    #   helm ... --set default.image.repository=<ACCOUNT>.dkr.ecr.<REGION>.amazonaws.com/techx-corp
    repository: 804372444787.dkr.ecr.us-east-1.amazonaws.com/ecommerce-dev-techx-corp
    # Overrides the image tag whose default is the chart appVersion.
    # The service's name will be applied to the end of this value.
    tag: "1.0"
    pullPolicy: Always
    pullSecrets: []
  # Default # of replicas for all components
  replicas: 1
  # default revisionHistoryLimit for all components (number of old ReplicaSets to retain)
  revisionHistoryLimit: 10
  # Default schedulingRules for all components
  schedulingRules:
    nodeSelector: {}
    affinity: {}
    tolerations: []
  # Default securityContext for all components
  securityContext: {}
  # CDO-42: HPA defaults dùng chung cho mọi component bật hpa.enabled.
  # Metric CPU-only (autoscaling/v2). behavior: scale-UP nhanh để bắt kịp flash-sale,
  # scale-DOWN chậm + stabilization 300s để không thrash và để "co xuống" mượt (MANDATE-02).
  hpa:
    targetCPUUtilizationPercentage: 70
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 30
          - type: Pods
            value: 2
            periodSeconds: 30
        selectPolicy: Max
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Pods
            value: 1
            periodSeconds: 60
        selectPolicy: Min

# CDO-42: Namespace-level resource governance (ResourceQuota + LimitRange).
# Governance tĩnh, apply được ngay, làm NỀN cho HPA:
#   - LimitRange: mọi container không khai resources vẫn có request/limit mặc định
#     -> HPA có CPU request để tính %, và ResourceQuota không bị pod "trần trụi" phá.
#   - ResourceQuota: trần cứng CPU/mem/pods của namespace -> chặn autoscale phình cost
#     (MANDATE-02: chịu tải flash-sale mà KHÔNG vượt ngân sách).
# Namespace KHÔNG hard-code: kế thừa namespace mà ArgoCD/helm deploy vào.
resourceGovernance:
  resourceQuota:
    enabled: true
    # MANDATE-02: raised from 4/8/8Gi/12Gi/40 after live load test (200 users) hit
    # `limits.cpu=8` ceiling -> HPA pods rejected with FailedCreate (exceeded quota)
    # while nodes sat ~43% idle. Sized to full HPA-max peak + headroom:
    #   peak requests.cpu~5.35 -> 6 ; peak limits.cpu~12.65 -> 14 ; fits within 5x t3.large.
    hard:
      requests.cpu: "6"
      requests.memory: 10Gi
      limits.cpu: "14"
      limits.memory: 16Gi
      pods: "70"
  limitRange:
    enabled: true
    # default = limit mặc định khi container không khai; defaultRequest = request mặc định.
    # CPU request mặc định BẮT BUỘC có để HPA CPU-utilization hoạt động.
    default:
      cpu: 200m
      memory: 128Mi
    defaultRequest:
      cpu: 50m
      memory: 64Mi
    # max: trần mỗi container, ăn khớp với ResourceQuota để 1 pod không nuốt cả quota.
    max:
      cpu: "2"
      memory: 2Gi

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

components:
  ## Demo Components are named objects (services) with several properties
  # demoService:
  ## Enable the component (service)
  #   enabled: true
  #   useDefault:
  ## Use default environment variables
  #     env: true
  ## Override Image repository and Tag. Tag will use appVersion as default.
  ## Component's name will be applied to end of this value.
  #   imageOverride: {}
  ## Optional service definitions to apply
  #   service:
  ## Service Type to use for this component. Default is ClusterIP.
  #     type: ClusterIP
  ## Service Port to use to expose this component. Default is nil
  #     port: 8080
  ## Service Node Port to use to expose this component on a NodePort service. Default is nil
  #     nodePort: 30080
  ## Service Annotations to add to this component
  #     annotations: {}
  ## Additional service ports to use to expose this component
  #   ports:
  #     - name: extraServicePort
  #       value: 8081
  ## Environment variables to add to the component's pod
  #   env:
  ## Environment variables that upsert (append + merge) into the `env` specification for this component.
  ## A variable named OTEL_RESOURCE_ATTRIBUTES_EXTRA will have its value appended to the OTEL_RESOURCE_ATTRIBUTES value.
  #   envOverrides:
  ## Pod Scheduling rules for nodeSelector, affinity, or tolerations.
  #   schedulingRules:
  #     nodeSelector: {}
  #     affinity: {}
  #     tolerations: []
  ## Pod labels to add to this component
  #   podLabels: {}
  ## Pod Annotations to add to this component
  #   podAnnotations: {}
  ## Resources for this component
  #   resources: {}
  ## Container security context for setting user ID (UID), group ID (GID) and other security policies
  #   securityContext:
  ## Ingresses rules to add for the to the component
  # ingress:
  ## Enable the creation of Ingress rules. Default is false
  #   enabled: false
  ## Annotations to add to the ingress rule
  #   annotations: {}
  ## Which Ingress class (controller) to use. Default is unspecified.
  #   ingressClassName: nginx
  ## Hosts definitions for the Ingress rule
  #   hosts:
  #     - host: demo.example.com
  ## Each host can have multiple paths/routes
  #       paths:
  #         - path: /
  #           pathType: Prefix
  #           port: 8080
  ## Optional TLS specifications for the Ingress rule
  #   tls:
  #     - secretName: demo-tls
  #       hosts:
  #         - demo.example.com
  ## Additional ingresses - only created if ingress.enabled is true
  ## Useful for when differently annotated ingress services are required
  ## Each additional ingress needs key "name" set to something unique
  #   additionalIngresses: []
  #     - name: extra-demo-ingress
  #       ingressClassName: nginx
  #       annotations: {}
  #       hosts:
  #         - host: demo.example.com
  #           paths:
  #             - path: /
  #               pathType: Prefix
  #               port: 8080
  #       tls:
  #         - secretName: demo-tls
  #           hosts:
  #             - demo.example.com
  ## Command to use in the container spec, in case you don't want to go with the default command from the image.
  #   command: []
  ## Configuration to for this component; will create a Volume, and Mount backed by an optionally created ConfigMap.
  ## The name, mountPath are required, and one of existingConfigMap or data is required.
  ## If an existing ConfigMap is not provided, the contents under data will be used for the created ConfigMap.
  #   mountedConfigMaps: []
  #     - name: my-config
  #       mountPath: /etc/config
  #       subPath:
  #       existingConfigMap: my-configmap
  #       data:
  #         my-config.yaml: |
  #           key: value
  ## Configuration to create an custom Volume
  #   additionalVolumes:
  #     - name: nginx-logs
  #       hostPath:
  #         path: /var/log/nginx
  #       type: ""
  ## Configuration to mount the custom Volume to the container
  # additionalVolumeMounts:
  #     - name: nginx-logs
  #       mountPath: /var/log/nginx
  # # Kubernetes container health check options
  #   livenessProbe: {}
  #   readinessProbe: {}
  # # Optional init container to run before the pod starts.
  #   initContainers:
  #     - name: <init-container-name>
  #       image: <init-container-image>
  #       command: [list of commands for the init container to run]
  # # Replicas for the component
  #  replicas: 1
  # # Number of old ReplicaSets to retain
  #  revisionHistoryLimit: 10
  # # Optional pod security context for setting user ID (UID), group ID (GID) and other security policies
  # # This will be applied at pod level, can be applied globally for all pods: .Values.default.podSecurityContext
  # # Or it can be applied to a specific component: .Values.components.<component-name>.podSecurityContext
  #    podSecurityContext:
  #      runAsGroup: 65534
  #      runAsNonRoot: true
  #      runAsUser: 65534

  accounting:
    enabled: true
    useDefault:
      env: true
    # Consumer Kafka async, KHÔNG HPA (scale nên theo lag, không phải CPU) và ngoài
    # critical path storefront → không cần PDB/spread (gián đoạn ngắn được Kafka đệm).
    podAnnotations:
      resource.opentelemetry.io/service.namespace: techx-corp
    env:
      - name: KAFKA_ADDR
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: brokers_sasl_scram
      - name: KAFKA_USER
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: username
      - name: KAFKA_PASSWORD
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: password
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      - name: DB_CONNECTION_STRING
        valueFrom:
          secretKeyRef:
            name: db-secret
            key: accounting-db-conn
      - name: OTEL_DOTNET_AUTO_TRACES_ENTITYFRAMEWORKCORE_INSTRUMENTATION_ENABLED
        value: "false"
    resources:
      requests:
        cpu: 100m # P0 right-size: OOMKilled 36 lần, .NET cần RAM cao
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    # INC-FIX: initContainer wait-for-kafka xóa (xem comment tại checkout). Accounting là
    # Kafka consumer async — crash/restart khi broker down là acceptable, không ảnh hưởng storefront.

  ad:
    enabled: true
    useDefault:
      env: true
    service:
      port: 8080
    podAnnotations:
      resource.opentelemetry.io/service.namespace: techx-corp
    env:
      - name: AD_PORT
        value: "8080"
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      - name: OTEL_LOGS_EXPORTER
        value: otlp
    resources:
      requests:
        cpu: 50m # CDO-42: cần cho HPA CPU-utilization
      limits:
        memory: 300Mi
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 4

  cart:
    enabled: true
    imageOverride:
      tag: "1.1-cart" # CDO-80: image mới có gRPC health tách liveness/readiness
    useDefault:
      env: true
    service:
      port: 8080
    # --- Reliability (CDO-34/80/29) ---
    podDisruptionBudget:
      maxUnavailable: 1
    topologySpread: true
    terminationGracePeriodSeconds: 30
    lifecycle:
      preStop:
        exec: { command: ["/bin/sh", "-c", "sleep 5"] }
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    startupProbe: # .NET + chờ valkey, JIT warmup lâu hơn
      grpc: { port: 8080, service: "readiness" }
      periodSeconds: 5
      failureThreshold: 30
    readinessProbe:
      grpc: { port: 8080, service: "readiness" }
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      grpc: { port: 8080, service: "liveness" }
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 6
    podAnnotations:
      resource.opentelemetry.io/service.namespace: techx-corp
    env:
      - name: CART_PORT
        value: "8080"
      - name: ASPNETCORE_URLS
        value: http://*:$(CART_PORT)
      - name: VALKEY_ADDR
        valueFrom:
          secretKeyRef:
            name: valkey-secret
            key: address
      - name: VALKEY_TLS
        value: "true"
      - name: VALKEY_AUTH_TOKEN
        valueFrom:
          secretKeyRef:
            name: valkey-secret
            key: auth_token
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
    resources:
      requests:
        cpu: 100m # CDO-42: cart ghi/đọc mỗi session, tải tăng theo user -> HPA
        memory: 64Mi # P0 right-size: thêm request, giữ limit
      limits:
        cpu: 200m
        memory: 160Mi
    hpa:
      enabled: true
      minReplicas: 2 # có PDB (CDO-34) -> min>=2, tránh Karpenter consolidate giết pod duy nhất (INC-2)
      maxReplicas: 6 # write-heavy, tải tăng tuyến tính theo user
    initContainers:
      - name: wait-for-valkey-cart
        image: busybox:1.38.0 # Pinned: do NOT use :latest — breaks reproducibility.
        env:
          - name: VALKEY_ADDR
            valueFrom:
              secretKeyRef:
                name: valkey-secret
                key: address
        # VALKEY_ADDR = "host:port" -> tách cho nc.
        command: ["sh", "-c", "HOST=$(echo \"$VALKEY_ADDR\" | cut -d: -f1); PORT=$(echo \"$VALKEY_ADDR\" | cut -d: -f2); until nc -z -v -w30 \"$HOST\" \"$PORT\"; do echo waiting for valkey-cart; sleep 2; done;"]

  checkout:
    enabled: true
    imageOverride:
      tag: "1.1-checkout" # CDO-80: image mới có gRPC health tách liveness/readiness (bump từ 1.0 để atomic với probe)
    useDefault:
      env: true
    service:
      port: 8080
    # --- Reliability (CDO-34/80/29) ---
    # replicas do HPA quản (hpa.enabled → template tự bỏ replicas cứng, tránh fight HPA).
    podDisruptionBudget:
      maxUnavailable: 1 # CDO-34: luôn còn >=1 pod khi Karpenter drain node
    topologySpread: true # CDO-34: trải 2 pod ra khác node (ScheduleAnyway)
    terminationGracePeriodSeconds: 30
    lifecycle:
      preStop:
        exec: { command: ["/bin/sh", "-c", "sleep 5"] } # CDO-29: chờ endpoint propagate, không rơi request
    deploymentStrategy: # CDO-29: rollout không hạ pod cũ trước khi pod mới Ready
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    startupProbe: # CDO-80: che boot chờ kafka (<=150s)
      grpc: { port: 8080, service: "readiness" }
      periodSeconds: 5
      failureThreshold: 30
    readinessProbe: # CDO-80: gate traffic theo dependency
      grpc: { port: 8080, service: "readiness" }
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
    livenessProbe: # CDO-80: chỉ process sống — KHÔNG phụ thuộc kafka (Option C)
      grpc: { port: 8080, service: "liveness" }
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 6
    podAnnotations:
      resource.opentelemetry.io/service.namespace: techx-corp
    env:
      - name: CHECKOUT_PORT
        value: "8080"
      - name: CART_ADDR
        value: cart:8080
      - name: CURRENCY_ADDR
        value: currency:8080
      - name: EMAIL_ADDR
        value: http://email:8080
      - name: PAYMENT_ADDR
        value: payment:8080
      - name: PRODUCT_CATALOG_ADDR
        value: product-catalog:8080
      - name: SHIPPING_ADDR
        value: http://shipping:8080
      - name: KAFKA_ADDR
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: brokers_sasl_scram
      - name: KAFKA_USER
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: username
      - name: KAFKA_PASSWORD
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: password
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
      - name: GOMEMLIMIT
        value: 96MiB # P0 right-size: nâng cùng limit để Go dùng được RAM mới
    resources:
      requests:
        cpu: 100m # P0: revenue-critical, limit cũ 20Mi quá thấp
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    hpa:
      enabled: true
      minReplicas: 2      # có PDB (CDO-34) + revenue-critical SLO 99% -> min>=2 (tránh INC-2)
      maxReplicas: 5      # cho headroom scale
    # INC-FIX: initContainer wait-for-kafka đã bị xóa. Lý do:
    # 1. Loop nc vô hạn không timeout → pod stuck mãi khi broker down (chính là nguyên nhân incident này).
    # 2. startupProbe (failureThreshold:30 × 5s = 150s) đã đảm nhiệm vai trò chờ readiness,
    #    bao gồm kafka connectivity check qua gRPC health endpoint của app.
    # 3. Nếu kafka chết thật, kubelet tự restart pod sau 150s → behavior đúng hơn loop vô hạn.
    # Ref: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/#understanding-init-containers

  currency:
    enabled: true
    useDefault:
      env: true
    service:
      port: 8080
    podAnnotations:
      resource.opentelemetry.io/service.namespace: techx-corp
    env:
      - name: CURRENCY_PORT
        value: "8080"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
      - name: VERSION
        value: "{{ .Chart.AppVersion }}"
      - name: IPV6_ENABLED
        value: "false"
    resources:
      requests:
        cpu: 50m # CDO-42: cần cho HPA CPU-utilization
      limits:
        memory: 20Mi
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 4

  email:
    enabled: true
    useDefault:
      env: true
    service:
      port: 8080
    podAnnotations:
      resource.opentelemetry.io/service.namespace: techx-corp
    env:
      - name: EMAIL_PORT
        value: "8080"
      - name: APP_ENV
        value: production
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
    resources:
      limits:
        memory: 100Mi

  fraud-detection:
    enabled: true
    useDefault:
      env: true
    # Consumer Kafka async, KHÔNG HPA (scale nên theo lag, không phải CPU) và ngoài
    # critical path storefront → không cần PDB/spread (gián đoạn ngắn được Kafka đệm).
    podAnnotations:
      resource.opentelemetry.io/service.namespace: techx-corp
    env:
      - name: KAFKA_ADDR
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: brokers_sasl_scram
      - name: KAFKA_USER
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: username
      - name: KAFKA_PASSWORD
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: password
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      - name: OTEL_INSTRUMENTATION_KAFKA_EXPERIMENTAL_SPAN_ATTRIBUTES
        value: "true"
      - name: OTEL_INSTRUMENTATION_MESSAGING_EXPERIMENTAL_RECEIVE_TELEMETRY_ENABLED
        value: "true"
    resources:
      limits:
        memory: 300Mi
    # INC-FIX: initContainer wait-for-kafka xóa (xem comment tại checkout). Fraud detection là
    # Kafka consumer async — crash/restart khi broker down là acceptable, không ảnh hưởng storefront.

  frontend:
    enabled: true
    useDefault:
      env: true
    service:
      port: 8080
    # --- Reliability (CDO-34/80/29) ---
    podDisruptionBudget:
      maxUnavailable: 1
    topologySpread: true
    terminationGracePeriodSeconds: 30
    lifecycle:
      preStop:
        exec: { command: ["/bin/sh", "-c", "sleep 5"] }
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    startupProbe: # Next.js HTTP — không gRPC
      httpGet: { path: /, port: 8080 }
      periodSeconds: 5
      failureThreshold: 24
    readinessProbe:
      httpGet: { path: /, port: 8080 }
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      httpGet: { path: /, port: 8080 }
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 6
    podAnnotations:
      resource.opentelemetry.io/service.namespace: techx-corp
    env:
      - name: FRONTEND_PORT
        value: "8080"
      - name: PORT
        value: $(FRONTEND_PORT)
      - name: FRONTEND_ADDR
        value: :8080
      - name: AD_ADDR
        value: ad:8080
      - name: CART_ADDR
        value: cart:8080
      - name: CHECKOUT_ADDR
        value: checkout:8080
      - name: CURRENCY_ADDR
        value: currency:8080
      - name: PRODUCT_CATALOG_ADDR
        value: product-catalog:8080
      - name: PRODUCT_REVIEWS_ADDR
        value: product-reviews:3551
      - name: RECOMMENDATION_ADDR
        value: recommendation:8080
      - name: SHIPPING_ADDR
        value: http://shipping:8080
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: ENV_PLATFORM
        value: kubernetes
      - name: OTEL_COLLECTOR_HOST
        value: $(OTEL_COLLECTOR_NAME)
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
      - name: WEB_OTEL_SERVICE_NAME
        value: frontend-web
      - name: PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
        value: http://localhost:8080/otlp-http/v1/traces # This expects users to use `kubectl port-forward ...`
    resources:
      requests:
        cpu: 100m # CDO-42: frontend Next.js, hot-path browse -> HPA
      limits:
        memory: 250Mi
    hpa:
      enabled: true
      minReplicas: 2 # có PDB (CDO-34) -> min>=2, tránh INC-2 khi node consolidate
      maxReplicas: 6
    securityContext:
      runAsUser: 1001 # nextjs
      runAsGroup: 1001
      runAsNonRoot: true

  frontend-proxy:
    enabled: true
    imageOverride:
      tag: "1.0-frontend-proxy"
    useDefault:
      env: true
    service:
      port: 8080
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: alb
      annotations:
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:804372444787:certificate/58a4ee05-8248-4e70-bc30-f7dfe47e0720"
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
      # ALB phục vụ tên ORIGIN, không phải tên chính. CloudFront giữ tên chính
      # (ecommerce.nguyenductien.cloud) và lấy nội dung từ đây -> hai bên không
      # tranh nhau một tên miền.
      # external-dns đọc host này + địa chỉ ALB ở ingress.status -> tự tạo record.
      # PHẢI khớp local.origin_hostname trong terraform/environments/sandbox/main.tf.
      # Tên 1 cấp con để khớp cert wildcard *.nguyenductien.cloud (wildcard KHÔNG
      # cover 2 cấp: origin.ecommerce.* sẽ lỗi TLS).
      # ĐỪNG thêm ecommerce.nguyenductien.cloud vào đây: external-dns (sources:
      # ingress, policy: upsert-only) sẽ tạo record ecommerce -> ALB, ghi đè alias
      # trỏ CloudFront -> khách đi thẳng ALB, bỏ qua CDN. upsert-only không xoá
      # record, nên gỡ host ra cũng không tự khôi phục -> phải sửa tay.
      hosts:
        - host: "origin-ecommerce.nguyenductien.cloud"
          paths:
            - path: /
              pathType: Prefix
              port: 8080
    # --- Reliability (CDO-34/80/29) — cửa ngõ storefront, quan trọng nhất ---
    podDisruptionBudget:
      maxUnavailable: 1
    topologySpread: true
    terminationGracePeriodSeconds: 30
    lifecycle:
      preStop:
        exec: { command: ["/bin/sh", "-c", "sleep 5"] } # cực quan trọng cho Envoy: drain kết nối trước khi tắt
    deploymentStrategy: # CDO-29: zero-downtime khi rollout Envoy cho Mandate 01
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    # CDO-80: Envoy config (envoy.tmpl.yaml) KHÔNG bật admin → không có /ready:10000.
    # Dùng tcpSocket:8080 (listener chính) — Envoy bind ngay khi khởi động = process sống + listener mở.
    # MANDATE-01 dùng image đã rebuild; digest annotation buộc rollout vì tag 1.0 được tái sử dụng.
    readinessProbe:
      tcpSocket: { port: 8080 }
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      tcpSocket: { port: 8080 }
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 6
    podAnnotations:
      mandate-01/image-index-digest: "sha256:ea6155465ee5877e570fcc412b68b2ae0fb4ef15bf3a0e2785bc12a7dd37235f"
      resource.opentelemetry.io/service.namespace: techx-corp
      io.opentelemetry.discovery.metrics/enabled: "true"
      io.opentelemetry.discovery.metrics/scraper: httpcheck
      io.opentelemetry.discovery.metrics/config: |
        targets:
          - endpoint: "http://`endpoint`"
    env:
      - name: ENVOY_PORT
        value: "8080"
      - name: ENVOY_ADDR
        value: "0.0.0.0"
      - name: ENVOY_ADMIN_PORT
        value: "10000"
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: FLAGD_UI_HOST
        value: flagd
      - name: FLAGD_UI_PORT
        value: "4000"
      - name: FRONTEND_HOST
        value: frontend
      - name: FRONTEND_PORT
        value: "8080"
      - name: GRAFANA_HOST
        value: grafana
      - name: GRAFANA_PORT
        value: "80"
      - name: IMAGE_PROVIDER_HOST
        value: image-provider
      - name: IMAGE_PROVIDER_PORT

# yaml-language-server: $schema=./values.schema.json
default:
  # List of environment variables applied to all components
  env:
    - name: OTEL_SERVICE_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: "metadata.labels['app.kubernetes.io/component']"
    - name: OTEL_COLLECTOR_NAME
      value: otel-collector
    - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      value: cumulative
  # Allows overriding and additions to .Values.default.env
  envOverrides: []
  #  - name: OTEL_K8S_NODE_NAME
  #    value: "someConstantValue"
  image:
    # SEED registry (image mẫu BTC cấp). Mỗi TF ĐỔI sang ECR của account mình:
    #   helm ... --set default.image.repository=<ACCOUNT>.dkr.ecr.<REGION>.amazonaws.com/techx-corp
    repository: 804372444787.dkr.ecr.us-east-1.amazonaws.com/ecommerce-dev-techx-corp
    # Overrides the image tag whose default is the chart appVersion.
    # The service's name will be applied to the end of this value.
    tag: "1.0"
    pullPolicy: Always
    pullSecrets: []
  # Default # of replicas for all components
  replicas: 1
  # default revisionHistoryLimit for all components (number of old ReplicaSets to retain)
  revisionHistoryLimit: 10
  # Default schedulingRules for all components
  schedulingRules:
    nodeSelector: {}
    affinity: {}
    tolerations: []
  # Default securityContext for all components
  # Default securityContext for all components
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
  # Default podSecurityContext for all components
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  # CDO-220 (M17-R4): mặc định không mount token ServiceAccount cho mọi pod.
  # Override per-component: components.<name>.automountServiceAccountToken: true (chỉ service cần K8s API).
  automountServiceAccountToken: false

# CDO-219/230 (M17-R3): NetworkPolicy khoanh mạng (chống lateral movement + chặn egress).
# Mặc định TẮT để review kỹ trước khi bật. Bật: --set networkPolicy.enabled=true
networkPolicy:
  enabled: false
  # DNS egress (bắt buộc, nếu không gọi theo tên service sẽ hỏng).
  allowDNS: true
  # Cho phép EGRESS trong cùng namespace (caller gọi callee). Containment nằm ở ingress per-service.
  allowIntraNamespaceEgress: true
  # Cổng flagd — mọi pod app được ingress tới flagd ở cổng này (config chung, không đụng flagd).
  flagdPort: 8013
  # Service ở rìa public (nhận traffic từ ALB/Internet) — mở ingress từ mọi nguồn.
  publicIngress:
    - frontend-proxy
  # Observability (subchart -> nhãn app.kubernetes.io/name, KHÁC opentelemetry.io/name).
  observability:
    # Được phép scrape/nhận từ MỌI pod app (nếu thiếu -> mất metrics -> mất dashboard SLO).
    scrapers:
      - prometheus
      - opentelemetry-collector
    # Sink nhận telemetry ingress từ mọi pod trong namespace.
    sinks:
      - opentelemetry-collector
      - jaeger
      - prometheus
    # Pod cần egress tới Kubernetes API server (443) — SD/list-watch/k8sattributes.
    apiServerEgress:
      - prometheus
      - kube-state-metrics
      - opentelemetry-collector
      # reloader watch ConfigMap/Secret qua API server để restart pod khi config đổi;
      # thiếu rule này thì default-deny cắt watch -> reloader im lặng ngừng hoạt động.
      - reloader
      # grafana chạy 3 container k8s-sidecar (dashboard/datasource/alert) watch ConfigMap
      # qua API server. Đây là ca hỏng IM LẶNG nguy hiểm nhất nhóm: sidecar retry vô hạn
      # chứ không crash, pod vẫn 4/4 Running, dashboard cũ vẫn hiện vì đã nằm trên đĩa —
      # chỉ dashboard/datasource MỚI là không bao giờ xuất hiện. Kiểm tra "pod có khỏe
      # không" KHÔNG bắt được ca này; phải đọc log sidecar.
      - grafana
    # Dải chứa ENI control-plane (API server IP xoay) — VPC CIDR cluster này.
    apiServerCIDR: 10.0.0.0/16
    # ClusterIP của Service `kubernetes` (đích TRƯỚC DNAT khi client gọi
    # kubernetes.default). Bắt buộc phải mở kèm apiServerCIDR — xem chú thích trong
    # templates/networkpolicy.yaml. Luôn là IP đầu của service CIDR.
    apiServerClusterIP: 172.20.0.1/32
    # Scraper còn phải lấy metrics NGOÀI namespace: kubelet/cadvisor trên node và pod
    # hạ tầng ở kube-system (CoreDNS, ALB controller). Thiếu phần này thì default-deny
    # cắt 6 target node + CoreDNS -> dashboard tài nguyên trống (verify develop 22/07/2026).
    scraperEgress:
      # Cổng kubelet trên node (job kubernetes-nodes + kubernetes-nodes-cadvisor).
      kubeletPort: 10250
      # Dải chứa NODE (kubelet), KHÁC ý nghĩa với apiServerCIDR (dải chứa ENI
      # control-plane) dù hiện tại hai dải trùng nhau. Tách riêng để lỡ ai thu hẹp
      # apiServerCIDR xuống đúng subnet control-plane — việc hardening rất hợp lý —
      # thì scrape kubelet không gãy theo. Gãy kiểu đó rất khó truy: triệu chứng là
      # 6 target node DOWN + dashboard tài nguyên trống, cách nguyên nhân rất xa.
      nodeCIDR: 10.0.0.0/16
      # Namespace hạ tầng cho phép scrape cross-namespace.
      infraNamespaces:
        - kube-system
      # Cổng metrics của pod hạ tầng: 9153 CoreDNS, 8080 aws-load-balancer-controller.
      infraPorts:
        - 9153
        - 8080
  # Egress tới managed datastore NGOÀI cluster (kafka/valkey/postgresql tắt in-cluster ->
  # app gọi ElastiCache/MSK/RDS ở IP VPC 10.x; default-deny egress sẽ chặn nếu thiếu rule).
  datastoreEgress:
    vpcCidr: 10.0.0.0/16
    stores:
      - name: elasticache      # Redis/Valkey (VALKEY_ADDR, TLS)
        ports: [6379]
        consumers: [cart, product-reviews]
      - name: msk              # Kafka (KAFKA_ADDR; 9092 plaintext / 9094 TLS / 9096 SASL)
        ports: [9092, 9094, 9096]
        consumers: [accounting, checkout, fraud-detection]
      - name: rds              # Postgres (DB_CONNECTION_STRING)
        ports: [5432]
        consumers: [accounting, product-catalog, product-reviews]
  # per-service INGRESS: mỗi đích chỉ nhận từ đúng caller (đồ thị phụ thuộc đã xác minh từ *_ADDR).
  # flagd xử lý riêng ở trên; DB/queue (valkey-cart, kafka) và service lá cũng liệt kê.
  serviceIngress:
    cart: [frontend, checkout, shopping-copilot]
    checkout: [frontend]
    currency: [frontend, checkout]
    product-catalog: [frontend, checkout, recommendation, shopping-copilot]
    product-reviews: [frontend, shopping-copilot]
    recommendation: [frontend]
    shipping: [frontend, checkout]
    payment: [checkout]
    email: [checkout]
    ad: [frontend]
    shopping-copilot: [frontend]
    quote: [shipping]
    ml-guard: [product-reviews, shopping-copilot]
    valkey-cart: [cart]
    kafka: [accounting, checkout, fraud-detection]
    llm: [shopping-copilot]
    image-provider: [frontend-proxy, frontend]
    frontend: [frontend-proxy, load-generator]

  # Pod gắn label `egress-internet: "true"` mới được ra Internet (payment provider, Bedrock...).

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

components:
  ## Demo Components are named objects (services) with several properties
  # demoService:
  ## Enable the component (service)
  #   enabled: true
  #   useDefault:
  ## Use default environment variables
  #     env: true
  ## Override Image repository and Tag. Tag will use appVersion as default.
  ## Component's name will be applied to end of this value.
  #   imageOverride: {}
  ## Optional service definitions to apply
  #   service:
  ## Service Type to use for this component. Default is ClusterIP.
  #     type: ClusterIP
  ## Service Port to use to expose this component. Default is nil
  #     port: 8080
  ## Service Node Port to use to expose this component on a NodePort service. Default is nil
  #     nodePort: 30080
  ## Service Annotations to add to this component
  #     annotations: {}
  ## Additional service ports to use to expose this component
  #   ports:
  #     - name: extraServicePort
  #       value: 8081
  ## Environment variables to add to the component's pod
  #   env:
  ## Environment variables that upsert (append + merge) into the `env` specification for this component.
  ## A variable named OTEL_RESOURCE_ATTRIBUTES_EXTRA will have its value appended to the OTEL_RESOURCE_ATTRIBUTES value.
  #   envOverrides:
  ## Pod Scheduling rules for nodeSelector, affinity, or tolerations.
  #   schedulingRules:
  #     nodeSelector: {}
  #     affinity: {}
  #     tolerations: []
  ## Pod labels to add to this component
  #   podLabels: {}
  ## Pod Annotations to add to this component
  #   podAnnotations: {}
  ## Resources for this component
  #   resources: {}
  ## Container security context for setting user ID (UID), group ID (GID) and other security policies
  #   securityContext:
  ## Ingresses rules to add for the to the component
  # ingress:
  ## Enable the creation of Ingress rules. Default is false
  #   enabled: false
  ## Annotations to add to the ingress rule
  #   annotations: {}
  ## Which Ingress class (controller) to use. Default is unspecified.
  #   ingressClassName: nginx
  ## Hosts definitions for the Ingress rule
  #   hosts:
  #     - host: demo.example.com
  ## Each host can have multiple paths/routes
  #       paths:
  #         - path: /
  #           pathType: Prefix
  #           port: 8080
  ## Optional TLS specifications for the Ingress rule
  #   tls:
  #     - secretName: demo-tls
  #       hosts:
  #         - demo.example.com
  ## Additional ingresses - only created if ingress.enabled is true
  ## Useful for when differently annotated ingress services are required
  ## Each additional ingress needs key "name" set to something unique
  #   additionalIngresses: []
  #     - name: extra-demo-ingress
  #       ingressClassName: nginx
  #       annotations: {}
  #       hosts:
  #         - host: demo.example.com
  #           paths:
  #             - path: /
  #               pathType: Prefix
  #               port: 8080
  #       tls:
  #         - secretName: demo-tls
  #           hosts:
  #             - demo.example.com
  ## Command to use in the container spec, in case you don't want to go with the default command from the image.
  #   command: []
  ## Configuration to for this component; will create a Volume, and Mount backed by an optionally created ConfigMap.
  ## The name, mountPath are required, and one of existingConfigMap or data is required.
  ## If an existing ConfigMap is not provided, the contents under data will be used for the created ConfigMap.
  #   mountedConfigMaps: []
  #     - name: my-config
  #       mountPath: /etc/config
  #       subPath:
  #       existingConfigMap: my-configmap
  #       data:
  #         my-config.yaml: |
  #           key: value
  ## Configuration to create an custom Volume
  #   additionalVolumes:
  #     - name: nginx-logs
  #       hostPath:
  #         path: /var/log/nginx
  #       type: ""
  ## Configuration to mount the custom Volume to the container
  # additionalVolumeMounts:
  #     - name: nginx-logs
  #       mountPath: /var/log/nginx
  # # Kubernetes container health check options
  #   livenessProbe: {}
  #   readinessProbe: {}
  # # Optional init container to run before the pod starts.
  #   initContainers:
  #     - name: <init-container-name>
  #       image: <init-container-image>
  #       command: [list of commands for the init container to run]
  # # Replicas for the component
  #  replicas: 1
  # # Number of old ReplicaSets to retain
  #  revisionHistoryLimit: 10
  # # Optional pod security context for setting user ID (UID), group ID (GID) and other security policies
  # # This will be applied at pod level, can be applied globally for all pods: .Values.default.podSecurityContext
  # # Or it can be applied to a specific component: .Values.components.<component-name>.podSecurityContext
  #    podSecurityContext:
  #      runAsGroup: 65534
  #      runAsNonRoot: true
  #      runAsUser: 65534

  accounting:
    enabled: true
    useDefault:
      env: true
    # Consumer Kafka async, KHÔNG HPA (scale nên theo lag, không phải CPU) và ngoài
    # critical path storefront → không cần PDB/spread (gián đoạn ngắn được Kafka đệm).
    annotations:
      reloader.stakater.com/auto: "true"
    podAnnotations:
      resource.opentelemetry.io/service.namespace: techx-corp
    terminationGracePeriodSeconds: 30
    lifecycle:
      preStop:
        exec: { command: ["/bin/sh", "-c", "sleep 5"] }
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    env:
      - name: KAFKA_ADDR
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: brokers_sasl_scram
      - name: KAFKA_USER
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: username
      - name: KAFKA_PASSWORD
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: password
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      - name: DB_CONNECTION_STRING
        valueFrom:
          secretKeyRef:
            name: db-secret
            key: accounting-db-conn
      - name: OTEL_DOTNET_AUTO_TRACES_ENTITYFRAMEWORKCORE_INSTRUMENTATION_ENABLED
        value: "false"
    resources:
      requests:
        cpu: 100m         # P0 right-size: OOMKilled 36 lần, .NET cần RAM cao (PR#49, restore sau PR#106)
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    initContainers:
      - name: wait-for-kafka
        image: busybox:1.38.0   # Pinned: do NOT use :latest — breaks reproducibility.
        # Broker lấy từ msk-secret (ESO sync từ Secrets Manager) — KHÔNG hardcode:
        # MSK tạo lại thì AWS cấp ID mới, hostname cũ chết DNS -> init loop vô hạn.
        env:
          - name: KAFKA_ADDR
            valueFrom:
              secretKeyRef:
                name: msk-secret
                key: brokers_sasl_scram
        command:
          - sh
          - -c
          - |
            # brokers_sasl_scram = "host1:9096,host2:9096" -> lấy broker đầu tiên
            broker=$(echo "$KAFKA_ADDR" | cut -d, -f1)
            host=${broker%:*}; port=${broker##*:}
            until nc -z -v -w30 "$host" "$port"; do echo waiting for kafka; sleep 2; done
        securityContext:
          runAsUser: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi

  ad:
    enabled: true
    useDefault:
      env: true
    service:
      port: 8080
    topologySpread: true   # M17-R2: trải pod ra ≥2 AZ (browse-path SLO)
    podDisruptionBudget:   # M17-R2: drain-az không hạ cả 2 pod cùng lúc
      maxUnavailable: 1
    hpa:
      enabled: true
      minReplicas: 2       # M17-R2: HA, mất 1 AZ vẫn còn pod
      maxReplicas: 4
    podAnnotations:
      resource.opentelemetry.io/service.namespace: techx-corp
    env:
      - name: AD_PORT
        value: "8080"
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      - name: OTEL_LOGS_EXPORTER
        value: otlp
    resources:
      requests:
        cpu: 50m          # CDO-42: cần cho HPA CPU-utilization
        memory: 128Mi     # Mandate 5: bắt buộc đủ 4 field requests/limits
      limits:
        cpu: 200m
        memory: 300Mi
    securityContext:
      runAsUser: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
  cart:
    enabled: true
    imageOverride:
      tag: "1.1-cart-ae89fa2" # CDO-80 gRPC health; incident 2026-07-16: tag tran bi ECR lifecycle xoa, rebuild
    # Image chạy root (Dockerfile upstream không có USER) -> ép UID từ chart.
    # Template dùng `default` (thay cả block, KHÔNG merge) nên phải lặp lại đủ field
    # của defaultValues.securityContext, nếu không sẽ mất drop ALL.
    # Verify: docker run --user 1000:1000 <image 1.1-cart> -> chạy tới logic app.
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop:
          - ALL
    useDefault:
      env: true
    service:
      port: 8080
    # --- Reliability (CDO-34/80/29) ---
    podDisruptionBudget:
      maxUnavailable: 1
    topologySpread: true
    terminationGracePeriodSeconds: 30
    lifecycle:
      preStop:
        exec: { command: ["/bin/sh", "-c", "sleep 5"] }
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    startupProbe: # .NET + chờ valkey, JIT warmup lâu hơn
      grpc: { port: 8080, service: "readiness" }
      periodSeconds: 5
      failureThreshold: 30
    readinessProbe:
      grpc: { port: 8080, service: "readiness" }
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      grpc: { port: 8080, service: "liveness" }
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 6
    podAnnotations:
      resource.opentelemetry.io/service.namespace: techx-corp
    env:
      - name: CART_PORT
        value: "8080"
      - name: ASPNETCORE_URLS
        value: http://*:$(CART_PORT)
      - name: VALKEY_ADDR
        valueFrom:
          secretKeyRef:
            name: valkey-secret
            key: address
      - name: VALKEY_TLS
        value: "true"
      - name: VALKEY_AUTH_TOKEN
        valueFrom:
          secretKeyRef:
            name: valkey-secret
            key: auth_token
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
    resources:
      requests:
        cpu: 100m         # CDO-42: cart ghi/đọc mỗi session, tải tăng theo user -> HPA (PR#49, restore sau PR#106)
        memory: 64Mi      # P0 right-size: thêm request, giữ limit
      limits:
        cpu: 200m
        memory: 160Mi
    hpa:
      enabled: true
      minReplicas: 2 # có PDB (CDO-34) -> min>=2, tránh Karpenter consolidate giết pod duy nhất (INC-2)
      maxReplicas: 6 # write-heavy, tải tăng tuyến tính theo user
    initContainers:
      - name: wait-for-valkey-cart
        image: busybox:1.38.0 # Pinned: do NOT use :latest — breaks reproducibility.
        env:
          - name: VALKEY_ADDR
            valueFrom:
              secretKeyRef:
                name: valkey-secret
                key: address
        # VALKEY_ADDR = "host:port" -> tách cho nc.
        command: ["sh", "-c", "HOST=$(echo \"$VALKEY_ADDR\" | cut -d: -f1); PORT=$(echo \"$VALKEY_ADDR\" | cut -d: -f2); until nc -z -v -w30 \"$HOST\" \"$PORT\"; do echo waiting for valkey-cart; sleep 2; done;"]
        securityContext:
          runAsUser: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi

  checkout:
    enabled: true
    imageOverride:
      tag: "1.1-checkout" # CDO-80: image mới có gRPC health tách liveness/readiness (bump từ 1.0 để atomic với probe)
    useDefault:
      env: true
    service:
      port: 8080
    # --- Reliability (CDO-34/80/29) ---
    # replicas do HPA quản (hpa.enabled → template tự bỏ replicas cứng, tránh fight HPA).
    podDisruptionBudget:
      maxUnavailable: 1 # CDO-34: luôn còn >=1 pod khi Karpenter drain node
    topologySpread: true # CDO-34: trải 2 pod ra khác node (ScheduleAnyway)
    terminationGracePeriodSeconds: 30
    lifecycle:
      preStop:
        exec: { command: ["/bin/sh", "-c", "sleep 5"] } # CDO-29: chờ endpoint propagate, không rơi request
    deploymentStrategy: # CDO-29: rollout không hạ pod cũ trước khi pod mới Ready
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    startupProbe: # CDO-80: che boot chờ kafka (<=150s)
      grpc: { port: 8080, service: "readiness" }
      periodSeconds: 5
      failureThreshold: 30
    readinessProbe: # CDO-80: gate traffic theo dependency
      grpc: { port: 8080, service: "readiness" }
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
    livenessProbe: # CDO-80: chỉ process sống — KHÔNG phụ thuộc kafka (Option C)
      grpc: { port: 8080, service: "liveness" }
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 6
    podAnnotations:
      resource.opentelemetry.io/service.namespace: techx-corp
    env:
      - name: CHECKOUT_PORT
        value: "8080"
      - name: CART_ADDR
        value: cart:8080
      - name: CURRENCY_ADDR
        value: currency:8080
      - name: EMAIL_ADDR
        value: http://email:8080
      - name: PAYMENT_ADDR
        value: payment:8080
      - name: PRODUCT_CATALOG_ADDR
        value: product-catalog:8080
      - name: SHIPPING_ADDR
        value: http://shipping:8080
      - name: KAFKA_ADDR
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: brokers_sasl_scram
      - name: KAFKA_USER
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: username
      - name: KAFKA_PASSWORD
        valueFrom:
          secretKeyRef:
            name: msk-secret
            key: password
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
      - name: GOMEMLIMIT
        value: 96MiB # P0 right-size: nâng cùng limit để Go dùng được RAM mới
    resources:
      requests:
        cpu: 100m # P0: revenue-critical, limit cũ 20Mi quá thấp
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi # >= request 64Mi; khớp GOMEMLIMIT 96MiB ở trên
    hpa:
      enabled: true
      minReplicas: 2      # có PDB (CDO-34) + revenue-critical SLO 99% -> min>=2 (tránh INC-2)

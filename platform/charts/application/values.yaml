    type: gp3
    encrypted: "true"

opentelemetry-collector:
  enabled: true
  image:
    repository: "otel/opentelemetry-collector-contrib"
  fullnameOverride: otel-collector
  mode: daemonset
  presets:
    hostMetrics:
      enabled: true
    kubernetesAttributes:
      enabled: true
    kubeletMetrics:
      enabled: true
    clusterMetrics:
      enabled: true
    annotationDiscovery:
      metrics:
        enabled: true
  resources:
    limits:
      memory: 200Mi
  service:
    enabled: true
  ports:
    metrics:
      enabled: true
  config:
    receivers:
      otlp:
        protocols:
          http:
            # Since this collector needs to receive data from the web, enable cors for all origins
            # `allowed_origins` can be refined for your deployment domain
            cors:
              allowed_origins:
                - "http://*"
                - "https://*"
      kafkametrics:
        scrapers:
          - brokers
          - topics
          - consumers
        brokers:
          - kafka:9092
        collection_interval: 10s
    exporters:
      otlp/jaeger:
        endpoint: jaeger:4317
        tls:
          insecure: true
        sending_queue:
          batch: {}
      otlphttp/prometheus:
        endpoint: http://prometheus:9090/api/v1/otlp
        tls:
          insecure: true
        sending_queue:
          batch: {}
      opensearch:
        logs_index: otel-logs
        logs_index_time_format: "yyyy-MM-dd"
        http:
          endpoint: http://opensearch:9200
          tls:
            insecure: true

    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      resourcedetection:
        detectors: [env, system]
      transform:
        error_mode: ignore
        trace_statements:
          # Sanitize spans to prevent span metrics cardinality explosion
          # caused by non-compliant high cardinality span names:
          # 1. Define missing http.route on key HTTP operations for meaningful operation names
          # 2. Then normalize span names; http server spans lacking http.route default to operations "GET", "POST", etc.
          - context: span
            # FRONTEND SERVICE
            conditions:
              - span.kind == SPAN_KIND_SERVER and resource.attributes["service.name"] == "frontend" and span.attributes["http.route"] == nil
            statements:
              # Workaround for Next.js high cardinality span name issue: https://github.com/vercel/next.js/issues/54694
              - set(span.attributes["http.route"], "/api/cart") where IsMatch(span.attributes["http.target"], "\\/api\\/cart") # e.g. # /api/cart
              - set(span.attributes["http.route"], "/api/checkout") where IsMatch(span.attributes["http.target"], "\\/api\\/checkout") # e.g. # /api/checkout
              - set(span.attributes["http.route"], "/api/products/{productId}") where IsMatch(span.attributes["http.target"], "\\/api\\/products\\/.*") # e.g. /api/products/1YMWWN1N4O
              - set(span.attributes["http.route"], "/api/recommendations") where IsMatch(span.attributes["http.target"], "\\/api\\/recommendations") # e.g. # /api/recommendations?productIds=...
              - set(span.attributes["http.route"], "/api/data") where IsMatch(span.attributes["http.target"], "\\/api\\/data.*") # e.g. # " /api/data?contextKeys=telescopes" or /api/data/?contextKeys=cameras
          - context: span
            statements:
              # SANITIZE ALL SPAN NAMES TO PREVENT CARDINALITY EXPLOSION
              - set_semconv_span_name("1.37.0", "unsanitized_span_name")
      resource:
        attributes:
          - key: service.instance.id
            from_attribute: k8s.pod.uid
            action: insert

    connectors:
      spanmetrics: {}

    service:
      pipelines:
        traces:
          processors:
            [memory_limiter, resourcedetection, resource, transform, batch]
          exporters: [otlp/jaeger, debug, spanmetrics]
        metrics:
          receivers: [otlp, kafkametrics, spanmetrics]
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [otlphttp/prometheus, debug]
        logs:
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [opensearch, debug]
      telemetry:
        metrics:
          level: detailed
          readers:
            - periodic:
                interval: 10000
                timeout: 5000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://otel-collector:4318
                    insecure: true

jaeger:
  enabled: true
  fullnameOverride: jaeger
  jaeger:
    storage:
      type: memory
    extraEnv:
      - name: MEMORY_MAX_TRACES
        value: "25000"
      - name: PROMETHEUS_ADDR
        value: prometheus:9090
      - name: OTEL_COLLECTOR_HOST
        value: otel-collector
      - name: OTEL_COLLECTOR_PORT_HTTP
        value: "4318"
      - name: JAEGER_HOST
        value: "0.0.0.0"
      - name: JAEGER_GRPC_PORT
        value: "4317"
    resources:
      requests:
        cpu: 100m # P0 right-size: memory storage phình
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 1Gi       # PR#49 restore; limit cũ 100Mi < request 256Mi -> spec invalid, K8s reject
  userconfig:
    service:
      extensions: [jaeger_storage, jaeger_query, healthcheckv2]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [jaeger_storage_exporter]
      telemetry:
        resource:
          service.name: jaeger
        metrics:
          level: detailed
          readers:
            - periodic:
                interval: 10000
                timeout: 5000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
                    insecure: true
        logs:
          level: info
    extensions:
      healthcheckv2:
        use_v2: true
        http:
          endpoint: 0.0.0.0:13133
      jaeger_query:
        storage:
          traces: memory_backend
          metrics: metrics_backend
        base_path: /jaeger/ui
      jaeger_storage:
        backends:
          memory_backend:
            memory:
              max_traces: ${env:MEMORY_MAX_TRACES}
        metric_backends:
          metrics_backend:
            prometheus:
              endpoint: "http://${env:PROMETHEUS_ADDR}"
              normalize_calls: true
              normalize_duration: true

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:JAEGER_HOST}:${env:JAEGER_GRPC_PORT}

    processors:
      batch: {}

    exporters:
      jaeger_storage_exporter:
        trace_storage: memory_backend

prometheus:
  enabled: true
  alertmanager:
    enabled: false
  configmapReload:
    prometheus:
      enabled: false
  kube-state-metrics:
    # Required by the Kubernetes scaling dashboard (Deployment/HPA/Pod/Node state).
    enabled: true
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  server:
    fullnameOverride: prometheus
    extraFlags:
      - "enable-feature=exemplar-storage"
      - "web.enable-otlp-receiver"
    retention: 7d
    tsdb:
      out_of_order_time_window: 30m
    otlp:
      keep_identifying_resource_attributes: true
      # Recommended attributes to be promoted to labels.
      promote_resource_attributes:
        - service.instance.id
        - service.name
        - service.namespace
        - service.version
        - cloud.availability_zone
        - cloud.region
        - deployment.environment.name
        # When deploying on Kubernetes, resource attributes used to identify the
        # kubernetes resources in dashboards and alerts.
        - k8s.cluster.name
        - k8s.container.name
        - k8s.cronjob.name
        - k8s.daemonset.name
        - k8s.deployment.name
        - k8s.job.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.pod.name
        - k8s.replicaset.name
        - k8s.statefulset.name
        - container.name
        # When deploying on VMs, resource attributes used to identify
        # the host in dashboards and alerts.
        - host.name
        # PostgreSQL resource attributes produced by the OTel Collector PostgreSQL receiver
        # and used in dashboards and alerts.
        # See https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/receiver/postgresqlreceiver/metadata.yaml
        - postgresql.database.name
        - postgresql.schema.name
        - postgresql.table.name
        - postgresql.index.name
    persistentVolume:
      enabled: false
    service:
      servicePort: 9090
    # Right-size theo usage đo thực tế (~1Gi, retention 7d): request thấp giả tạo
    # làm scheduler binpack cả obs stack lên 1 node -> node 96% mem, chết chùm.
    resources:
      requests:
        cpu: 100m
        memory: 1200Mi
      limits:
        cpu: 500m
        memory: 1500Mi
grafana:

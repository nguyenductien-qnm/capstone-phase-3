  adminPassword: admin
  plugins:
    - grafana-opensearch-datasource
  sidecar:
    alerts:
      enabled: true
    dashboards:
      enabled: true
    datasources:
      enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 100Mi
  resources:
    requests:
      cpu: 50m
      memory: 384Mi     # usage đo ~418Mi; request thật để scheduler không binpack
    limits:
      memory: 512Mi

opensearch:
  enabled: true
  fullnameOverride: opensearch
  clusterName: demo-cluster
  nodeGroup: techx-corp
  singleNode: true
  opensearchJavaOpts: "-Xms400m -Xmx400m"
  persistence:
    enabled: false
  extraEnvs:
    - name: "bootstrap.memory_lock"
      value: "true"
    - name: "DISABLE_INSTALL_DEMO_CONFIG"
      value: "true"
    - name: "DISABLE_SECURITY_PLUGIN"
      value: "true"
  # CDO-42 fix: opensearch chart mặc định requests.cpu=1 nhưng KHÔNG khai limits.cpu.
  # LimitRange (default cpu 200m) tự bơm limit=200m < request=1 -> Pod invalid (FailedCreate).
  # Khai tường minh cpu request/limit (nằm trong LimitRange max cpu "2") để không bị clamp.
  resources:
    requests:
      cpu: 250m
      memory: 512Mi     # node obs t3.medium 3.9Gi: request 1Gi làm tổng vượt node -> Pending.
                        # Right-size thật cần resize node (terraform EKS module) - xem follow-up.
    limits:
      cpu: "1"
      memory: 1100Mi

externalSecrets:
  enabled: false

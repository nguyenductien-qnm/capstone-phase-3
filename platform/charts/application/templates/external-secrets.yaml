{{- if and .Values.externalSecrets .Values.externalSecrets.enabled }}
{{- $es := .Values.externalSecrets }}
{{- $region := $es.region | default "us-east-1" }}
{{- $prefix := $es.secretPrefix | default "ecommerce-dev" }}
# ============================================================================
# External Secrets Operator: đồng bộ endpoint + credential từ AWS Secrets Manager
# vào K8s Secret (db-secret / valkey-secret / msk-secret) — thay việc tạo tay.
# Nguồn sự thật = Terraform (secret *-rds-endpoint, *-valkey-secret, *-msk-secret,
# *-msk-endpoint). ESO refresh theo refreshInterval; endpoint đổi -> secret cập nhật.
# ============================================================================
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ $region }}
---
# --- MSK: username/password (SCRAM) + brokers (endpoint) từ 2 secret nguồn -----
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: msk-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ $es.refreshInterval | default "1h" }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: msk-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # MSK SCRAM secret BẮT BUỘC prefix AmazonMSK_ (yêu cầu của aws_msk_scram_secret_association).
    - secretKey: username
      remoteRef:
        key: AmazonMSK_{{ $prefix }}-msk-secret
        property: username
    - secretKey: password
      remoteRef:
        key: AmazonMSK_{{ $prefix }}-msk-secret
        property: password
    - secretKey: brokers_sasl_scram
      remoteRef:
        key: {{ $prefix }}-msk-endpoint
        property: brokers_sasl_scram
---
# --- Valkey: auth_token + endpoint ------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: valkey-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ $es.refreshInterval | default "1h" }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: valkey-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: auth_token
      remoteRef:
        key: {{ $prefix }}-valkey-secret
        property: auth_token
    - secretKey: address
      remoteRef:
        key: {{ $prefix }}-valkey-secret
        property: address
---
# --- DB: build conn string per-service từ endpoint secret ---------------------
# Format khác nhau theo driver: accounting (.NET Npgsql) dùng Host=;Username=;...,
# catalog (Go lib/pq) + reviews (Python psycopg2) dùng URI postgresql://.
# ESO template ghép field host/proxy/port/user/pass/dbname thành conn string.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ $es.refreshInterval | default "1h" }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        # .NET Npgsql (accounting)
        accounting-db-conn: "Host={{ `{{ .proxy_endpoint }}` }};Port={{ `{{ .port }}` }};Username={{ `{{ .username }}` }};Password={{ `{{ .password }}` }};Database={{ `{{ .dbname }}` }}"
        # Go lib/pq (product-catalog). RDS bật rds.force_ssl nên bắt buộc sslmode=require;
        # sslmode=disable bị từ chối: "no pg_hba.conf entry ... no encryption".
        # Catalog/reviews chỉ đọc -> replica_endpoint (chia tải read khỏi primary);
        # accounting ghi -> proxy_endpoint. Replica đi thẳng vì RDS Proxy non-Aurora
        # chỉ target primary.
        catalog-db-conn: "postgresql://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@{{ `{{ .replica_endpoint }}` }}:{{ `{{ .port }}` }}/{{ `{{ .dbname }}` }}?sslmode=require&connect_timeout=180&keepalives=1&keepalives_idle=10&keepalives_interval=3&keepalives_count=3&prefer_simple_protocol=true"
        # Python psycopg2 (product-reviews)
        reviews-db-conn: "postgresql://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@{{ `{{ .replica_endpoint }}` }}:{{ `{{ .port }}` }}/{{ `{{ .dbname }}` }}?sslmode=require&connect_timeout=180&keepalives=1&keepalives_idle=10&keepalives_interval=3&keepalives_count=3"
  data:
    - secretKey: proxy_endpoint
      remoteRef:
        key: {{ $prefix }}-rds-endpoint
        property: proxy_endpoint
    - secretKey: replica_endpoint
      remoteRef:
        key: {{ $prefix }}-rds-endpoint
        property: replica_endpoint
    - secretKey: port
      remoteRef:
        key: {{ $prefix }}-rds-endpoint
        property: port
    - secretKey: username
      remoteRef:
        key: {{ $prefix }}-rds-endpoint
        property: username
    - secretKey: password
      remoteRef:
        key: {{ $prefix }}-rds-endpoint
        property: password
    - secretKey: dbname
      remoteRef:
        key: {{ $prefix }}-rds-endpoint
        property: dbname
{{- end }}

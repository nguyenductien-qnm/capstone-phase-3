# Service TẠM HOÃN build — CI đọc file này để loại khỏi matrix (app-build.yaml, job detect).
#
# Vì sao tồn tại: chính sách là KHÔNG push image dính CVE CRITICAL/HIGH lên ECR.
# Khi CVE chặn một service mà upstream CHƯA phát hành bản vá, ta không có cách nào
# build sạch -> tạm hoãn build service đó. ArgoCD vẫn trỏ tag cũ trong
# values-image-tags.yaml nên service tiếp tục chạy image cũ đã có trên ECR.
#
# ĐÁNH ĐỔI phải biết: service bị hoãn sẽ KHÔNG được deploy code mới cho tới khi bỏ hoãn.
# Đây là hoãn CÓ HẠN, không phải danh sách loại trừ vĩnh viễn:
#   - `review_by`: tới ngày này phải kiểm tra lại upstream đã có fix chưa.
#   - Khi bản vá ra -> bump base image/dependency -> XÓA entry -> service tự vào lại matrix.
#   - KHÔNG thêm entry chỉ vì build fail; chỉ dùng cho CVE chưa có fixed version.
#
# Kiểm tra CVE đã có fix chưa:
#   trivy image --severity CRITICAL,HIGH <image>   (xem cột "Fixed Version")

exclusions:
  # email là service DUY NHẤT còn thật sự kẹt: CVE-2026-41316 nằm ở `erb`, một
  # DEFAULT GEM đi kèm Ruby. CVE tầng OS (apk upgrade) và net-imap/zlib (bump
  # ruby:3.4.9 + pin Gemfile) đều vá được, nhưng erb 4.0.4 là default gem mà CHƯA
  # tag Ruby nào ship bản vá 4.0.4.1 (default gem không gỡ được bằng gem cleanup,
  # không đè được bằng bundle). Bản vá có trên rubygems nhưng Ruby chưa nhúng.
  # Bỏ hoãn: khi Ruby ship 3.4.x kèm erb >= 4.0.4.1 -> bump base + pin gem -> xóa entry.
  - service: email
    reason: "CVE-2026-41316 (erb, HIGH) - erb là default gem của Ruby 3.4.x, chưa tag Ruby nào ship bản vá 4.0.4.1; không gỡ/đè được default gem qua bundle"
    cves: ["CVE-2026-41316"]
    review_by: "2026-08-16"


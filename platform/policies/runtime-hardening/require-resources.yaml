apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: "require-resources"
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:   [""]
      apiVersions: ["v1"]
      operations:  ["CREATE", "UPDATE"]
      resources:   ["pods"]
    - apiGroups:   ["apps"]
      apiVersions: ["v1"]
      operations:  ["CREATE", "UPDATE"]
      resources:   ["deployments", "statefulsets", "daemonsets", "replicasets"]
    - apiGroups:   ["batch"]
      apiVersions: ["v1"]
      operations:  ["CREATE", "UPDATE"]
      resources:   ["jobs", "cronjobs"]
    namespaceSelector:
      matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
        - kube-system
        - kube-public
        - kube-node-lease
        - gatekeeper-system
        - argocd
        - tailscale
        - external-dns
        - external-secrets
  variables:
  - name: podSpec
    expression: |
      object.kind == 'Pod' ? object.spec :
      (object.kind == 'CronJob' ? object.spec.jobTemplate.spec.template.spec :
      object.spec.template.spec)
  - name: containers
    expression: 'variables.podSpec.containers'
  - name: initContainers
    expression: 'has(variables.podSpec.initContainers) ? variables.podSpec.initContainers : []'
  - name: ephemeralContainers
    expression: 'has(variables.podSpec.ephemeralContainers) ? variables.podSpec.ephemeralContainers : []'
  - name: allContainers
    expression: 'variables.containers + variables.initContainers + variables.ephemeralContainers'
  validations:
  - expression: |
      variables.allContainers.all(c, 
        has(c.resources) && 
        has(c.resources.requests) && 
        has(c.resources.requests.cpu) && 
        has(c.resources.requests.memory) && 
        has(c.resources.limits) && 
        has(c.resources.limits.cpu) && 
        has(c.resources.limits.memory)
      )
    messageExpression: |
      "containers must have CPU and Memory requests and limits defined: " + 
      variables.allContainers.filter(c, 
        !(
          has(c.resources) && 
          has(c.resources.requests) && 
          has(c.resources.requests.cpu) && 
          has(c.resources.requests.memory) && 
          has(c.resources.limits) && 
          has(c.resources.limits.cpu) && 
          has(c.resources.limits.memory)
        )
      ).map(c, c.name).join(", ")
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: "require-resources-binding"
spec:
  policyName: "require-resources"
  validationActions: [Deny]

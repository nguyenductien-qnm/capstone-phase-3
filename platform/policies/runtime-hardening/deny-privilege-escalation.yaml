apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: "deny-privilege-escalation"
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:   [""]
      apiVersions: ["v1"]
      operations:  ["CREATE", "UPDATE"]
      resources:   ["pods"]
    - apiGroups:   ["apps"]
      apiVersions: ["v1"]
      operations:  ["CREATE", "UPDATE"]
      resources:   ["deployments", "statefulsets", "daemonsets", "replicasets"]
    - apiGroups:   ["batch"]
      apiVersions: ["v1"]
      operations:  ["CREATE", "UPDATE"]
      resources:   ["jobs", "cronjobs"]
    namespaceSelector:
      matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
        - kube-system
        - kube-public
        - kube-node-lease
        - gatekeeper-system
        - argocd
        - tailscale
        - external-dns
        - external-secrets
  variables:
  - name: podSpec
    expression: |
      object.kind == 'Pod' ? object.spec :
      (object.kind == 'CronJob' ? object.spec.jobTemplate.spec.template.spec :
      object.spec.template.spec)
  - name: containers
    expression: 'variables.podSpec.containers'
  - name: initContainers
    expression: 'has(variables.podSpec.initContainers) ? variables.podSpec.initContainers : []'
  - name: ephemeralContainers
    expression: 'has(variables.podSpec.ephemeralContainers) ? variables.podSpec.ephemeralContainers : []'
  - name: allContainers
    expression: 'variables.containers + variables.initContainers + variables.ephemeralContainers'
  validations:
  - expression: |
      variables.allContainers.all(c, 
        c.image.matches('^(registry\\.k8s\\.io/google_containers/|registry\\.k8s\\.io/|docker\\.io/google_containers/)?pause(:.+)?$') || 
        c.image.matches('^(quay\\.io/|docker\\.io/)?prometheus/prometheus(:.+)?$') || 
        c.image.matches('^(docker\\.io/)?otel/opentelemetry-collector-contrib(:.+)?$') || 
        c.image.matches('^(docker\\.io/)?jaegertracing/jaeger(:.+)?$') || 
        c.image.matches('^(docker\\.io/)?opensearchproject/opensearch(:.+)?$') ||
        (
          has(c.securityContext) && 
          has(c.securityContext.allowPrivilegeEscalation) && 
          c.securityContext.allowPrivilegeEscalation == false
        )
      )
    messageExpression: |
      "containers must have allowPrivilegeEscalation set to false: " + 
      variables.allContainers.filter(c, 
        !(
          c.image.matches('^(registry\\.k8s\\.io/google_containers/|registry\\.k8s\\.io/|docker\\.io/google_containers/)?pause(:.+)?$') || 
          c.image.matches('^(quay\\.io/|docker\\.io/)?prometheus/prometheus(:.+)?$') || 
          c.image.matches('^(docker\\.io/)?otel/opentelemetry-collector-contrib(:.+)?$') || 
          c.image.matches('^(docker\\.io/)?jaegertracing/jaeger(:.+)?$') || 
          c.image.matches('^(docker\\.io/)?opensearchproject/opensearch(:.+)?$') ||
          (
            has(c.securityContext) && 
            has(c.securityContext.allowPrivilegeEscalation) && 
            c.securityContext.allowPrivilegeEscalation == false
          )
        )
      ).map(c, c.name).join(", ")
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: "deny-privilege-escalation-binding"
spec:
  policyName: "deny-privilege-escalation"
  validationActions: [Warn]

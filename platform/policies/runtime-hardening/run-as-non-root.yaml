apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: "run-as-non-root"
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:   [""]
      apiVersions: ["v1"]
      operations:  ["CREATE", "UPDATE"]
      resources:   ["pods"]
    - apiGroups:   ["apps"]
      apiVersions: ["v1"]
      operations:  ["CREATE", "UPDATE"]
      resources:   ["deployments", "statefulsets", "daemonsets", "replicasets"]
    - apiGroups:   ["batch"]
      apiVersions: ["v1"]
      operations:  ["CREATE", "UPDATE"]
      resources:   ["jobs", "cronjobs"]
    namespaceSelector:
      matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
        - kube-system
        - kube-public
        - kube-node-lease
        - gatekeeper-system
        - argocd
        - tailscale
        - external-dns
        - external-secrets
  variables:
  - name: podSpec
    expression: |
      object.kind == 'Pod' ? object.spec :
      (object.kind == 'CronJob' ? object.spec.jobTemplate.spec.template.spec :
      object.spec.template.spec)
  - name: containers
    expression: 'variables.podSpec.containers'
  - name: initContainers
    expression: 'has(variables.podSpec.initContainers) ? variables.podSpec.initContainers : []'
  - name: ephemeralContainers
    expression: 'has(variables.podSpec.ephemeralContainers) ? variables.podSpec.ephemeralContainers : []'
  - name: allContainers
    expression: 'variables.containers + variables.initContainers + variables.ephemeralContainers'
  validations:
  - expression: |
      variables.allContainers.all(c, 
        c.image.matches('^(docker\\.io/)?otel/opentelemetry-collector-contrib(:.+)?$') ||
        c.image.matches('^(quay\\.io/|docker\\.io/)?kiwigrid/k8s-sidecar(:.+)?$') ||
        c.image.matches('^(ghcr\\.io/|docker\\.io/)?stakater/reloader(:.+)?$') ||
        c.image.matches('^registry\\.k8s\\.io/kube-state-metrics/kube-state-metrics(:.+)?$') ||
        c.image.matches('^804372444787\\.dkr\\.ecr\\.us-east-1\\.amazonaws\\.com/ecommerce-dev-techx-corp:[^@]*aiops-detector[^@]*(@.+)?$') ||
        c.image.matches('^804372444787\\.dkr\\.ecr\\.us-east-1\\.amazonaws\\.com/ecommerce-dev-techx-corp:[^@]*aiops-remediation[^@]*(@.+)?$') ||
        (
          (has(c.securityContext) && has(c.securityContext.runAsUser) ? c.securityContext.runAsUser : (has(variables.podSpec.securityContext) && has(variables.podSpec.securityContext.runAsUser) ? variables.podSpec.securityContext.runAsUser : -1)) != 0
        ) &&
        (
          (has(c.securityContext) && has(c.securityContext.runAsUser) ? c.securityContext.runAsUser : (has(variables.podSpec.securityContext) && has(variables.podSpec.securityContext.runAsUser) ? variables.podSpec.securityContext.runAsUser : -1)) != -1 ||
          (has(c.securityContext) && has(c.securityContext.runAsNonRoot) ? c.securityContext.runAsNonRoot : (has(variables.podSpec.securityContext) && has(variables.podSpec.securityContext.runAsNonRoot) ? variables.podSpec.securityContext.runAsNonRoot : false)) == true
        )
      )
    messageExpression: |
      "containers must run as non-root (runAsNonRoot: true or runAsUser != 0): " + 
      variables.allContainers.filter(c, 
        !(
          c.image.matches('^(docker\\.io/)?otel/opentelemetry-collector-contrib(:.+)?$') ||
          c.image.matches('^(quay\\.io/|docker\\.io/)?kiwigrid/k8s-sidecar(:.+)?$') ||
          c.image.matches('^(ghcr\\.io/|docker\\.io/)?stakater/reloader(:.+)?$') ||
          c.image.matches('^registry\\.k8s\\.io/kube-state-metrics/kube-state-metrics(:.+)?$') ||
          c.image.matches('^804372444787\\.dkr\\.ecr\\.us-east-1\\.amazonaws\\.com/ecommerce-dev-techx-corp:[^@]*aiops-detector[^@]*(@.+)?$') ||
          c.image.matches('^804372444787\\.dkr\\.ecr\\.us-east-1\\.amazonaws\\.com/ecommerce-dev-techx-corp:[^@]*aiops-remediation[^@]*(@.+)?$') ||
          (
            (has(c.securityContext) && has(c.securityContext.runAsUser) ? c.securityContext.runAsUser : (has(variables.podSpec.securityContext) && has(variables.podSpec.securityContext.runAsUser) ? variables.podSpec.securityContext.runAsUser : -1)) != 0
          ) &&
          (
            (has(c.securityContext) && has(c.securityContext.runAsUser) ? c.securityContext.runAsUser : (has(variables.podSpec.securityContext) && has(variables.podSpec.securityContext.runAsUser) ? variables.podSpec.securityContext.runAsUser : -1)) != -1 ||
            (has(c.securityContext) && has(c.securityContext.runAsNonRoot) ? c.securityContext.runAsNonRoot : (has(variables.podSpec.securityContext) && has(variables.podSpec.securityContext.runAsNonRoot) ? variables.podSpec.securityContext.runAsNonRoot : false)) == true
          )
        )
      ).map(c, c.name).join(", ")
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: "run-as-non-root-binding"
spec:
  policyName: "run-as-non-root"
  validationActions: [Deny]

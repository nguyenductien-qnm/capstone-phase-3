apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: "psp-capabilities"
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:   [""]
      apiVersions: ["v1"]
      operations:  ["CREATE", "UPDATE"]
      resources:   ["pods"]
    namespaceSelector:
      matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
        - kube-system
        - kube-public
        - kube-node-lease
        - gatekeeper-system
        - argocd
  variables:
  - name: containers
    expression: 'object.spec.containers'
  - name: initContainers
    expression: 'has(object.spec.initContainers) ? object.spec.initContainers : []'
  - name: ephemeralContainers
    expression: 'has(object.spec.ephemeralContainers) ? object.spec.ephemeralContainers : []'
  - name: allContainers
    expression: 'variables.containers + variables.initContainers + variables.ephemeralContainers'
  validations:
  - expression: |
      variables.allContainers.all(c, 
        c.image.contains('prometheus/prometheus') || 
        c.image.contains('otel/opentelemetry-collector-contrib') || 
        c.image.contains('jaegertracing/jaeger') ||
        (
          has(c.securityContext) && 
          has(c.securityContext.capabilities) && 
          has(c.securityContext.capabilities.drop) && 
          c.securityContext.capabilities.drop.exists(cap, cap.upperAscii() == 'ALL') &&
          (!has(c.securityContext.capabilities.add) || c.securityContext.capabilities.add.all(cap, cap.upperAscii() == 'NET_BIND_SERVICE'))
        )
      )
    messageExpression: |
      "containers must drop ALL capabilities and can only add NET_BIND_SERVICE: " + 
      variables.allContainers.filter(c, 
        !(
          c.image.contains('prometheus/prometheus') || 
          c.image.contains('otel/opentelemetry-collector-contrib') || 
          c.image.contains('jaegertracing/jaeger') ||
          (
            has(c.securityContext) && 
            has(c.securityContext.capabilities) && 
            has(c.securityContext.capabilities.drop) && 
            c.securityContext.capabilities.drop.exists(cap, cap.upperAscii() == 'ALL') &&
            (!has(c.securityContext.capabilities.add) || c.securityContext.capabilities.add.all(cap, cap.upperAscii() == 'NET_BIND_SERVICE'))
          )
        )
      ).map(c, c.name).join(", ")
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: "psp-capabilities-binding"
spec:
  policyName: "psp-capabilities"
  validationActions: [Deny]

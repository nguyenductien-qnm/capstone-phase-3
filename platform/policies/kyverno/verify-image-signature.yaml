# MANDATE-10 P2 — chặn ở admission mọi image techx-corp KHÔNG mang chữ ký Cosign
# của workflow app-build.
#
# Trả lời câu hỏi mà VAP runtime-hardening không trả lời được: VAP kiểm "tag có trôi
# không" (deny-floating-image-tag), policy này kiểm "image này do CI của mình dựng ra
# hay ai đó push tay". Đúng lỗ hổng mà 2 image aiops từng lọt qua trước MANDATE-10.
#
# GIAI ĐOẠN HIỆN TẠI: Enforce + failurePolicy Fail (flip 23/07 sau soak Audit).
#
# RÀNG BUỘC CỦA KYVERNO: `mutateDigest: true` CHỈ hợp lệ với Enforce. Webhook
# validate-policy từ chối thẳng tổ hợp Audit + mutateDigest:
#   "mutateDigest must be set to false for 'Audit' failure action"
# Lý do: ở Audit, policy không được phép sửa resource — mutate là hành vi của Enforce.
# Nên khi rollback về Audit PHẢI hạ mutateDigest xuống false CÙNG LÚC, nếu không
# ArgoCD sync fail và policy kẹt ở bản cũ (đã vấp 23/07).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: Verify image signature (Cosign keyless)
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Mọi image từ repo ecommerce-dev-techx-corp phải mang chữ ký Cosign keyless do
      workflow app-build.yaml@refs/heads/develop tạo. Image push tay không có chữ ký
      hợp lệ sẽ bị chặn (giai đoạn Enforce) hoặc ghi nhận vào PolicyReport (Audit).

    # BẪY mutateDigest × autogen × ArgoCD selfHeal:
    # Kyverno mặc định autogen rule tương ứng cho Deployment/StatefulSet/DaemonSet từ
    # policy match Pod. Nếu autogen mutate image ngay trên DEPLOYMENT thì ArgoCD thấy
    # live (@sha256:...) khác Git (:tag) -> OutOfSync -> selfHeal revert -> Kyverno
    # mutate lại: vòng lặp drift vô tận (đúng kiểu selfHeal đã cắn khi patch tay).
    # "none" giới hạn mutate ở tầng POD — Pod do ReplicaSet đẻ, ArgoCD không quản nên
    # không có gì để drift, còn Deployment trong Git giữ nguyên tag đọc được.
    pod-policies.kyverno.io/autogen-controllers: "none"
spec:
  # ENFORCE (flip 23/07 sau soak Audit ~2h): image khớp imageReferences mà thiếu chữ ký
  # hợp lệ bị CHẶN ở admission. Điều kiện flip đã đủ:
  #   - 29 PolicyReport, PASS=29 FAIL=0; 80 lần "verification succeeded", 0 failed.
  #   - 2 image aiops đã qua app-build (build-scan-ký) — không còn pod nào thiếu chữ ký.
  #   - PDB admission controller minAvailable=1 Healthy.
  validationFailureAction: Enforce
  background: true
  # Fail: webhook không trả lời được thì TỪ CHỐI request thay vì cho qua. Đi cùng
  # Enforce mới có nghĩa — Enforce mà Ignore thì webhook chết là policy vô hiệu im lặng,
  # đúng kiểu gate mù. An toàn nhờ 2 thứ: PDB minAvailable=1 (drain/rollout không giết
  # cả 2 replica) và cụm đã hết chật sau khi hạ ml-guard (node cao nhất 70% CPU request).
  failurePolicy: Fail
  # 30s: verify keyless lần ĐẦU của mỗi digest phải tải TUF root + gọi Rekor/Fulcio qua
  # NAT. Đo thật 23/07: lần đầu ~70s (cold TUF), các lần sau 2.6-4.8s so với 2.4s của
  # image ngoài policy -> chi phí verify khi đã ấm chỉ ~0.2-2.4s. Giữ 30s vì sau lần đầu
  # cache đã ấm; pod bị timeout sẽ retry và lần 2 qua ngay.
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-techx-corp-images
      match:
        any:
          - resources:
              kinds:
                - Pod
              # CHỈ namespace app. Không đụng kyverno/argocd/observability/kube-system:
              # policy tự chặn chính admission controller của mình là kịch bản chết cụm.
              namespaces:
                - techx-tf1
      verifyImages:
        # Chỉ image của repo mình. 10 loại image upstream đang chạy trong techx-tf1
        # (busybox, otel-collector, k8s-sidecar, grafana, jaeger, prometheus,
        # opensearch, flagd, reloader, curl) KHÔNG khớp prefix này nên nằm ngoài scope
        # — chúng không mang chữ ký của mình và không thể có. Gặp false positive thì
        # THU HẸP imageReferences, tuyệt đối không nới attestor.
        #
        # BA pattern, KHÔNG phải một — vì mutateDigest tự đổi dạng image của chính nó:
        #   :tag              -> pod mới từ Deployment trong Git
        #   :tag@sha256:...   -> pod ĐÃ qua mutateDigest (Kyverno giữ cả tag lẫn digest)
        #   @sha256:...       -> manifest khai thẳng digest, không tag
        # Phát hiện 23/07: chỉ khai ":*" thì pod đã mutate rơi RA NGOÀI scope — 16
        # container dạng tag@digest không có PolicyReport nào, trong khi 20 container
        # còn dạng tag thuần thì có. Nghĩa là pod restart sau lần mutate đầu sẽ KHÔNG
        # được verify lại: gate thủng đúng chỗ nó tưởng đang canh.
        # KHÔNG dùng một pattern gộp kiểu "ecommerce-dev-techx-corp*" — nó khớp luôn
        # repo ecommerce-dev-techx-corp-attest (trùng tiền tố), nới scope ngoài ý muốn.
        - imageReferences:
            - "804372444787.dkr.ecr.us-east-1.amazonaws.com/ecommerce-dev-techx-corp:*"
            - "804372444787.dkr.ecr.us-east-1.amazonaws.com/ecommerce-dev-techx-corp@*"
            - "804372444787.dkr.ecr.us-east-1.amazonaws.com/ecommerce-dev-techx-corp:*@*"
          # true: image khớp pattern mà thiếu chữ ký hợp lệ -> fail (Audit thì ghi
          # report, Enforce thì chặn). false sẽ bỏ qua im lặng — vô nghĩa với gate này.
          required: true
          # Thay tag bằng @sha256 tại admission. Tag là con trỏ có thể trỏ chỗ khác sau
          # khi verify; digest thì không. VAP deny-floating-image-tag chấp nhận dạng
          # @sha256 (đã kiểm: điều kiện chỉ đòi có ':' hoặc '@' và không thuộc blocklist).
          mutateDigest: true
          verifyDigest: true
          attestors:
            - count: 1
              entries:
                # Keyless: danh tính là workflow GitHub, không phải khoá dài hạn.
                # Chuỗi phải khớp NGUYÊN VĂN --certificate-identity mà app-attest và
                # app-promote đang verify (BUILD_IDENTITY), nếu không thì CI bảo hợp lệ
                # mà admission bảo không — lệch nguồn sự thật.
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subject: "https://github.com/nguyenductien-qnm/capstone-phase-3/.github/workflows/app-build.yaml@refs/heads/develop"
                    rekor:
                      url: "https://rekor.sigstore.dev"
          # CHỈ verify chữ ký, KHÔNG verify attestation ở đây. Attestation
          # promoted-develop nằm ở repo TÁCH RIÊNG (ecommerce-dev-techx-corp-attest,
          # vì ECR immutable không cho ghi .att thứ hai lên repo chính) nên muốn kéo
          # vào admission phải cấu hình COSIGN_REPOSITORY — vừa phức tạp vừa thừa:
          # gate promote đã enforce nó ở CI rồi. Admission chỉ cần trả lời đúng một
          # câu: "image này có phải app-build ký không".

# ---------------------------------------------------------------------------
# VẬN HÀNH
# ---------------------------------------------------------------------------
# ROLLBACK khi policy chặn oan (theo thứ tự leo thang):
#   1. Nhẹ nhất — hạ về Audit: sửa BA dòng (Enforce->Audit, Fail->Ignore, và
#      mutateDigest true->false) rồi merge. Policy vẫn ghi report, hết chặn.
#      ĐỦ BA, không phải hai: Kyverno từ chối tổ hợp Audit + mutateDigest:true
#      ("mutateDigest must be set to false for 'Audit' failure action") -> quên dòng
#      thứ ba thì ArgoCD sync fail và policy kẹt nguyên bản Enforce đang chặn.
#   2. Gấp — gỡ hẳn policy: `kubectl delete clusterpolicy verify-image-signature`.
#      Thoát ngay, không cần gỡ Kyverno (đây là lý do policy tách Application riêng).
#      PHẢI revert cả Git, nếu không selfHeal dựng lại sau ~3 phút.
# KHÔNG `kubectl patch` để đổi Audit/Enforce: ArgoCD selfHeal revert về Git.
#
# THÊM IMAGE MỚI vào cụm: image phải do app-build.yaml ký (subject ở attestor trên).
# Image push tay sẽ bị CHẶN — đó là mục đích. Cần ngoại lệ thật thì thu hẹp
# imageReferences hoặc thêm PolicyException có thời hạn, TUYỆT ĐỐI không nới attestor.
#
# SỐ ĐO THAM CHIẾU (23/07, lúc flip): admission latency với image qua policy 2.6-4.8s
# so với 2.4s của image ngoài policy; riêng lần verify ĐẦU của một digest ~70s vì phải
# tải TUF root. Kyverno hiện KHÔNG cache được token ECR (readOnlyRootFilesystem chặn
# ghi /.ecr — log "Could not save cache"), nên mỗi verify tốn thêm 1 round-trip ECR.
# Muốn giảm: mount emptyDir vào /.ecr trong values chart.

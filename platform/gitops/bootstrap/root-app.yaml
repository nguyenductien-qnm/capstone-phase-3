apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techx-corp-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nguyenductien-qnm/capstone-phase-3.git
    targetRevision: main
    path: platform/gitops/applications
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-ingress
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: "https://github.com/nguyenductien-qnm/capstone-phase-3.git"
    targetRevision: develop
    path: platform/gitops/tailscale
    directory:
      recurse: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

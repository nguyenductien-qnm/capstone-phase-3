# External Secrets Operator (ESO) — đồng bộ endpoint + credential từ AWS Secrets
# Manager (RDS/Valkey/MSK) vào K8s Secret trong namespace app, thay cho việc tạo
# secret thủ công. IRSA: ServiceAccount external-secrets được annotate role ARN
# ecommerce-dev-external-secrets (tạo bởi module terraform external-secrets-irsa;
# tên role cố định theo pattern <project>-<env>-external-secrets).
# Quản lý qua ArgoCD (App-of-Apps: root-app recurse platform/gitops/applications/).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.7 # ESO v0.10.7
    helm:
      values: |
        installCRDs: true
        serviceAccount:
          create: true
          name: external-secrets
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::804372444787:role/ecommerce-dev-external-secrets
        resources:
          requests:
            cpu: 25m
            memory: 96Mi
          limits:
            memory: 192Mi
        webhook:
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
        certController:
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas

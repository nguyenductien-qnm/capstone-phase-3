# MANDATE-02 — Karpenter CRDs.
# Quản lý CRD lifecycle độc lập và nâng cùng phiên bản Karpenter Controller.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-crd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter-crd
    targetRevision: 1.14.0
    helm:
      values: |
        additionalAnnotations:
          argocd.argoproj.io/sync-options: Prune=false
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      # Remove stale v1.0.1 conversion fields in one CRD update.
      - Replace=true

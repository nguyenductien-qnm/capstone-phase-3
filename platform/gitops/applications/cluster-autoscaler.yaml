# MANDATE-02 — Cluster Autoscaler (node-layer autoscaling).
# HPA co giãn POD; khi pod Pending vì thiếu node, CA co giãn NODE (ASG desiredCapacity)
# rồi CO XUỐNG khi node thừa (scale up -> down, đúng yêu cầu flash-sale + pillar Cost).
#
# Auth: IRSA (OIDC) — role tạo bởi terraform/modules/eks/cluster-autoscaler.tf.
#   Role name cố định "<cluster>-cluster-autoscaler" -> ARN đoán trước được để gắn vào SA.
# Auto-discovery: EKS Managed Node Group tự gắn tag k8s.io/cluster-autoscaler/enabled +
#   k8s.io/cluster-autoscaler/ecommerce-dev-eks lên ASG -> CA tự tìm, min/max lấy từ ASG.
# Quản lý qua ArgoCD (App-of-Apps: root-app recurse platform/gitops/applications/).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-autoscaler
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/autoscaler
    chart: cluster-autoscaler
    targetRevision: 9.58.0      # appVersion CA 1.35.0 (tương thích cluster k8s 1.36, lệch <=1 minor)
    helm:
      values: |
        cloudProvider: aws
        awsRegion: us-east-1
        autoDiscovery:
          # Trùng tên cluster EKS -> khớp tag k8s.io/cluster-autoscaler/<clusterName> trên ASG.
          clusterName: ecommerce-dev-eks
        rbac:
          serviceAccount:
            create: true
            name: cluster-autoscaler
            annotations:
              # IRSA: ARN role least-privilege do terraform tạo (cluster-autoscaler.tf).
              eks.amazonaws.com/role-arn: arn:aws:iam::804372444787:role/ecommerce-dev-eks-cluster-autoscaler
        extraArgs:
          # Cân bằng node giữa các AZ để HA khi scale-up.
          balance-similar-node-groups: true
          # kube-system pod (không có PDB) không chặn scale-down -> node thừa co xuống được.
          skip-nodes-with-system-pods: false
          # Demo flash-sale: co xuống nhanh hơn mặc định (10m) để thấy scale-down trong test 15'.
          scale-down-unneeded-time: 5m
          scale-down-delay-after-add: 5m
          expander: least-waste
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

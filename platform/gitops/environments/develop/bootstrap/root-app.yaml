apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: develop-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nguyenductien-qnm/capstone-phase-3.git
    targetRevision: develop
    path: platform/gitops/environments/develop/applications
    directory:
      recurse: true
      # Karpenter is intentionally dormant during the first Develop phase.
      exclude: '{karpenter-crd.yaml,karpenter.yaml,karpenter-nodepool.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  # Bật sau khi vòng develop đã verify đủ (ECR pull, secrets, app Healthy
  # 2026-07-19): CI bump tag -> commit -> ArgoCD tự sync, không sync tay nữa.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: develop-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nguyenductien-qnm/capstone-phase-3.git
    targetRevision: develop
    path: platform/gitops/environments/develop/applications
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  # Deliberately no automated sync, prune or self-heal during the initial
  # Develop rollout. Register first, review the diff, then sync manually.

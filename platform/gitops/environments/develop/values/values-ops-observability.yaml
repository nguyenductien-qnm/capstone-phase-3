# Develop observability overrides. The dedicated node is provisioned by the
# EKS module as workload-tier=observability with a NoSchedule taint.

observabilityStorage:
  enabled: true
  parameters:
    type: gp3
    encrypted: "true"
    additional-tags: "Backup=true,Component=observability"

opentelemetry-collector:
  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  config:
    service:
      pipelines:
        # Keep all real backends and spanmetrics; remove only the stdout-copy
        # debug exporter in the Mandate-18 develop runtime scope.
        traces:
          exporters: [otlp/jaeger, spanmetrics]
        metrics:
          exporters: [otlphttp/prometheus]
        logs:
          exporters: [opensearch]

telemetryRetention:
  # 3d keeps the measured peak three-day footprint below the 10Gi PVC while
  # retaining recent operational logs. Audit/security telemetry is stored in
  # separate AWS log groups and is outside this index pattern. Keep this safety
  # gate off until the log owner approves 3d and a recoverable backup exists;
  # the Argo application auto-syncs and deletion cannot be undone from Git.
  enabled: false
  minIndexAge: 3d

jaeger:
  jaeger:
    nodeSelector:
      workload-tier: observability
    tolerations:
      - key: dedicated
        operator: Equal
        value: observability
        effect: NoSchedule
    resources:
      requests:
        cpu: 100m
        memory: 384Mi  # đo 23/07: soak 25u P95 297Mi, idle 245Mi (was 640 = thừa 2.6x)
      limits:
        cpu: 500m
        memory: 1Gi    # GIỮ — tiền sử OOMKilled khi bắn nặng mandate-19 (span burst)

prometheus:
  kube-state-metrics:
    nodeSelector:
      workload-tier: observability
    tolerations:
      - key: dedicated
        operator: Equal
        value: observability
        effect: NoSchedule
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
  server:
    nodeSelector:
      workload-tier: observability
    tolerations:
      - key: dedicated
        operator: Equal
        value: observability
        effect: NoSchedule
    persistentVolume:
      enabled: true
      storageClass: gp3-observability
      accessModes:
        - ReadWriteOnce
      size: 20Gi
    # Đo 23/07 (MEMORY-SIZING develop): limit 1536Mi gây OOM-LOOP 87 lần/16h —
    # WAL replay TSDB 4.9G xong là compact chạm nóc, chết, replay lại từ đầu.
    # Đỉnh replay+compact đo được 2269Mi, steady-state có tải P95 1847Mi.
    # Retention giữ 1w (yêu cầu); nếu cần giảm đỉnh sau này: bật feature
    # memory-snapshot-on-shutdown thay vì cắt retention.
    resources:
      requests:
        cpu: 250m
        memory: 1024Mi
      limits:
        cpu: 1000m
        memory: 2560Mi

grafana:
  nodeSelector:
    workload-tier: observability
  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule
  plugins:
    - grafana-opensearch-datasource
  resources:
    requests:
      cpu: 100m
      memory: 320Mi  # đo 23/07: soak P95 251Mi phẳng (was 512 = thừa 2x)
    limits:
      cpu: 500m
      memory: 512Mi
  sidecar:
    resources:
      requests:
        cpu: 10m
        memory: 96Mi
      limits:
        cpu: 50m
        memory: 128Mi

opensearch:
  enabled: true
  nodeSelector:
    workload-tier: observability
  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule
  persistence:
    enabled: true
    storageClass: gp3-observability
    size: 10Gi
    # Tắt initContainer fsgroup-volume (busybox root chown). Dùng podSecurityContext.fsGroup:1000
    # (chart default) — kubelet tự chown PVC trên EBS gp3. Bỏ container root =>
    # hết vi phạm priv-esc/caps/non-root/floating-tag của fsgroup-volume.
    enableInitChown: false
  # Đo 23/07: working_set 898-950Mi ổn định (idle = soak) trên req 512Mi chart
  # default — under-request 84%, node đầy là bị evict trước tiên. Heap -Xmx400m
  # CỐ ĐỊNH, phần vượt là off-heap + page cache Lucene (nhả được khi ép) nên
  # limit 1536Mi là trần an toàn, không cần đuổi theo max.
  resources:
    requests:
      cpu: 250m
      memory: 1024Mi
    limits:
      cpu: 1000m
      memory: 1536Mi
  # Resources cho init còn lại (configfile) => thỏa require-cpu-memory.
  initResources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 32Mi

components:
  load-generator:
    # Disabled for the Mandate-19 load test: the OTel Demo load-generator pumps
    # background traffic into the app, so the baseline is not zero and every
    # mCPU/rps denominator is wrong (master plan section 4, "Nhieu 2"). We drive
    # load from a dedicated Locust runner instead. Re-enable after the test.
    enabled: false
    schedulingRules:
      nodeSelector:
        workload-tier: observability
      tolerations:
        - key: dedicated
          operator: Equal
          value: observability
          effect: NoSchedule
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 750m
        memory: 512Mi

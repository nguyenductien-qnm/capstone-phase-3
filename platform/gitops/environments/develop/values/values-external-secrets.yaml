reloader:
  enabled: false # Tắt Stakater Reloader cho Develop để giảm tải cluster khi credential xoay vòng

externalSecrets:
  enabled: true
  region: us-east-1
  secretPrefix: ecommerce-develop-dev
  refreshInterval: 5m
  useProxyEndpoint: true # Bật Proxy endpoint cho Develop để test rotation & zero-downtime
  serviceAccountName: external-secrets
  serviceAccountNamespace: external-secrets




# Develop starts without a public ALB, Product-like ACM certificate or DNS name.
# Enable ingress only after a Develop-owned certificate and hostname are approved.

# M17-R3: override NetworkPolicy cho VPC develop (10.60.0.0/16, KHÁC sandbox 10.0.0.0/16).
# Develop KHÔNG cần egress-internet label: flagd dùng file local, LLM in-cluster (không Bedrock).
# networkPolicy.enabled giữ default false (chart) -> bật ở PR sau khi verify Phase 1.
networkPolicy:
  observability:
    apiServerCIDR: 10.60.0.0/16
  datastoreEgress:
    vpcCidr: 10.60.0.0/16

components:
  frontend-proxy:
    ingress:
      enabled: false
  flagd:
    # Gỡ sidecar flagd-ui như sandbox (values-flagd-sync.yaml): image flagd-ui
    # chưa từng được CI build (sidecar không phải component top-level nên detect
    # bỏ qua) -> tag 1.0-flagd-ui không tồn tại trên ECR -> ImagePullBackOff.
    # flagd core vẫn chạy với flag file local. Muốn có UI ở develop thì phải
    # thêm đường build image flagd-ui vào CI trước.
    sidecarContainers: []

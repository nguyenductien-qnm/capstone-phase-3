apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest
  role: ecommerce-develop-dev-eks-karpenter-node
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: ecommerce-develop-dev-eks
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ecommerce-develop-dev-eks
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 30Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
  tags:
    Project: ecommerce-develop
    Environment: dev
    Owner: CDO-09
    ManagedBy: Karpenter

# AIO: cắm LLM thật thay mock (envOverrides = upsert, không xoá env khác).
components:
  product-reviews:
    imageOverride:
      tag: "1.0-product-reviews"
    envOverrides:
      - name: AWS_REGION
        value: "ap-southeast-2"
      - name: LLM_MOCK_ENABLED
        value: "false"
      - name: LLM_REVIEWS_MAIN_MODEL
        value: "amazon.nova-lite-v1:0"
      - name: LLM_REVIEWS_FALLBACK_MODEL
        value: "amazon.nova-micro-v1:0"

# AIO: cắm LLM thật thay mock (envOverrides = upsert, không xoá env khác).
# Secret llm-api-key tạo trước: kubectl -n techx-<aio> create secret generic llm-api-key --from-literal=key=<REAL_KEY>
components:
  product-reviews:
    envOverrides:
      # --- AWS Bedrock Guardrails configuration ---
      - name: LLM_BEDROCK_GUARDRAIL
        value: "true"
      - name: BEDROCK_GUARDRAIL_ID
        valueFrom:
          secretKeyRef:
            name: bedrock-config
            key: guardrail_id
      - name: BEDROCK_AWS_ROLE_ARN
        valueFrom:
          secretKeyRef:
            name: bedrock-config
            key: role_arn
      - name: BEDROCK_AWS_EXTERNAL_ID
        valueFrom:
          secretKeyRef:
            name: bedrock-config
            key: external_id
      - name: AWS_REGION
        value: "us-east-1"
  shopping-copilot:
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 10001
      capabilities:
        drop:
          - ALL
    envOverrides:
      # --- AWS Bedrock Guardrails configuration ---
      - name: LLM_BEDROCK_GUARDRAIL
        value: "true"
      - name: BEDROCK_GUARDRAIL_ID
        valueFrom:
          secretKeyRef:
            name: bedrock-config
            key: guardrail_id
      - name: BEDROCK_AWS_ROLE_ARN
        valueFrom:
          secretKeyRef:
            name: bedrock-config
            key: role_arn
      - name: BEDROCK_AWS_EXTERNAL_ID
        valueFrom:
          secretKeyRef:
            name: bedrock-config
            key: external_id
      - name: AWS_REGION
        value: "us-east-1"

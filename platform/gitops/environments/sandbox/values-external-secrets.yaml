# Overlay sandbox: bật External Secrets Operator sync endpoint/credential từ AWS
# Secrets Manager (RDS/Valkey/MSK) vào K8s Secret. Load qua ArgoCD valueFiles.
# Nguồn secret trên AWS do Terraform tạo (prefix ecommerce-dev).
externalSecrets:
  enabled: true
  region: us-east-1
  secretPrefix: ecommerce-dev
  refreshInterval: 1m
  serviceAccountName: external-secrets
  serviceAccountNamespace: external-secrets

# Mandate-19: port sizing + HPA đã đo trên develop sang PROD (techx-tf1).
# Bằng chứng AFTER: docs/mandate-19/loadtest/EVIDENCE.md E7/E8 + ADR throughput-ceiling.
# Develop đo trên node t3.large cùng cỡ prod (parity dựng ở PR #237) nên số mang sang được.
# BẮT BUỘC đi cùng image frontend-proxy có YC4 load-shed (>= tag a0a954f — prod đã nhận
# qua PR promote 22/07): ngưỡng shed browse 80rps/homepage 100rps được tune theo sizing
# này; có shed mà không có sizing (hoặc ngược lại) là lệch điểm gãy.
default:
  # Karpenter Phase 1: ưu tiên khác host nhưng không ép tạo một node cho mỗi replica.
  # Zone spread là hard requirement để critical replicas thực sự chạy trên >=2 AZ.
  topologySpreadWhenUnsatisfiable: ScheduleAnyway
  topologySpreadZoneWhenUnsatisfiable: DoNotSchedule
  topologySpreadZoneMinDomains: 2

components:
  frontend:
    # Next.js SSR là nút thắt user-facing: 200m limit bóp cổ (throttle 9.3% khi kịch
    # HPA max 6). Nới limit nâng trần bằng hiệu suất, không thêm node; giữ requests
    # 100m -> HPA target 70% không đổi. Max 6->10: trần đo 98rps@200u, gãy 280u vì
    # kịch max 6 (SSR ~20rps/pod).
    resources:
      limits:
        cpu: 500m
    hpa:
      maxReplicas: 10
  # Checkout chain: limit=100m làm throttle khi checkout tải cao (đo 21/07 @60u:
  # email 95.7%, payment 34.2%, currency 29.1%) -> checkout gãy SLO sớm (~14rps vs
  # catalog 20rps). Nới limit nâng trần luồng ra tiền; requests right-size theo CPU
  # thực steady-state (avg ~50-55% so requests -> HPA có headroom, không flapping).
  # email/quote/shipping/payment trước kẹt 1 replica không HPA -> min2/max4
  # (email throttle 43%->2.1%, quote 58%->8%); min>=2 khớp chuẩn PDB×min-replicas
  # (INC-2). target CPU 70% dùng default.hpa.
  email:
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
    resources:
      requests:
        cpu: 100m   # dùng thật 62m (was 50m = under-request 124%)
      limits:
        cpu: 400m   # throttle 95.7%@100m — nghẽn nặng nhất chain
  payment:
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
    resources:
      requests:
        cpu: 80m    # dùng thật 44m (was 50m = 88%)
      limits:
        cpu: 300m   # throttle 34.2%@100m — luồng ra tiền, không được throttle
  quote:
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
  shipping:
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
  currency:
    resources:
      requests:
        cpu: 50m    # dùng 33m = 66%, giữ nguyên
      limits:
        cpu: 250m   # throttle 29.1%@100m — dùng chung nhiều flow
  cart:
    resources:
      requests:
        cpu: 60m    # dùng thật 37m (was 100m = over-request 37%)
      limits:
        cpu: 350m   # throttle 13.0%@200m — dù đã scale 3 replica
  checkout:
    resources:
      requests:
        cpu: 60m    # dùng thật 31m (was 100m = over-request 31%)
      limits:
        cpu: 350m   # throttle 12.9%@200m — core checkout
  product-catalog:
    resources:
      requests:
        cpu: 40m    # dùng 9m sau-shed (was 100m) — browse bị shed trước khi tới catalog
  # INFRA-OPTIMIZE P1: ml-guard req 1000m/pod là giữ chỗ ảo lớn nhất cụm — 2 pod
  # chiếm 2000m (36% tổng CPU requests, 25% trần NodePool cpu=8) trong khi dùng thật
  # ~290m/pod lúc có tải (đo 22/07 ~23h), idle chỉ 1m. Hạ request trả lại 1200m cho
  # scheduler; limit GIỮ 2000m vì model load (Presidio + classifier + NLI) cần burst.
  # Memory không đụng: dùng 1297-1517Mi/pod, request 1536Mi đang đúng cỡ.
  # HPA min2/max2 + PDB maxUnavailable=1 giữ nguyên (min>=2 khớp chuẩn INC-2).
  # Số 400m là ước lượng từ snapshot — phải đo lại lúc có inference traffic thật
  # (bài học mandate-19: ml-guard bị exclude khỏi loadtest baseline).
  ml-guard:
    resources:
      requests:
        cpu: 400m   # dùng thật ~290m/pod có tải (was 1000m = over-request 345%)
      limits:
        cpu: 2000m  # giữ — burst load model 25-90s (startupProbe đã cover)

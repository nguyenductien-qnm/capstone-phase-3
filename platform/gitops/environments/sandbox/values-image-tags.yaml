# CI-managed image tags — CHỈ CI (app-build.yaml) ghi file này, KHÔNG sửa tay.
# Tách khỏi values.yaml gốc để bump tag không reformat/phá comment của chart.
# Load SAU values.yaml (helm -f cuối cùng thắng) -> override imageOverride.tag.
# Tag convention: <version>-<service>-<sha>. ArgoCD selfHeal sync khi file này đổi.
components:
  cart:
    imageOverride:
      # Sua tay 1 lan (incident 2026-07-16): tag tran "1.1-cart" bi ECR lifecycle
      # policy xoa -> ImagePullBackOff. cart dang HOAN BUILD (build-exclusions) nen
      # CI khong tu bump; image rebuild tu source, push tag sha. CI se ghi de khi bo hoan.
      tag: "1.0-cart-aadff38"
  checkout:
    imageOverride:
      tag: "1.0-checkout-aadff38"

# Sandbox observability overrides. The dedicated node is provisioned by the
# EKS module as workload-tier=observability with a NoSchedule taint.

observabilityStorage:
  enabled: true

opentelemetry-collector:
  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  config:
    service:
      pipelines:
        logs:
          exporters: [debug]

jaeger:
  jaeger:
    nodeSelector:
      workload-tier: observability
    tolerations:
      - key: dedicated
        operator: Equal
        value: observability
        effect: NoSchedule
    resources:
      requests:
        cpu: 100m
        memory: 640Mi
      limits:
        cpu: 500m
        memory: 1Gi

prometheus:
  kube-state-metrics:
    nodeSelector:
      workload-tier: observability
    tolerations:
      - key: dedicated
        operator: Equal
        value: observability
        effect: NoSchedule
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
  server:
    nodeSelector:
      workload-tier: observability
    tolerations:
      - key: dedicated
        operator: Equal
        value: observability
        effect: NoSchedule
    persistentVolume:
      enabled: true
      storageClass: gp3-observability
      accessModes:
        - ReadWriteOnce
      size: 20Gi
    resources:
      requests:
        cpu: 250m
        memory: 768Mi
      limits:
        cpu: 1000m
        memory: 1536Mi

grafana:
  nodeSelector:
    workload-tier: observability
  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule
  plugins: []
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 768Mi
  sidecar:
    resources:
      requests:
        cpu: 10m
        memory: 96Mi
      limits:
        cpu: 50m
        memory: 128Mi

opensearch:
  enabled: true
  nodeSelector:
    workload-tier: observability
  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule
  persistence:
    enabled: true
    storageClass: gp3-observability
    size: 10Gi

components:
  load-generator:
    schedulingRules:
      nodeSelector:
        workload-tier: observability
      tolerations:
        - key: dedicated
          operator: Equal
          value: observability
          effect: NoSchedule
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 750m
        memory: 512Mi

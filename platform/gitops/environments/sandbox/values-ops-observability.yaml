# Sandbox observability overrides.
# Keep this file focused on operational sizing/scheduling so application image
# updates remain independently managed by values-image-tags.yaml.

prometheus:
  server:
    resources:
      requests:
        cpu: 250m
        memory: 768Mi
      limits:
        cpu: 1000m
        memory: 1536Mi

grafana:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 768Mi
  sidecar:
    resources:
      requests:
        cpu: 10m
        memory: 96Mi
      limits:
        cpu: 50m
        memory: 128Mi

# App-only stamp: tắt observability subchart, trỏ OTLP về collector chung.
# Team tách nhau trong Grafana theo k8s.namespace.name (collector chung tự gắn).
# TUNE khi deploy lần đầu: xác nhận OTEL_COLLECTOR_NAME override ăn.
opentelemetry-collector: { enabled: false }
jaeger: { enabled: false }
prometheus: { enabled: false }
grafana: { enabled: false }
opensearch: { enabled: false }

default:
  envOverrides:
    - name: OTEL_COLLECTOR_NAME
      value: otel-collector.techx-observability.svc.cluster.local

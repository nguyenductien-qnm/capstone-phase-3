name: "Build and Scan Image"
description: "Build a local container image with Docker Buildx and scan it with Trivy"

inputs:
  working-directory:
    description: "Directory where the Dockerfile is located"
    required: true
  context:
    description: "Docker build context directory (relative to repo root)"
    required: false
    default: "."
  image-ref:
    description: "Local image reference to build and scan"
    required: true
  trivy-severity:
    description: "Trivy severity levels to report"
    required: false
    default: "CRITICAL,HIGH"
  trivy-exit-code:
    description: "Exit code when Trivy finds vulnerabilities"
    required: false
    default: "1"

outputs:
  image-ref:
    description: "Local Docker image reference"
    value: ${{ steps.image.outputs.image-ref }}

runs:
  using: "composite"
  steps:
    - name: Resolve image reference
      id: image
      shell: bash
      run: |
        echo "image-ref=${{ inputs.image-ref }}" >> "$GITHUB_OUTPUT"

    - name: Resolve Dockerfile
      id: dockerfile
      shell: bash
      run: |
        SERVICE_DIR="${GITHUB_WORKSPACE}/${{ inputs.working-directory }}"
        DOCKERFILE="$SERVICE_DIR/Dockerfile"
        if [ ! -f "$DOCKERFILE" ]; then
          DOCKERFILE="$(find "$SERVICE_DIR" -mindepth 2 -maxdepth 2 -type f -name Dockerfile -print -quit)"
        fi
        if [ -z "$DOCKERFILE" ] || [ ! -f "$DOCKERFILE" ]; then
          echo "Dockerfile not found under $SERVICE_DIR"
          exit 1
        fi
        echo "dockerfile=$DOCKERFILE" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker Image
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.context }}
        file: ${{ steps.dockerfile.outputs.dockerfile }}
        load: true
        push: false
        tags: ${{ steps.image.outputs.image-ref }}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: ${{ steps.image.outputs.image-ref }}
        format: "table"
        exit-code: ${{ inputs.trivy-exit-code }}
        ignore-unfixed: true
        vuln-type: "os,library"
        severity: ${{ inputs.trivy-severity }}

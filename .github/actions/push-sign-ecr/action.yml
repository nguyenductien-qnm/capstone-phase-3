name: "Push and Sign Image"
description: "Tag a local container image, push it to a registry, and optionally sign it with Cosign"

inputs:
  local-image:
    description: "Local Docker image reference to push"
    required: true
  remote-image:
    description: "Remote image reference to push and sign"
    required: true
  sign-image:
    description: "Sign image with Cosign"
    required: false
    default: "false"

outputs:
  image-uri:
    description: "Pushed remote image URI"
    value: ${{ steps.image.outputs.image-uri }}

runs:
  using: "composite"
  steps:
    - name: Resolve remote image URI
      id: image
      shell: bash
      run: |
        echo "image-uri=${{ inputs.remote-image }}" >> "$GITHUB_OUTPUT"

    - name: Push Docker Image
      shell: bash
      run: |
        LOCAL_IMAGE="${{ inputs.local-image }}"
        IMAGE_URI="${{ steps.image.outputs.image-uri }}"
        docker tag "$LOCAL_IMAGE" "$IMAGE_URI"
        docker push "$IMAGE_URI"

    - name: Install Cosign
      if: inputs.sign-image == 'true'
      uses: sigstore/cosign-installer@v4.1.0

    - name: Sign image with Cosign
      if: inputs.sign-image == 'true'
      shell: bash
      run: |
        IMAGE_URI="${{ steps.image.outputs.image-uri }}"
        cosign sign --yes "$IMAGE_URI"

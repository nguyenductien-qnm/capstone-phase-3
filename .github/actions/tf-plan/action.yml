name: "Terraform Plan"
description: "Run terraform init, validate, and plan with optional builtin cache"

inputs:
  working-directory:
    description: "Terraform working directory"
    required: true
  terraform-version:
    description: "Terraform version"
    required: false
    default: "latest"
  var-file:
    description: "Terraform var file (e.g. terraform.tfvars)"
    required: false
    default: ""
  extra-args:
    description: "Additional terraform plan arguments"
    required: false
    default: ""
  use-cache:
    description: "Enable or disable Terraform provider caching"
    required: false
    default: "true"
  run-iac-scan:
    description: "Run Trivy and Checkov scans against the Terraform working directory"
    required: false
    default: "true"
  trivy-severity:
    description: "Trivy severity levels to report"
    required: false
    default: "CRITICAL,HIGH"
  trivy-exit-code:
    description: "Exit code when Trivy finds a misconfiguration"
    required: false
    default: "0"
  checkov-soft-fail:
    description: "Allow Checkov findings without failing the job"
    required: false
    default: "true"
  checkov-quiet:
    description: "Reduce Checkov output"
    required: false
    default: "true"

outputs:
  plan-exit-code:
    description: "Terraform plan exit code: 0=no changes, 2=changes, 1=error"
    value: ${{ steps.plan.outputs.exitcode }}
  plan-has-changes:
    description: "Whether Terraform plan detected changes"
    value: ${{ steps.plan.outputs.has_changes }}

runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ inputs.terraform-version }}

    # 1. Khởi tạo biến môi trường và thư mục Cache (Chỉ chạy khi use-cache == 'true')
    - name: Set up Terraform Cache Dir
      if: ${{ inputs.use-cache == 'true' }}
      shell: bash
      run: |
        CACHE_DIR="${{ github.workspace }}/.terraform.d/plugin-cache"
        mkdir -p "$CACHE_DIR"
        echo "TF_PLUGIN_CACHE_DIR=$CACHE_DIR" >> $GITHUB_ENV

    # 2. Kéo Cache từ GitHub Server xuống (Chỉ chạy khi use-cache == 'true')
    - name: Cache Terraform Providers
      if: ${{ inputs.use-cache == 'true' }}
      uses: actions/cache@v6
      with:
        path: ${{ github.workspace }}/.terraform.d/plugin-cache
        key: ${{ runner.os }}-tf-${{ inputs.terraform-version }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-tf-${{ inputs.terraform-version }}-

    # 3. Các bước Terraform
    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform init -input=false

    - name: Terraform Validate
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform validate

    - name: Trivy IaC scan
      if: ${{ inputs.run-iac-scan == 'true' }}
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: config
        scan-ref: ${{ inputs.working-directory }}
        severity: ${{ inputs.trivy-severity }}
        exit-code: ${{ inputs.trivy-exit-code }}
        format: table

    - name: Checkov scan
      if: ${{ inputs.run-iac-scan == 'true' }}
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: ${{ inputs.working-directory }}
        framework: terraform
        soft_fail: ${{ inputs.checkov-soft-fail }}
        quiet: ${{ inputs.checkov-quiet }}

    - name: Terraform Plan
      id: plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        VAR_FILE: ${{ inputs.var-file }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set -o pipefail

        VAR_FILE_FLAG=""
        if [ -n "$VAR_FILE" ]; then
          VAR_FILE_FLAG="-var-file=$VAR_FILE"
        fi

        set +e
        terraform plan \
          -input=false \
          -no-color \
          -detailed-exitcode \
          $VAR_FILE_FLAG \
          $EXTRA_ARGS 2>&1 | tee plan.txt
        PLAN_EXIT_CODE=${PIPESTATUS[0]}
        set -e

        echo "exitcode=$PLAN_EXIT_CODE" >> "$GITHUB_OUTPUT"
        if [ "$PLAN_EXIT_CODE" -eq 2 ]; then
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
        fi

        if [ "$PLAN_EXIT_CODE" -ne 0 ] && [ "$PLAN_EXIT_CODE" -ne 2 ]; then
          exit "$PLAN_EXIT_CODE"
        fi

    - name: Upload Plan Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan-${{ github.run_id }}
        path: ${{ inputs.working-directory }}/plan.txt
        if-no-files-found: ignore
        retention-days: 5

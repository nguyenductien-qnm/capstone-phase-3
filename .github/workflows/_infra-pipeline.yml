name: Infrastructure Pipeline

on:
  # 1. Chạy APPLY khi code được merge vào các nhánh chính
  push:
    branches:
      - main
      - develop
      - "release/**"
      - "hotfix/**"
    paths:
      - "terraform/**"
      - ".github/workflows/infra-pipeline.yml"

  pull_request:
    branches:
      - main
      - develop
      - "release/**"
      - "hotfix/**"
    paths:
      - "terraform/**"
      - ".github/workflows/infra-pipeline.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Override environment"
        required: false
        default: ""
        type: choice
        options: ["develop", "prod"]

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: false

jobs:
  determine-env:
    runs-on: ubuntu-slim
    outputs:
      env_name: ${{ steps.set-env.outputs.env_name }}
      tf_working_dir: ${{ steps.set-env.outputs.tf_working_dir }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: set-env
        shell: bash
        env:
          BRANCH: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
          INPUT_ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail

          ENV_NAME="$INPUT_ENV"

          if [[ -z "$ENV_NAME" ]]; then
            case "$BRANCH" in
              main)
                ENV_NAME="prod"
                ;;
              develop|release/*|hotfix/*)
                ENV_NAME="develop"
                ;;
              *)
                echo "::error::Unsupported branch: $BRANCH"
                exit 1
                ;;
            esac
          fi

          if [[ "$ENV_NAME" == "prod" && "$BRANCH" != "main" ]]; then
            echo "::error::Production deployment is only allowed from main"
            exit 1
          fi

          TF_DIR="terraform/environments/$ENV_NAME"

          if [[ ! -d "$TF_DIR" ]]; then
            echo "::error::Directory not found: $TF_DIR"
            exit 1
          fi

          {
            echo "env_name=$ENV_NAME"
            echo "tf_working_dir=$TF_DIR"
          } >> "$GITHUB_OUTPUT"

          echo "Target: branch [$BRANCH] -> env [$ENV_NAME] -> dir [$TF_DIR]"

  terraform-plan:
    needs: determine-env
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ vars.TF_TTL || 20 }}

    permissions:
      contents: read
      id-token: write

    environment:
      name: ${{ needs.determine-env.outputs.env_name }}

    concurrency:
      group: terraform-${{ needs.determine-env.outputs.env_name }}
      cancel-in-progress: false

    env: &terraform-env
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
      TF_VERSION: ${{ vars.TF_VERSION || '1.10.0' }}
      TF_VAR_eks_access_entries: ${{ vars.TF_VAR_eks_access_entries || secrets.TF_VAR_eks_access_entries }}
      TF_VAR_route53_zone_id: ${{ vars.TF_VAR_route53_zone_id || secrets.TF_VAR_route53_zone_id }}
      TF_VAR_subdomain: ${{ vars.TF_VAR_subdomain || secrets.TF_VAR_subdomain }}
      TF_VAR_acm_certificate_arn: ${{ vars.TF_VAR_acm_certificate_arn || secrets.TF_VAR_acm_certificate_arn }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform tfvars
        working-directory: ${{ needs.determine-env.outputs.tf_working_dir }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f terraform.tfvars.example ]]; then
            cp terraform.tfvars.example terraform.tfvars
            echo "Copied terraform.tfvars.example"
          fi

      - name: AWS Auth OIDC
        if: ${{ !env.ACT }}
        uses: ./.github/actions/aws-auth-oidc
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Terraform Plan
        uses: ./.github/actions/tf-plan
        with:
          working-directory: ${{ needs.determine-env.outputs.tf_working_dir }}
          terraform-version: ${{ env.TF_VERSION }}
          use-cache: "true"

  terraform-apply:
    needs: [determine-env, terraform-plan]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ vars.TF_TTL || 20 }}

    permissions:
      contents: read
      id-token: write

    environment:
      name: ${{ needs.determine-env.outputs.env_name }}

    concurrency:
      group: terraform-${{ needs.determine-env.outputs.env_name }}
      cancel-in-progress: false

    env: *terraform-env

    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform tfvars
        working-directory: ${{ needs.determine-env.outputs.tf_working_dir }}
        run: |
          [ -f terraform.tfvars.example ] && cp terraform.tfvars.example terraform.tfvars && echo "✅ Copied tfvars" || echo "⚠️ Skip tfvars"

      - name: AWS Auth OIDC
        if: ${{ !env.ACT }}
        uses: ./.github/actions/aws-auth-oidc
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Terraform Apply
        uses: ./.github/actions/tf-apply
        with:
          working-directory: ${{ needs.determine-env.outputs.tf_working_dir }}
          terraform-version: ${{ env.TF_VERSION }}
          use-cache: "true"
          auto-approve: "true"

name: Platform CI

# CDO-145 (gate stage 0): secret scan + unit test + helm lint chạy trên MỌI push/PR.
# CDO-141: helm lint + template render làm gate validate manifest TRƯỚC khi deploy.
#
# Đây là gate rẻ, không cần AWS creds — fail sớm để chặn code lỗi/lộ secret trước khi
# tới các workflow tốn kém (app-build push ECR, infra-cd apply).

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: platform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------ #
  # CDO-145: Secret scan toàn repo. Quét full history trên push;       #
  # trên PR chỉ quét diff (nhanh + đủ để chặn secret mới thêm).        #
  # ------------------------------------------------------------------ #
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          # fetch full history để gitleaks quét được toàn bộ commit trên push.
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------ #
  # CDO-145: Dò service nào có unit test chạy được + đổi code trong PR. #
  #                                                                    #
  # Trước đây matrix liệt kê tay [checkout, product-catalog] nên hỏng   #
  # 2 đằng: product-catalog KHÔNG có file _test.go nào (check luôn      #
  # xanh, không bao giờ đỏ được), còn 12 file test của product-reviews/ #
  # shopping-copilot/cart viết ra thì không ai chạy vì không có tên     #
  # trong matrix. Dò tự động chấm dứt cả hai — thêm test mới là tự vào  #
  # gate, hết test là tự rơi ra, không phải sửa file này nữa.           #
  # ------------------------------------------------------------------ #
  discover:
    name: Dò service có test
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.scan.outputs.go }}
      py: ${{ steps.scan.outputs.py }}
      cs: ${{ steps.scan.outputs.cs }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          # cần lịch sử để diff được với nhánh đích của PR
          fetch-depth: 0
      - id: scan
        run: |
          # push (không có base_ref) -> quét toàn bộ, không lọc diff.
          .github/scripts/discover-tests.sh "${{ github.event.pull_request.base.sha }}"

  # ------------------------------------------------------------------ #
  # Go: go vet + go test -race. Chỉ chạy service vừa có go.mod vừa có   #
  # ít nhất 1 file _test.go.                                           #
  # ------------------------------------------------------------------ #
  unit-test-go:
    name: Unit test Go (${{ matrix.service }})
    needs: discover
    if: needs.discover.outputs.go != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.discover.outputs.go) }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: techx-corp-platform/src/${{ matrix.service }}/go.mod
          cache-dependency-path: techx-corp-platform/src/${{ matrix.service }}/go.sum
      - name: go vet
        working-directory: techx-corp-platform/src/${{ matrix.service }}
        run: go vet ./...
      - name: go test
        working-directory: techx-corp-platform/src/${{ matrix.service }}
        run: go test -race -count=1 ./...

  # ------------------------------------------------------------------ #
  # Python: pip install -r requirements.txt + pytest.                   #
  # Bước collect-only là bắt buộc — ml-guard/llm có file tên test_*.py  #
  # nhưng assert nằm ngoài hàm test_*, pytest thu 0 test rồi trả về     #
  # "no tests ran". Không chặn thì lại đẻ ra ô tích trống mới.          #
  # ------------------------------------------------------------------ #
  unit-test-python:
    name: Unit test Python (${{ matrix.service }})
    needs: discover
    if: needs.discover.outputs.py != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.discover.outputs.py) }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: techx-corp-platform/src/${{ matrix.service }}/requirements.txt
      - name: Cài dependency
        working-directory: techx-corp-platform/src/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Kiểm pytest có thu được test không
        working-directory: techx-corp-platform/src/${{ matrix.service }}
        run: |
          set -euo pipefail
          n=$(python -m pytest --collect-only -q 2>/dev/null | grep -cE '::' || true)
          if [ "$n" -eq 0 ]; then
            echo "::error::pytest không thu được test nào — file test_*.py phải có hàm tên test_*, xem issue #339."
            exit 1
          fi
          echo "✅ pytest thu được $n test"
      - name: pytest
        working-directory: techx-corp-platform/src/${{ matrix.service }}
        run: python -m pytest -q

  # ------------------------------------------------------------------ #
  # .NET: dotnet test project xunit. TargetFramework net10.0 (xem       #
  # cart/tests/cart.tests.csproj).                                      #
  # ------------------------------------------------------------------ #
  unit-test-dotnet:
    name: Unit test .NET (${{ matrix.service }})
    needs: discover
    if: needs.discover.outputs.cs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.discover.outputs.cs) }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'
      - name: dotnet test
        working-directory: techx-corp-platform/src/${{ matrix.service }}
        run: dotnet test --nologo --verbosity normal

  # ------------------------------------------------------------------ #
  # Job gác cổng — ĐÂY mới là cái đặt vào required status checks, KHÔNG #
  # phải từng job con.                                                  #
  #                                                                    #
  # Lý do: matrix sinh động nên tên job đổi theo từng PR. Required      #
  # check là chuỗi cố định — PR không đụng service nào thì job đó không #
  # tồn tại, GitHub chờ mãi một check không bao giờ tới và PR treo ở    #
  # trạng thái Expected, không merge được. Job này luôn chạy nên tên    #
  # luôn ổn định; thêm service mới cũng không phải sửa ruleset.         #
  #                                                                    #
  # skipped = không service nào có test bị đổi -> hợp lệ, cho qua.      #
  # ------------------------------------------------------------------ #
  unit-test:
    name: Unit tests
    needs: [discover, unit-test-go, unit-test-python, unit-test-dotnet]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Tổng hợp kết quả
        run: |
          set -euo pipefail
          fail=0
          for r in "discover:${{ needs.discover.result }}" \
                   "go:${{ needs.unit-test-go.result }}" \
                   "python:${{ needs.unit-test-python.result }}" \
                   "dotnet:${{ needs.unit-test-dotnet.result }}"; do
            name=${r%%:*}; res=${r#*:}
            case "$res" in
              success)  echo "✅ $name: $res" ;;
              skipped)  echo "⏭️  $name: không service nào cần chạy" ;;
              *)        echo "::error::❌ $name: $res"; fail=1 ;;
            esac
          done
          exit $fail

  # ------------------------------------------------------------------ #
  # CDO-141: Validate Helm/manifest làm gate trước deploy.             #
  # lint + template render toàn bộ values overlay của sandbox. Nếu     #
  # chart không render được -> chặn (ArgoCD sẽ không deploy rác).      #
  # ------------------------------------------------------------------ #
  helm:
    name: Helm lint + render (deploy gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - name: Lint application chart
        run: >-
          helm lint platform/charts/application
          -f platform/gitops/environments/sandbox/values-observability.yaml
          -f platform/gitops/environments/sandbox/values-flagd-sync.yaml
          -f platform/gitops/environments/sandbox/values-external-secrets.yaml
          -f platform/gitops/environments/sandbox/values-image-tags.yaml
      - name: Render application chart
        run: >-
          helm template techx-corp platform/charts/application
          -f platform/gitops/environments/sandbox/values-observability.yaml
          -f platform/gitops/environments/sandbox/values-flagd-sync.yaml
          -f platform/gitops/environments/sandbox/values-external-secrets.yaml
          -f platform/gitops/environments/sandbox/values-image-tags.yaml
          > /tmp/techx-corp-rendered.yaml
      - name: Fail nếu manifest rỗng
        run: |
          set -euo pipefail
          if [ ! -s /tmp/techx-corp-rendered.yaml ]; then
            echo "::error::Chart render ra manifest rỗng — chặn deploy."
            exit 1
          fi
          echo "✅ Chart render OK ($(wc -l < /tmp/techx-corp-rendered.yaml) dòng)"

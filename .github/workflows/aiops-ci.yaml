name: AIOps CI

on:
  pull_request:
    paths:
      - "aiops/**"
      - ".github/workflows/aiops-ci.yaml"
  push:
    branches: [main, develop]
    paths:
      - "aiops/**"
      - ".github/workflows/aiops-ci.yaml"

permissions:
  contents: read

concurrency:
  group: aiops-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [log_clustering, detector, remediation]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aiops/${{ matrix.module }}/requirements.txt
      - run: pip install -r aiops/${{ matrix.module }}/requirements.txt pytest
      - run: pytest -q
        working-directory: aiops/${{ matrix.module }}

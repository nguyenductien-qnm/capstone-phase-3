name: AI Pipeline & Evals

on:
  pull_request:
    paths:
      - 'docs/ai/**'
      - 'techx-corp-platform/src/llm/**'
  push:
    branches:
      - main

jobs:
  ai-evals:
    name: Run AI Evaluations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run Pytest (Task Success & Fallback)
        run: |
          pytest docs/ai/evals/ -v

      - name: Guardrail Self-Check
        run: |
          # Simulate guardrail check
          echo "[OK] Guardrails passed self-check"

      - name: Run Fidelity Evaluation (Summaries)
        run: |
          python docs/ai/evals/run_evals.py --threshold 0.70

      - name: Run QA Evaluation (Grounded, No-Info, Injection)
        run: |
          python docs/ai/evals/run_qa_evals.py --threshold 0.80

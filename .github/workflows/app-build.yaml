name: App Build (ECR + Trivy + Cosign + GitOps bump)

# CDO-140 (build+push ECR, tag convention, immutable) + CDO-146 (Trivy + Cosign ký
# digest) + CDO-142 (bump tag vào Git -> ArgoCD selfHeal sync).
#
# Deploy model (build once, promote): CI chỉ chạy trên nhánh develop -> build ->
# push ECR (by digest) -> Trivy gate -> Cosign keyless ký DIGEST -> yq bump
# components.<svc>.imageOverride.tag vào tags file của môi trường DEVELOP -> commit
# [skip ci] -> ArgoCD develop sync. KHÔNG kubectl tay.
# Prod (env sandbox cũ) KHÔNG có CI bump: chỉ nhận tag qua PR promote (chép tag đã
# chạy ổn ở develop sang environments/sandbox/values-image-tags.yaml, có review).
# Không build lại image cho prod -> giữ nguyên digest đã scan + ký + test ở develop.
#
# Tag convention: <version>-<service>-<sha>  (version = chart appVersion default.image.tag).
# ECR: 1 repo chung ecommerce-dev-techx-corp, IMMUTABLE. Ký theo digest, không ký tag.
#
# Service build được suy ra ĐỘNG, không hardcode: giao của
#   (a) component `enabled: true` trong chart values.yaml, KHÔNG có imageOverride.repository
#       (có repository = image upstream: flagd/postgresql/valkey-cart -> bỏ), và
#   (b) có Dockerfile trong techx-corp-platform/src/<svc>/ (hoặc <svc>/src/ như cart).
# Thêm service mới vào chart + có Dockerfile là tự động được build, không sửa file này.
#
# NGOẠI LỆ aiops (MANDATE-10 P2): 2 image aiops (detector, remediation) KHÔNG nằm trong
# chart application (deploy bằng manifest trần ở aiops/*/deploy, ArgoCD app `aiops`) và
# build context lệch nhau (remediation dùng chung code của detector -> context là aiops/).
# Nên chúng có job build-aiops riêng với matrix TĨNH ở cuối file, thay vì nhét vào detect.
# Cùng file = cùng subject identity Cosign, đó là lý do không tách workflow.

on:
  push:
    # Chỉ develop: main không rebuild image (build once). Lên prod đi đường promote PR.
    branches: ["develop"]
    paths:
      - "techx-corp-platform/src/**"
      - "platform/charts/application/values.yaml"
      # MANDATE-10 P2: aiops/** vào ĐÚNG file này (không tách workflow riêng) để 2 image
      # aiops mang CÙNG subject identity (app-build.yaml@refs/heads/develop) mà policy
      # Kyverno verifyImages đang khai — thêm workflow khác = phải nới attestor.
      - "aiops/**"
      - ".trivyignore"
      - ".github/workflows/app-build.yaml"
  pull_request:
    branches: ["develop"]
    paths:
      - "techx-corp-platform/src/**"
      - "platform/charts/application/values.yaml"
      - "aiops/**"
      - ".trivyignore"
      - ".github/workflows/app-build.yaml"
  workflow_dispatch:
    inputs:
      services:
        description: "Danh sách service build (space-separated), rỗng = build tất cả"
        required: false
        type: string
      attest_sbom:
        description: "Chế độ SBOM-only: KHÔNG build, chỉ attest SBOM cho digest prod đang chạy (đọc tags sandbox)"
        required: false
        type: boolean
        default: false
      sbom_dry_run:
        description: "(chỉ khi attest_sbom) chỉ resolve digest, KHÔNG syft/attest"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  # KHÔNG cancel-in-progress: build đã push + bump commit không nên bị hủy giữa chừng.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY || '804372444787.dkr.ecr.us-east-1.amazonaws.com' }}
  # 1 repo chung, service phân biệt bằng tag suffix (khớp chart _objects.tpl:73).
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'ecommerce-dev-techx-corp' }}
  # Phần <version> trong tag <version>-<svc>-<sha>. Nguồn THẬT: GitHub Actions
  # variable IMAGE_VERSION, fallback '1.0' — KHÔNG lấy từ default.image.tag của chart
  # (sửa default.image.tag trong values.yaml KHÔNG làm tag build đổi). Muốn lên version:
  # đổi vars.IMAGE_VERSION.
  IMAGE_VERSION: ${{ vars.IMAGE_VERSION || '1.0' }}
  BUILD_CONTEXT: techx-corp-platform
  # CI CHỈ ghi file tags tách riêng (không comment) -> yq bump không phá format
  # values.yaml gốc. Helm/ArgoCD load file này SAU values.yaml để override tag.
  # Bump vào tags file của DEVELOP; tags file sandbox (prod) chỉ đổi qua promote PR.
  TAGS_FILE: platform/gitops/environments/develop/values/values-image-tags.yaml

jobs:
  # ------------------------------------------------------------------ #
  # Suy ra danh sách service team-owned từ chart + filesystem (không     #
  # hardcode), rồi lọc theo thay đổi thực tế:                            #
  #   push/PR   -> service có file đổi trong src/<svc>/ (git diff)       #
  #   dispatch  -> theo input (rỗng = build tất cả service team-owned)   #
  # Chart values.yaml đổi -> build tất cả (tag/enabled có thể đã đổi).   #
  # ------------------------------------------------------------------ #
  detect:
    name: Detect changed services
    # Chế độ attest_sbom (workflow_dispatch) KHÔNG build gì -> bỏ qua toàn bộ nhánh
    # detect/build/bump (chúng needs detect nên cũng skip theo).
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.attest_sbom) }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      any: ${{ steps.set.outputs.any }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Cần commit trước đó để git diff ra file đã đổi.
          fetch-depth: 0

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Build matrix
        id: set
        env:
          EVENT: ${{ github.event_name }}
          DISPATCH_SERVICES: ${{ github.event.inputs.services }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          VALUES: platform/charts/application/values.yaml
        run: |
          set -euo pipefail

          # (a) Component team-owned trong chart: enabled=true và KHÔNG có
          # imageOverride.repository (có repository = kéo từ registry ngoài).
          mapfile -t owned < <(
            yq -r '.components | to_entries[]
                   | select(.value.enabled == true)
                   | select(.value.imageOverride.repository == null)
                   | .key' "$VALUES"
          )

          # (b) Giao với Dockerfile có thật. cart (.NET) để Dockerfile ở
          # src/cart/src/ nên thử cả 2 vị trí thay vì đặc case theo tên.
          declare -A DOCKERFILE=()
          for svc in "${owned[@]}"; do
            for cand in "src/$svc/Dockerfile" "src/$svc/src/Dockerfile"; do
              if [ -f "$BUILD_CONTEXT/$cand" ]; then
                DOCKERFILE[$svc]="$cand"
                break
              fi
            done
          done
          if [ "${#DOCKERFILE[@]}" -eq 0 ]; then
            echo "::error::Không tìm thấy service team-owned nào có Dockerfile."
            exit 1
          fi
          echo "Service team-owned: ${!DOCKERFILE[*]}"

          # KHÔNG còn danh sách hoãn build: mọi service team-owned đều build được với
          # Trivy gate bật. CVE không vá được xử bằng .trivyignore (từng CVE ID, có lý
          # do + hạn review) thay vì hoãn cả service — service vẫn deploy được code mới.

          # --- Chọn service cần build ---------------------------------------
          selected=()
          case "$EVENT" in
            workflow_dispatch)
              if [ -n "${DISPATCH_SERVICES:-}" ]; then
                read -ra requested <<< "$DISPATCH_SERVICES"
                for svc in "${requested[@]}"; do
                  if [ -z "${DOCKERFILE[$svc]:-}" ]; then
                    echo "::error::Service '$svc' không phải team-owned hoặc không có Dockerfile."
                    exit 1
                  fi
                  selected+=("$svc")
                done
              else
                selected=("${!DOCKERFILE[@]}")
              fi
              ;;
            *)
              # BASE_SHA rỗng (branch mới) hoặc không tồn tại -> build tất cả cho an toàn.
              if [ -z "${BASE_SHA:-}" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] \
                 || ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
                echo "Không xác định được base commit -> build tất cả."
                selected=("${!DOCKERFILE[@]}")
              else
                mapfile -t changed < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}")

                # (1) Thay đổi trong src/<svc>/ -> build đúng service đó.
                for svc in "${!DOCKERFILE[@]}"; do
                  if printf '%s\n' "${changed[@]}" | grep -q "^techx-corp-platform/src/$svc/"; then
                    selected+=("$svc")
                  fi
                done

                # (2) values.yaml đổi: KHÔNG mặc định build tất cả nữa. Chỉ rebuild khi
                # thay đổi là BUILD-RELEVANT. Field runtime thuần (resources/hpa/probes/
                # env/replicas/service/...) inject lúc chạy, KHÔNG bake vào image -> chỉ
                # cần Helm validate (validate-manifest), không rebuild.
                #
                # Cách xác định: xoá mọi key runtime khỏi .components[svc] rồi so phần
                # CÒN LẠI base vs head. Khác nhau = có thay đổi build-relevant. Fail-safe:
                # key lạ/mới KHÔNG nằm trong danh sách xoá vẫn ở phần còn lại -> build
                # thừa (an toàn) thay vì skip nhầm -> deploy image cũ.
                if printf '%s\n' "${changed[@]}" | grep -qx "$VALUES"; then
                  RT='del(.resources,.hpa,.podAnnotations,.env,.service,.securityContext,.readinessProbe,.livenessProbe,.startupProbe,.podDisruptionBudget,.topologySpread,.terminationGracePeriodSeconds,.lifecycle,.deploymentStrategy,.replicas,.ports,.serviceAccount,.command,.initContainers,.sidecarContainers,.additionalVolumes,.mountedConfigMaps,.mountedEmptyDirs,.ingress)'
                  BASE_V=$(git show "$BASE_SHA:$VALUES" 2>/dev/null || true)
                  HEAD_V=$(git show "${{ github.sha }}:$VALUES" 2>/dev/null || cat "$VALUES")

                  if [ -z "$BASE_V" ]; then
                    echo "Không đọc được $VALUES ở base -> build tất cả (an toàn)."
                    selected=("${!DOCKERFILE[@]}")
                  elif [ "$(yq 'del(.components)' <<<"$BASE_V")" != "$(yq 'del(.components)' <<<"$HEAD_V")" ]; then
                    # Thay đổi NGOÀI .components (global/default/... ảnh hưởng mọi service).
                    echo "$VALUES: đổi ngoài .components -> build tất cả."
                    selected=("${!DOCKERFILE[@]}")
                  else
                    for svc in "${!DOCKERFILE[@]}"; do
                      b=$(yq ".components[\"$svc\"] | $RT" <<<"$BASE_V")
                      h=$(yq ".components[\"$svc\"] | $RT" <<<"$HEAD_V")
                      if [ "$b" != "$h" ]; then
                        echo "$VALUES: components.$svc đổi build-relevant -> build $svc."
                        selected+=("$svc")
                      fi
                    done
                  fi
                fi
              fi
              ;;
          esac

          if [ "${#selected[@]}" -eq 0 ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "Không service nào thay đổi."
            exit 0
          fi

          include=""
          for svc in $(printf '%s\n' "${selected[@]}" | sort -u); do
            [ -n "$include" ] && include+=","
            include+="{\"service\":\"$svc\",\"dockerfile\":\"${DOCKERFILE[$svc]}\"}"
          done

          echo "any=true" >> "$GITHUB_OUTPUT"
          echo "matrix={\"include\":[$include]}" >> "$GITHUB_OUTPUT"
          echo "Sẽ build: $(printf '%s ' "${selected[@]}")"

  # ------------------------------------------------------------------ #
  # CDO-141: Validate Helm/manifest làm GATE trước build/deploy.        #
  # Chart không render được -> không build/push image nào (fail sớm).   #
  # ------------------------------------------------------------------ #
  validate-manifest:
    name: Validate Helm manifest (deploy gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      # Validate với ĐÚNG bộ values mà ArgoCD develop dùng (xem
      # environments/develop/applications/application.yaml) — render lệch bộ
      # values thật thì gate vô nghĩa.
      - name: Lint chart
        run: >-
          helm lint platform/charts/application
          -f platform/gitops/environments/develop/values/values-application.yaml
          -f platform/gitops/environments/develop/values/values-ops-observability.yaml
          -f platform/gitops/environments/develop/values/values-external-secrets.yaml
          -f platform/gitops/environments/develop/values/values-single-replica.yaml
          -f platform/gitops/environments/develop/values/values-image-tags.yaml
      - name: Render chart (fail nếu rỗng)
        run: |
          set -euo pipefail
          helm template techx-corp platform/charts/application \
            -f platform/gitops/environments/develop/values/values-application.yaml \
            -f platform/gitops/environments/develop/values/values-ops-observability.yaml \
            -f platform/gitops/environments/develop/values/values-external-secrets.yaml \
            -f platform/gitops/environments/develop/values/values-single-replica.yaml \
            -f platform/gitops/environments/develop/values/values-image-tags.yaml \
            > /tmp/rendered.yaml
          [ -s /tmp/rendered.yaml ] || { echo "::error::manifest rỗng"; exit 1; }
          echo "✅ manifest OK"

  # ------------------------------------------------------------------ #
  # Build -> Trivy gate -> (nếu không PR) push by-digest + Cosign ký    #
  # digest. Mỗi service 1 job matrix, tag riêng <version>-<svc>-<sha>.  #
  # needs validate-manifest: gate CDO-141 phải xanh mới được build.     #
  # ------------------------------------------------------------------ #
  build:
    name: Build ${{ matrix.service }}
    needs: [detect, validate-manifest]
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    # Trust policy của GitHubTerraformSandboxRole khóa sub bằng StringEquals:
    #   repo:<org>/<repo>:environment:sandbox
    environment: sandbox
    permissions:
      contents: read
      id-token: write # OIDC cho AWS + Cosign keyless (Fulcio)
      attestations: write # GitHub Artifact Attestations (SLSA provenance)
      artifact-metadata: write # Required by actions/attest to store provenance metadata
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    outputs:
      # dùng cho job bump: service -> digest. (matrix outputs gộp theo key cuối;
      # bump job đọc lại digest từ ECR theo tag nên không phụ thuộc output này.)
      dummy: "ok"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tag
        id: meta
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="${IMAGE_VERSION}-${{ matrix.service }}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=${ECR_REGISTRY}/${ECR_REPOSITORY}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TF_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.actor }}-${{ github.run_id }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      # Một số Dockerfile cần ARG version (ad/fraud-detection: OTEL_JAVA_AGENT_VERSION,
      # currency: OPENTELEMETRY_CPP_VERSION). Thiếu -> URL thành .../download/v/... -> 404.
      # Đọc từ techx-corp-platform/.env (nguồn sự thật, docker-compose cũng dùng file này)
      # thay vì hardcode ở đây, để bump version chỉ sửa 1 chỗ.
      - name: Load build args từ .env
        id: buildargs
        run: |
          set -euo pipefail
          if [ -f "$BUILD_CONTEXT/.env" ]; then
            ENV_FILE="$BUILD_CONTEXT/.env"
          else
            ENV_FILE="$BUILD_CONTEXT/.env.example"
          fi
          {
            echo "args<<EOF"
            grep -E '^(OTEL_JAVA_AGENT_VERSION|OPENTELEMETRY_CPP_VERSION)=' "$ENV_FILE" \
              | sed 's/[[:space:]]*$//'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # PR: build (load local) để scan, KHÔNG push. push/dispatch: build & push.
      - name: Build image (load, for scan)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.BUILD_CONTEXT }}/${{ matrix.dockerfile }}
          build-args: ${{ steps.buildargs.outputs.args }}
          load: true
          push: false
          tags: ${{ steps.meta.outputs.image }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      # KHÔNG dùng `ignore-unfixed: true` — cờ đó tắt mọi CVE chưa có bản vá trên mọi
      # service, nên khi upstream phát hành bản vá thì gate im lặng thay vì đỏ lên bắt
      # rebuild. Thay bằng .trivyignore ở repo root: liệt kê TỪNG CVE ID được bỏ qua,
      # kèm lý do + hạn review -> CVE mới vẫn chặn được.
      - name: Trivy vulnerability scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore

      # Chỉ push khi không phải PR. Push by-digest để ký theo digest (chuẩn immutable).
      - name: Push image
        id: push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.BUILD_CONTEXT }}/${{ matrix.dockerfile }}
          build-args: ${{ steps.buildargs.outputs.args }}
          push: true
          tags: ${{ steps.meta.outputs.image }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.service }}

      - name: Cosign keyless sign (by digest)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          # Ký DIGEST, không ký tag: digest bất biến, tag chỉ là con trỏ.
          REF="${ECR_REGISTRY}/${ECR_REPOSITORY}@${DIGEST}"
          cosign sign --yes \
            --rekor-url https://rekor.sigstore.dev \
            --fulcio-url https://fulcio.sigstore.dev \
            "$REF"
          echo "✅ Signed $REF"

      # CDO SBOM: sinh SBOM (SPDX) từ image ĐÃ push theo DIGEST rồi cosign attest
      # predicate spdxjson. Gắn theo digest (bất biến) — cùng REF với bước sign trên.
      # download-syft chỉ cài binary syft (pin SHA), không tự attest -> chủ động loop/attest.
      - name: Install Syft
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: SBOM + cosign attest (spdxjson, by digest)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          REF="${ECR_REGISTRY}/${ECR_REPOSITORY}@${DIGEST}"
          # syft xuất spdx-json (có gạch nối); cosign nhận --type spdxjson (không gạch nối).
          syft "registry:${REF}" -o spdx-json > sbom.spdx.json
          cosign attest --yes \
            --type spdxjson \
            --predicate sbom.spdx.json \
            --rekor-url https://rekor.sigstore.dev \
            --fulcio-url https://fulcio.sigstore.dev \
            "$REF"
          echo "✅ SBOM attested $REF ($(jq '.packages | length' sbom.spdx.json) packages)"

      # P3 extra: GitHub-native SLSA provenance. Do NOT push this attestation to ECR:
      # the image repo is IMMUTABLE and the cosign SBOM already owns the .att tag.
      # GitHub stores this provenance in the repository attestations API; verify with:
      #   gh attestation verify oci://<registry>/<repo>@sha256:<digest> -R <repo>
      - name: SLSA provenance attestation (GitHub)
        if: github.event_name != 'pull_request'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: false

  # ------------------------------------------------------------------ #
  # MANDATE-10 P2: build 2 image aiops trong CHÍNH workflow này.        #
  #                                                                     #
  # Vì sao không dùng job detect/build ở trên: detect suy service từ    #
  # chart values.yaml, aiops không có component nào trong chart; và     #
  # remediation build từ context `aiops/` (import sources.py/alerter.py #
  # của detector) trong khi detector build từ `aiops/detector/`. Hai    #
  # khác biệt đó không mô hình hoá được bằng vòng lặp chung -> matrix    #
  # tĩnh 2 dòng, đọc thẳng ra là hiểu.                                  #
  #                                                                     #
  # Trước mandate này 2 image được `docker buildx --push` bằng TAY, tag  #
  # trôi không có -<sha>: không scan, không ký, không truy được commit.  #
  # Ở đây chúng đi đủ build -> Trivy gate -> push by-digest -> Cosign    #
  # ký digest -> SBOM attest, hệt các service chart.                     #
  # ------------------------------------------------------------------ #
  # Có aiops/** thật sự đổi không. Tách job nhỏ vì build-aiops là matrix — hỏi git một
  # lần ở đây rẻ hơn lặp trong từng nhánh matrix. Không dùng lại job detect: detect suy
  # service từ chart, không biết gì về aiops.
  detect-aiops:
    name: Detect aiops changes
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.attest_sbom) }}
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.set.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          # dispatch: luôn build (người bấm tay đang chủ động muốn ra image mới).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"; echo "dispatch -> build aiops."; exit 0
          fi
          # Không xác định được base (branch mới/force push) -> build cho an toàn,
          # cùng lối fail-safe như job detect ở trên.
          if [ -z "${BASE_SHA:-}" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            echo "any=true" >> "$GITHUB_OUTPUT"; echo "Không có base commit -> build aiops."; exit 0
          fi
          mapfile -t changed < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}")

          # Chỉ build khi CODE aiops đổi, tức file dưới aiops/ mà KHÔNG nằm trong
          # */deploy/. Vì sao loại deploy/: đó là manifest mà chính job bump ghi tag
          # vào; coi nó là "aiops đổi" thì commit bump lại kích một build nữa, build
          # lại bump — vòng lặp tự nuôi (commit bump có [skip ci] nên thực tế đứt,
          # nhưng không dựa vào đó: rebuild vì tag đổi vẫn là build thừa).
          # .trivyignore / workflow đổi -> build lại để chính thay đổi đó được kiểm.
          # Đếm file aiops/** KHÔNG nằm trong */deploy/ (dùng biến đếm cho dễ đọc, và
          # để tránh bẫy `grep -v` trên stream rỗng vẫn trả 0 -> true oan).
          code_changed=$(printf '%s\n' "${changed[@]}" \
            | { grep -E '^aiops/' || true; } \
            | { grep -vc '/deploy/' || true; })

          build_config_changed=false
          if printf '%s\n' "${changed[@]}" \
               | grep -qE '^\.github/workflows/app-build\.yaml$|^\.trivyignore$'; then
            build_config_changed=true
          fi

          if [ "$code_changed" -gt 0 ] || [ "$build_config_changed" = true ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
            echo "aiops đổi ($code_changed file code, build-config=$build_config_changed) -> build."
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "aiops không đổi -> skip."
          fi

  build-aiops:
    name: Build aiops-${{ matrix.module }}
    # KHÔNG needs detect: detect chỉ nói về service trong chart, aiops đổi mà chart
    # không đổi thì detect.any=false -> needs sẽ skip oan cả job này.
    # Vẫn needs validate-manifest để giữ 1 gate chung: chart hỏng thì không push gì.
    needs: [detect-aiops, validate-manifest]
    if: needs.detect-aiops.outputs.any == 'true'
    runs-on: ubuntu-latest
    environment: sandbox
    permissions:
      contents: read
      id-token: write # OIDC cho AWS + Cosign keyless (Fulcio)
      attestations: write # GitHub Artifact Attestations (SLSA provenance)
      artifact-metadata: write # Required by actions/attest to store provenance metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          # version giữ nguyên số đang chạy trên prod để lịch sử tag đọc liền mạch
          # (1.3-aiops-detector -> 1.3-aiops-detector-<sha>), chỉ thêm suffix sha.
          - module: detector
            version: "1.3"
            context: aiops/detector
            dockerfile: aiops/detector/Dockerfile
          - module: remediation
            version: "1.1"
            context: aiops # cha của detector/ + remediation/ — xem Dockerfile
            dockerfile: aiops/remediation/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tag
        id: meta
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="${{ matrix.version }}-aiops-${{ matrix.module }}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=${ECR_REGISTRY}/${ECR_REPOSITORY}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TF_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-aiops-${{ github.actor }}-${{ github.run_id }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: Build image (load, for scan)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ steps.meta.outputs.image }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=aiops-${{ matrix.module }}
          cache-to: type=gha,mode=max,scope=aiops-${{ matrix.module }}

      # Cùng gate + cùng .trivyignore như service chart: aiops không được hưởng
      # tiêu chuẩn scan thấp hơn chỉ vì trước đây nó nằm ngoài CI.
      - name: Trivy vulnerability scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Push image
        id: push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.image }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=aiops-${{ matrix.module }}

      - name: Cosign keyless sign (by digest)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          REF="${ECR_REGISTRY}/${ECR_REPOSITORY}@${DIGEST}"
          cosign sign --yes \
            --rekor-url https://rekor.sigstore.dev \
            --fulcio-url https://fulcio.sigstore.dev \
            "$REF"
          echo "✅ Signed $REF"

      - name: Install Syft
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: SBOM + cosign attest (spdxjson, by digest)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          REF="${ECR_REGISTRY}/${ECR_REPOSITORY}@${DIGEST}"
          syft "registry:${REF}" -o spdx-json > sbom.spdx.json
          cosign attest --yes \
            --type spdxjson \
            --predicate sbom.spdx.json \
            --rekor-url https://rekor.sigstore.dev \
            --fulcio-url https://fulcio.sigstore.dev \
            "$REF"
          echo "✅ SBOM attested $REF ($(jq '.packages | length' sbom.spdx.json) packages)"

      # P3 extra: GitHub-native SLSA provenance. Keep it in GitHub attestations API,
      # not ECR, to avoid colliding with existing cosign SBOM .att tags on immutable ECR.
      - name: SLSA provenance attestation (GitHub)
        if: github.event_name != 'pull_request'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: false

  # ------------------------------------------------------------------ #
  # CDO-142: bump tag vào Git -> ArgoCD selfHeal sync.                  #
  # Chạy SAU khi mọi service build+push+ký xong, chỉ trên push (không   #
  # PR). yq map service -> components.<svc>.imageOverride.tag trong      #
  # FILE TAGS TÁCH RIÊNG (không comment) — map đúng key từng service,   #
  # không sed 1 dòng, không reformat values.yaml gốc.                   #
  # ------------------------------------------------------------------ #
  bump:
    name: Bump image tags (GitOps)
    # build-aiops luôn chạy (không phụ thuộc detect) nên needs nó vào đây; `always()`
    # để bump vẫn chạy khi MỘT trong hai nhánh build bị skip — nhưng chỉ khi nhánh
    # kia thành công (điều kiện result kiểm bên dưới), không bump tag của image chưa push.
    needs: [detect, build, detect-aiops, build-aiops]
    # push VÀ workflow_dispatch đều bump (dispatch build-all mà không bump thì
    # image lên ECR nhưng ArgoCD không bao giờ biết — lỗi phát hiện 2026-07-19,
    # phải bump tay đợt 5e03ae7). Chỉ PR là không bump (không push image).
    if: >-
      ${{ always() && github.event_name != 'pull_request'
      && (needs.build.result == 'success' || needs.build-aiops.result == 'success') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # GitHub App token: danh tính bot riêng, ephemeral (~1h), quyền fine-grained
      # contents:write. App PHẢI nằm trong bypass list của ruleset develop để push
      # thẳng vượt branch protection. Secrets: GITOPS_APP_ID + GITOPS_APP_PRIVATE_KEY.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GITOPS_APP_ID || secrets.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Bump imageOverride.tag từng service
        # Chỉ khi nhánh build chart thật sự đã push image. build-aiops chạy một mình
        # (chỉ aiops/** đổi) thì bỏ qua bước này, không đụng TAGS_FILE.
        if: needs.build.result == 'success' && needs.detect.outputs.any == 'true'
        env:
          MATRIX: ${{ needs.detect.outputs.matrix }}
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)

          # Duyệt service trong matrix, map -> đúng key trong file tags riêng.
          for svc in $(echo "$MATRIX" | yq -r '.include[].service'); do
            TAG="${IMAGE_VERSION}-${svc}-${SHORT_SHA}"
            echo "== $svc -> $TAG =="
            yq -i ".components.\"$svc\".imageOverride.tag = \"$TAG\"" "$TAGS_FILE"
          done

      # aiops deploy bằng manifest TRẦN (không Helm, không values file) -> bump là sửa
      # thẳng field image trong Deployment. Dùng yq theo ĐƯỜNG DẪN document
      # (.spec.template.spec.containers[0].image) chứ không sed regex: file còn có tag
      # ví dụ trong comment hướng dẫn build tay, sed sẽ sửa nhầm cả comment đó.
      - name: Bump image aiops (manifest trần)
        if: needs.build-aiops.result == 'success'
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)

          bump_aiops() {
            local module="$1" version="$2"
            local file="aiops/${module}/deploy/deployment.yaml"
            local tag="${version}-aiops-${module}-${SHORT_SHA}"
            echo "== aiops/$module -> $tag =="
            IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${tag}" \
              yq -i '.spec.template.spec.containers[0].image = strenv(IMAGE)' "$file"
          }

          # version phải khớp matrix của build-aiops — lệch là bump ra tag không tồn tại.
          bump_aiops detector    1.3
          bump_aiops remediation 1.1

      - name: Commit & push
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          # Checkout đã dùng App token -> origin remote đã kèm credential đúng.
          # Commit author = App bot (audit rõ ai bump). Push thẳng nhờ App ở bypass list.
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          # Danh sách file có thể bị 2 bước bump ở trên chạm vào. File aiops chỉ đổi khi
          # build-aiops xanh; nếu bước đó bị skip thì git diff của nó rỗng, vô hại.
          BUMPED=(
            "$TAGS_FILE"
            aiops/detector/deploy/deployment.yaml
            aiops/remediation/deploy/deployment.yaml
          )
          if git diff --quiet -- "${BUMPED[@]}"; then
            echo "ℹ️ Tag không đổi, bỏ qua commit."
            exit 0
          fi
          git config user.name  "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git add "${BUMPED[@]}"
          git commit -m "ci(app): bump image tags -> $(git rev-parse --short HEAD) [skip ci]"

          # Job này checkout branch lúc bắt đầu run rồi build vài phút mới push. Merge
          # tiếp theo trong khoảng đó làm branch tiến lên -> push non-fast-forward bị
          # từ chối (đúng: push thẳng sẽ nuốt mất commit của run kia). Rebase rồi thử
          # lại: mỗi run chỉ sửa key của service mình trong TAGS_FILE nên không đụng
          # nhau, chỉ là cùng chạm một file.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${BRANCH_NAME}"; then
              echo "✅ Bumped & pushed lên $BRANCH_NAME — ArgoCD sẽ selfHeal sync."
              exit 0
            fi
            echo "⚠️ Push bị từ chối (lần $attempt) — có commit mới trên $BRANCH_NAME, rebase rồi thử lại."
            git pull --rebase origin "$BRANCH_NAME"
          done

          echo "::error::Push thất bại sau 5 lần rebase — $BRANCH_NAME đang bị ghi quá nhanh."
          exit 1

  # ------------------------------------------------------------------ #
  # SBOM cho digest ĐANG CHẠY TRÊN PROD (env sandbox). Không build lại: #
  # đọc tag từ tags file sandbox -> resolve digest ECR -> syft SBOM ->  #
  # cosign attest spdxjson. Đặt CÙNG file để giữ cùng BUILD_IDENTITY    #
  # (subject app-build.yaml@refs/heads/develop) mà Kyverno/verify dùng. #
  #                                                                     #
  # ECR IMMUTABLE: mỗi digest chỉ chứa 1 tag .att -> SBOM là ATTESTATION #
  # DUY NHẤT trong repo image (lần ghi đầu/digest, không bị chặn).      #
  # Attestation promoted-develop của app-attest.yaml đã TÁCH sang repo  #
  # attest riêng (mutable) qua COSIGN_REPOSITORY -> không đụng nhau.    #
  # ------------------------------------------------------------------ #
  attest-sbom:
    name: Attest SBOM (prod digests)
    # Chỉ chạy khi dispatch với attest_sbom=true, và chỉ từ develop (BUILD_IDENTITY
    # subject bám ref develop — dispatch ref khác sẽ ký sai subject).
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.attest_sbom && github.ref == 'refs/heads/develop' }}
    runs-on: ubuntu-latest
    # Cùng environment/role như app-build/app-attest để push .att lên ECR (AWS OIDC).
    environment: sandbox
    permissions:
      contents: read
      id-token: write # OIDC cho AWS + Cosign keyless (Fulcio). Đẩy ECR qua AWS role, KHÔNG qua GITHUB_TOKEN.
    env:
      # Tags file PROD (env sandbox) — khác app-attest (đọc develop).
      SANDBOX_TAGS_FILE: platform/gitops/environments/sandbox/values-image-tags.yaml
      BUILD_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/app-build.yaml@refs/heads/develop
      OIDC_ISSUER: https://token.actions.githubusercontent.com
      DRY_RUN: ${{ inputs.sbom_dry_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TF_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-sbom-${{ github.actor }}-${{ github.run_id }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: SBOM + attest từng digest prod
        run: |
          set -euo pipefail

          mapfile -t SERVICES < <(yq -r '.components | keys | .[]' "$SANDBOX_TAGS_FILE")

          attested=0 skipped=0 failed=0
          echo "## Attest SBOM (prod digests)" >> "$GITHUB_STEP_SUMMARY"
          echo "| service | tag | digest | kết quả |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          for svc in "${SERVICES[@]}"; do
            # Chịu lỗi từng service: 1 image hỏng không chặn cả loạt.
            set +e
            TAG=$(yq -r ".components.\"$svc\".imageOverride.tag // \"\"" "$SANDBOX_TAGS_FILE")
            if [ -z "$TAG" ]; then
              echo "::warning::'$svc' không có tag trong sandbox tags file."
              echo "| $svc | — | — | ❌ thiếu tag |" >> "$GITHUB_STEP_SUMMARY"
              failed=$((failed+1)); set -e; continue
            fi

            DIGEST=$(aws ecr describe-images \
              --repository-name "$ECR_REPOSITORY" \
              --image-ids imageTag="$TAG" \
              --query 'imageDetails[0].imageDigest' --output text 2>/dev/null)
            if [ -z "$DIGEST" ] || [ "$DIGEST" = "None" ]; then
              echo "::warning::'$svc': tag $TAG không có trên ECR."
              echo "| $svc | $TAG | — | ❌ không có trên ECR |" >> "$GITHUB_STEP_SUMMARY"
              failed=$((failed+1)); set -e; continue
            fi
            REF="${ECR_REGISTRY}/${ECR_REPOSITORY}@${DIGEST}"

            # SKIP theo PREDICATE TYPE spdxjson — KHÔNG chỉ check .att tồn tại: 1 .att có
            # thể chứa attestation loại khác (vd promoted-develop) mà chưa có SBOM.
            if cosign verify-attestation --type spdxjson \
                 --certificate-identity "$BUILD_IDENTITY" \
                 --certificate-oidc-issuer "$OIDC_ISSUER" \
                 "$REF" >/dev/null 2>&1; then
              echo "⏭️  $svc: $DIGEST đã có SBOM spdxjson, skip."
              echo "| $svc | $TAG | \`$DIGEST\` | ⏭️ đã có SBOM |" >> "$GITHUB_STEP_SUMMARY"
              skipped=$((skipped+1)); set -e; continue
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "🔎 $svc: $DIGEST (dry-run, không attest)."
              echo "| $svc | $TAG | \`$DIGEST\` | 🔎 dry-run |" >> "$GITHUB_STEP_SUMMARY"
              set -e; continue
            fi

            syft "registry:${REF}" -o spdx-json > sbom.spdx.json && \
            cosign attest --yes \
              --type spdxjson \
              --predicate sbom.spdx.json \
              --rekor-url https://rekor.sigstore.dev \
              --fulcio-url https://fulcio.sigstore.dev \
              "$REF"
            if [ $? -ne 0 ]; then
              echo "::error::'$svc': syft/attest lỗi cho $REF."
              echo "| $svc | $TAG | \`$DIGEST\` | ❌ attest lỗi |" >> "$GITHUB_STEP_SUMMARY"
              failed=$((failed+1)); set -e; continue
            fi
            echo "✅ $svc: SBOM attested $DIGEST"
            echo "| $svc | $TAG | \`$DIGEST\` | ✅ attested |" >> "$GITHUB_STEP_SUMMARY"
            attested=$((attested+1))
            set -e
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Attested: $attested — skip: $skipped — lỗi: $failed**" >> "$GITHUB_STEP_SUMMARY"
          [ "$failed" -eq 0 ] || exit 1
